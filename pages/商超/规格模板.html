<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规格模板 - 商超</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .spec-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1000px;
        }
        .card-toolbar {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table td:last-child {
            white-space: nowrap;
        }
        .action-btn {
            padding: 4px 10px;
            font-size: var(--font-size-xs);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            background: #fff;
            cursor: pointer;
            color: var(--color-text-secondary);
            margin-right: 6px;
        }
        .action-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .action-btn-danger:hover {
            border-color: var(--color-error);
            color: var(--color-error);
        }
        .status-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 44px;
            height: 24px;
        }
        .status-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .status-slider {
            position: absolute;
            inset: 0;
            background: #d1d5db;
            border-radius: 999px;
            transition: 0.2s;
            cursor: pointer;
        }
        .status-slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .status-switch input:checked + .status-slider {
            background: #22c55e;
        }
        .status-switch input:checked + .status-slider::before {
            transform: translateX(20px);
        }
        .spec-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            box-sizing: border-box;
        }
        .spec-modal[hidden] {
            display: none !important;
        }
        .spec-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }
        .spec-modal-dialog {
            position: relative;
            width: 100%;
            max-width: 760px;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .spec-modal-body {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
        }
        .spec-modal-toolbar {
            margin-bottom: var(--spacing-md);
        }
        .spec-modal-tip {
            margin: 0 0 var(--spacing-sm) 0;
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
        }
        .spec-add-row-btn {
            border: 1px dashed var(--color-primary);
            background: rgba(44, 131, 235, 0.08);
            color: var(--color-primary);
            border-radius: var(--radius-md);
            padding: 6px 12px;
            cursor: pointer;
        }
        .spec-add-row-btn:hover {
            background: rgba(44, 131, 235, 0.14);
        }
        .spec-modal-table th,
        .spec-modal-table td {
            border: 1px solid var(--color-neutral-200);
            padding: 8px 12px;
        }
        .spec-modal-table input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
        }
        .spec-modal-del {
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }
        .spec-modal-del:hover {
            color: var(--color-error);
        }
        .spec-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div class="spec-template-page">
        <div class="card">
            <div class="card-toolbar">
                <button type="button" class="btn btn-primary" id="openSpecModalBtn">新增规格</button>
            </div>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>ID</th>
                        <th>规格名称</th>
                        <th>启用/禁用</th>
                        <th>绑定商品数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="specSavedListBody"></tbody>
            </table>
        </div>
    </div>
    <div class="spec-modal" id="specModal" hidden>
        <div class="spec-modal-backdrop" id="specModalBackdrop"></div>
        <div class="spec-modal-dialog" role="dialog" aria-modal="true">
            <div class="spec-modal-body">
                <div class="spec-modal-toolbar">
                    <p class="spec-modal-tip">规格名称：女款套裙F01</p>
                    <button type="button" class="spec-add-row-btn" id="specModalAddRowBtn">+ 添加一行</button>
                </div>
                <table class="spec-table spec-modal-table">
                    <thead>
                        <tr>
                            <th>规格名称</th>
                            <th>加价</th>
                            <th>成本</th>
                            <th style="width: 48px;"></th>
                        </tr>
                    </thead>
                    <tbody id="specModalTableBody"></tbody>
                </table>
            </div>
            <div class="spec-modal-footer">
                <button type="button" class="btn" id="specModalCancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="specModalConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var savedListBody = document.getElementById('specSavedListBody');
            var addBtn = document.getElementById('openSpecModalBtn');
            var modal = document.getElementById('specModal');
            var modalBody = document.getElementById('specModalTableBody');
            var modalTip = document.querySelector('.spec-modal-tip');
            var modalAddRowBtn = document.getElementById('specModalAddRowBtn');
            var STORAGE_KEY = 'shangchaoSpecTemplateSimpleList';
            var modalMode = 'create';
            var editingSpecId = null;

            var DEFAULT_SPECS = [
                { id: 1001, name: '女款套裙F01', enabled: true, bindCount: 12 },
                { id: 1002, name: '女款套裙F02', enabled: true, bindCount: 8 },
                { id: 1003, name: '女款套裙F03', enabled: false, bindCount: 0 },
                { id: 1004, name: '女款套裙F04', enabled: true, bindCount: 5 },
                { id: 1005, name: '女款套裙F05', enabled: true, bindCount: 3 },
                { id: 1006, name: '女款套裙F06', enabled: false, bindCount: 1 }
            ];

            function getData() {
                try {
                    var raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return DEFAULT_SPECS.slice();
                    var parsed = JSON.parse(raw);
                    return Array.isArray(parsed) && parsed.length ? parsed : DEFAULT_SPECS.slice();
                } catch (e) {
                    return DEFAULT_SPECS.slice();
                }
            }

            function saveData(data) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            function renderTable() {
                var data = getData();
                savedListBody.innerHTML = '';

                data.forEach(function (item, index) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td>' + (index + 1) + '</td>' +
                        '<td>' + item.id + '</td>' +
                        '<td>' + item.name + '</td>' +
                        '<td>' +
                            '<label class="status-switch">' +
                                '<input type="checkbox" class="status-toggle" data-id="' + item.id + '"' + (item.enabled ? ' checked' : '') + '>' +
                                '<span class="status-slider"></span>' +
                            '</label>' +
                        '</td>' +
                        '<td>' + (item.bindCount || 0) + '</td>' +
                        '<td>' +
                            '<button type="button" class="action-btn action-edit" data-id="' + item.id + '">编辑</button>' +
                            '<button type="button" class="action-btn action-btn-danger action-delete" data-id="' + item.id + '">删除</button>' +
                        '</td>';
                    savedListBody.appendChild(tr);
                });

                bindRowActions();
            }

            function bindRowActions() {
                savedListBody.querySelectorAll('.status-toggle').forEach(function (el) {
                    el.addEventListener('change', function () {
                        var id = Number(this.getAttribute('data-id'));
                        var data = getData();
                        var target = data.find(function (x) { return Number(x.id) === id; });
                        if (!target) return;
                        target.enabled = this.checked;
                        saveData(data);
                    });
                });

                savedListBody.querySelectorAll('.action-edit').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = Number(this.getAttribute('data-id'));
                        var data = getData();
                        var target = data.find(function (x) { return Number(x.id) === id; });
                        if (!target) return;
                        openEditModal(target);
                    });
                });

                savedListBody.querySelectorAll('.action-delete').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = Number(this.getAttribute('data-id'));
                        if (!confirm('确定删除该规格吗？')) return;
                        var data = getData().filter(function (x) { return Number(x.id) !== id; });
                        saveData(data);
                        renderTable();
                    });
                });
            }

            function createModalRow(defaultName) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><input type="text" class="modal-spec-name" placeholder="规格名称" value="' + (defaultName || '') + '"></td>' +
                    '<td><input type="number" class="modal-spec-price" value="0" min="0" step="0.01"> 元</td>' +
                    '<td><input type="number" class="modal-spec-cost" value="0" min="0" step="0.01"> 元</td>' +
                    '<td style="text-align:center;"><button type="button" class="spec-modal-del" title="删除">×</button></td>';
                tr.querySelector('.spec-modal-del').addEventListener('click', function () {
                    if (modalBody.querySelectorAll('tr').length <= 1) {
                        alert('至少保留一行');
                        return;
                    }
                    tr.remove();
                });
                return tr;
            }

            function resetModalRows() {
                modalBody.innerHTML = '';
                modalBody.appendChild(createModalRow('女款套裙F01'));
                modalBody.appendChild(createModalRow('女款套裙F02'));
                modalBody.appendChild(createModalRow('女款套裙F03'));
                modalBody.appendChild(createModalRow('女款套裙F04'));
            }

            function openModal() {
                modalMode = 'create';
                editingSpecId = null;
                if (modalTip) modalTip.textContent = '规格名称：女款套裙F01';
                if (modalAddRowBtn) modalAddRowBtn.style.display = 'inline-block';
                resetModalRows();
                modal.hidden = false;
                document.body.style.overflow = 'hidden';
            }

            function openEditModal(specItem) {
                modalMode = 'edit';
                editingSpecId = Number(specItem.id);
                if (modalTip) modalTip.textContent = '规格名称：' + (specItem.name || '');
                if (modalAddRowBtn) modalAddRowBtn.style.display = 'none';
                modalBody.innerHTML = '';
                modalBody.appendChild(createModalRow(specItem.name || ''));
                modal.hidden = false;
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.hidden = true;
                document.body.style.overflow = '';
            }

            addBtn.addEventListener('click', openModal);
            document.getElementById('specModalBackdrop').addEventListener('click', closeModal);
            document.getElementById('specModalCancelBtn').addEventListener('click', closeModal);
            document.getElementById('specModalAddRowBtn').addEventListener('click', function () {
                modalBody.appendChild(createModalRow(''));
            });
            document.getElementById('specModalConfirmBtn').addEventListener('click', function () {
                var rows = [];
                modalBody.querySelectorAll('tr').forEach(function (tr) {
                    var name = (tr.querySelector('.modal-spec-name').value || '').trim();
                    if (!name) return;
                    rows.push({
                        name: name,
                        price: parseFloat(tr.querySelector('.modal-spec-price').value) || 0,
                        cost: parseFloat(tr.querySelector('.modal-spec-cost').value) || 0
                    });
                });
                if (!rows.length) {
                    alert('请至少填写一条规格名称');
                    return;
                }
                var data = getData();
                if (modalMode === 'edit' && editingSpecId != null) {
                    var editTarget = data.find(function (x) { return Number(x.id) === Number(editingSpecId); });
                    if (!editTarget) return;
                    editTarget.name = rows[0].name;
                    saveData(data);
                    renderTable();
                    closeModal();
                    return;
                }
                var maxId = data.length ? Math.max.apply(null, data.map(function (x) { return Number(x.id) || 0; })) : 1000;
                rows.forEach(function (row, idx) {
                    data.push({
                        id: maxId + idx + 1,
                        name: row.name,
                        enabled: true,
                        bindCount: 0
                    });
                });
                saveData(data);
                renderTable();
                closeModal();
            });

            renderTable();
        })();
    </script>
</body>
</html>
