<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规格模板 - 商超</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .spec-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1000px;
        }
        .card-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-md) 0;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .card-foot {
            margin-top: var(--spacing-lg);
            display: flex;
            justify-content: flex-end;
        }

        /* 已保存规格模板列表（名称样式对齐商品标签 tag-pill） */
        .spec-saved-list {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
        }
        .spec-saved-empty {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin: var(--spacing-sm) 0 0 0;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }
        .tag-pill--primary {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
        }
        .tag-pill--danger {
            background-color: rgba(220, 53, 69, 0.08);
            color: var(--color-error);
        }
        .tag-pill--success {
            background-color: rgba(40, 167, 69, 0.08);
            color: var(--color-success);
        }
        .tag-preview-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="spec-template-page">
        <div class="card">
            <h2 class="card-title">规格</h2>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th>规格名称</th>
                        <th>加价</th>
                        <th>成本</th>
                    </tr>
                </thead>
                <tbody id="specTableBody">
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                    </tr>
                </tbody>
            </table>
            <div class="card-foot">
                <button type="button" class="btn btn-primary" id="specConfirmBtn">确定</button>
            </div>

            <div class="spec-saved-list" id="specSavedListSection">
                <h2 class="card-title">已设定规格模板</h2>
                <table class="spec-table">
                    <thead>
                        <tr>
                            <th>规格名称</th>
                            <th>加价</th>
                            <th>成本</th>
                        </tr>
                    </thead>
                    <tbody id="specSavedListBody"></tbody>
                </table>
                <p class="spec-saved-empty" id="specSavedEmpty" style="display: none;">暂无已保存的规格模板，在上方填写一行后点击「确定」将追加到此处列表。</p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var tbody = document.getElementById('specTableBody');
            var savedListBody = document.getElementById('specSavedListBody');
            var savedEmptyEl = document.getElementById('specSavedEmpty');
            var STORAGE_KEY = 'shangchaoSpecTemplatesSaved';

            // 与商超「商品标签」页表格中「标签名称」一致，加价/成本为示例数据
            var DEFAULT_SAVED_SPECS = [
                { name: '新品', price: 2.00, cost: 0.80 },
                { name: '热销', price: 5.50, cost: 1.20 },
                { name: '自营', price: 3.00, cost: 0.60 },
                { name: '限时抢购', price: 8.00, cost: 2.50 },
                { name: '产地直供', price: 4.20, cost: 1.00 },
                { name: '推荐', price: 2.80, cost: 0.50 },
                { name: '爆款', price: 6.00, cost: 1.80 },
                { name: '包邮', price: 0, cost: 0 },
                { name: '会员专享', price: 10.00, cost: 3.20 },
                { name: '限时', price: 7.50, cost: 2.00 },
                { name: '雅安特产', price: 4.50, cost: 1.10 },
                { name: '精选', price: 3.60, cost: 0.90 }
            ];

            function getSavedSpecData() {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw === null || raw === '' || raw === '[]') {
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_SAVED_SPECS));
                    } catch (e) {}
                    return DEFAULT_SAVED_SPECS.slice();
                }
                try {
                    var parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed) || parsed.length === 0) {
                        try {
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_SAVED_SPECS));
                        } catch (e2) {}
                        return DEFAULT_SAVED_SPECS.slice();
                    }
                    return parsed;
                } catch (e) {
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_SAVED_SPECS));
                    } catch (e2) {}
                    return DEFAULT_SAVED_SPECS.slice();
                }
            }

            function escapeHtml(s) {
                if (s == null) return '';
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function renderSavedSpecList() {
                if (!savedListBody) return;
                var data = getSavedSpecData();
                if (!Array.isArray(data)) data = [];
                savedListBody.innerHTML = '';
                var pillClasses = ['tag-pill tag-pill--primary', 'tag-pill tag-pill--danger', 'tag-pill tag-pill--success'];
                data.forEach(function (row, i) {
                    var tr = document.createElement('tr');
                    var pc = pillClasses[i % pillClasses.length];
                    tr.innerHTML =
                        '<td><span class="' + pc + '"><span class="tag-preview-dot"></span><span>' + escapeHtml(row.name) + '</span></span></td>' +
                        '<td>¥' + (Number(row.price) || 0).toFixed(2) + '</td>' +
                        '<td>¥' + (Number(row.cost) || 0).toFixed(2) + '</td>';
                    savedListBody.appendChild(tr);
                });
                if (savedEmptyEl) {
                    savedEmptyEl.style.display = data.length ? 'none' : 'block';
                }
            }

            function collectOneRowFromForm() {
                var tr = tbody.querySelector('tr');
                if (!tr) return null;
                var nameEl = tr.querySelector('.spec-name');
                var priceEl = tr.querySelector('.spec-price');
                var costEl = tr.querySelector('.spec-cost');
                var name = nameEl ? nameEl.value.trim() : '';
                if (!name) return null;
                return {
                    name: name,
                    price: parseFloat(priceEl && priceEl.value) || 0,
                    cost: parseFloat(costEl && costEl.value) || 0
                };
            }

            function clearFormRow() {
                var tr = tbody.querySelector('tr');
                if (!tr) return;
                var nameEl = tr.querySelector('.spec-name');
                var priceEl = tr.querySelector('.spec-price');
                var costEl = tr.querySelector('.spec-cost');
                if (nameEl) nameEl.value = '';
                if (priceEl) priceEl.value = '0';
                if (costEl) costEl.value = '0';
            }

            document.getElementById('specConfirmBtn').addEventListener('click', function () {
                var row = collectOneRowFromForm();
                if (!row) {
                    alert('请填写规格名称');
                    return;
                }
                var data = getSavedSpecData();
                if (!Array.isArray(data)) data = [];
                data.push(row);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
                renderSavedSpecList();
                clearFormRow();
            });

            renderSavedSpecList();
        })();
    </script>
</body>
</html>
