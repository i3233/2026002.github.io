<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存查询 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .inventory-query-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }

        /* 主搜索条（与采购退货等一致：主搜索 + 更多搜索展开） */
        .toolbar-card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-md) var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }

        .toolbar-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .toolbar-search-input {
            flex: 1;
            min-width: 220px;
            max-width: 400px;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
        }

        .toolbar-search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        /* 更多搜索弹窗内表单项 */
        .form-row {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-md);
        }

        .form-row .form-group {
            flex: 1;
            min-width: 140px;
        }

        .form-row .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .form-row .form-group input,
        .form-row .form-group select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
        }

        /* 统计摘要区域 */
        .summary-row {
            display: flex;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .summary-card {
            flex: 1;
            min-width: 220px;
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-md) var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .summary-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xs);
        }

        .summary-value {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            display: flex;
            align-items: baseline;
            gap: var(--spacing-xs);
        }

        .summary-value-blue {
            color: var(--color-primary);
        }

        .summary-value-orange {
            color: #ff8c42;
        }

        .summary-value-green {
            color: var(--color-success);
        }

        /* 表格容器 */
        .table-container {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--color-neutral-50);
        }

        th, td {
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-size-sm);
            border-bottom: 1px solid var(--color-neutral-200);
            white-space: nowrap;
        }

        th {
            text-align: left;
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: var(--spacing-xl);
        }

        th.sortable::after {
            content: '↕';
            position: absolute;
            right: var(--spacing-sm);
            color: var(--color-neutral-400);
            font-size: var(--font-size-xs);
        }

        th.sortable.asc::after {
            content: '↑';
            color: var(--color-primary);
        }

        th.sortable.desc::after {
            content: '↓';
            color: var(--color-primary);
        }

        tbody tr {
            transition: all var(--transition-base) var(--ease-in-out);
        }

        tbody tr:hover {
            background-color: var(--color-neutral-50);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .product-name-link {
            color: var(--color-primary);
            cursor: pointer;
            text-decoration: none;
        }

        .product-name-link:hover {
            text-decoration: underline;
        }

        .inventory-qty {
            color: var(--color-error);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
        }

        .inventory-qty:hover {
            text-decoration: underline;
        }

        .text-right {
            text-align: right;
        }

        .text-secondary {
            color: var(--color-text-secondary);
        }

        .inventory-photo-thumb {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            background-color: var(--color-neutral-100);
        }
        .photo-placeholder {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }
        .photo-modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .photo-modal-overlay.show { display: flex; }
        .photo-modal-box { background: #fff; border-radius: var(--radius-lg); padding: var(--spacing-lg); max-width: 90vw; max-height: 90vh; overflow: auto; text-align: center; }
        .photo-modal-box img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; }
        .photo-modal-box .photo-placeholder { padding: 48px; color: var(--color-text-secondary); }

        /* 详情弹窗 */
        .detail-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .detail-modal-overlay.show { display: flex; }
        .detail-modal {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .detail-modal-header {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .detail-modal-title {
            margin: 0;
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
        }
        .detail-modal-body {
            padding: var(--spacing-lg);
            overflow-y: auto;
            flex: 1;
        }
        .detail-modal-footer {
            padding: var(--spacing-md) var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
        }
        .detail-section-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--spacing-sm);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--spacing-xs) var(--spacing-lg);
            margin-bottom: var(--spacing-md);
        }
        .detail-item-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }
        .detail-item-value {
            font-size: var(--font-size-sm);
        }
        .serial-list-box {
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm) var(--spacing-md);
            max-height: 200px;
            overflow-y: auto;
            font-size: var(--font-size-xs);
        }

        /* 底部工具栏 */
        .bottom-toolbar {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            background-color: #ffffff;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            border-top: 1px solid var(--color-neutral-200);
        }

        .bottom-left,
        .bottom-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        /* 分页控件 */
        .page-size-select {
            padding: 2px 8px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
        }

        .pagination-info {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .pagination-pages {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .pagination-page-btn {
            min-width: 24px;
            padding: 2px 6px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            background-color: #ffffff;
            font-size: var(--font-size-xs);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .pagination-page-btn.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
        }

        .pagination-page-btn:hover:not(.active) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .pagination-jump-input {
            width: 40px;
            padding: 2px 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
            text-align: center;
        }

        @media (max-width: 1200px) {
            .bottom-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* 更多搜索：页面内展开区域（非弹窗） */
        .more-search-expand {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            border: 1px solid var(--color-neutral-200);
            display: none;
        }
        .more-search-expand.show {
            display: block;
        }
        .more-search-expand .more-search-actions {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-neutral-200);
        }
    </style>
</head>

    <div class="inventory-query-page">

            </div>
            <div class="toolbar-right">

                </div>
                <div class="form-group">
                    <label>库存数量</label>
                    <input type="number" id="msInventoryQty" placeholder="输入数量">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>产品录入日期 起</label>
                    <input type="date" id="msEntryDateStart">
                </div>
                <div class="form-group">
                    <label>产品录入日期 止</label>
                    <input type="date" id="msEntryDateEnd">
                </div>
                <div class="form-group">
                    <label>交易日期 起</label>

                </div>
                <div class="form-group">
                    <label>交易日期 止</label>
                    <input type="date" id="msTradeDateEnd">

            <div class="more-search-actions">
                <button type="button" class="btn btn-outline" id="moreSearchResetBtn">重置</button>
                <button type="button" class="btn btn-primary" id="moreSearchApplyBtn">应用筛选</button>

        </div>

        <!-- 统计摘要区域 -->
        <div class="summary-row">

            </div>
        </div>

        <!-- 数据表格区域 -->
        <div class="table-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="index">序号</th>
                            <th>产品ID</th>
                            <th>产品名称</th>
                            <th>规格型号</th>
                            <th>分类</th>
                            <th>货区</th>
                            <th>货架</th>
                            <th>照片</th>
                            <th class="text-right">入库</th>
                            <th class="text-right">出库</th>
                            <th class="sortable text-right" data-sort="inventory">库存 ◇</th>
                            <th class="text-right">平均单位成本</th>
                            <th class="text-right">库存余额</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- JS 渲染 -->
                    </tbody>
                </table>
            </div>

            <!-- 底部工具栏 -->
            <div class="bottom-toolbar">
                <!-- 左侧信息 -->
                <div class="bottom-left">
                    <span class="pagination-info">共 <span id="totalRecords">0</span> 条记录</span>
                </div>

                <!-- 右侧分页 -->
                <div class="bottom-right">
                    <select class="page-size-select" id="pageSizeSelect">
                        <option value="20" selected>20 条/页</option>
                        <option value="50">50 条/页</option>
                        <option value="100">100 条/页</option>
                    </select>
                    <div class="pagination-pages" id="paginationPages">
                        <!-- 分页按钮由JS生成 -->

                    <span class="pagination-info">跳转到</span>
                    <input type="number" class="pagination-jump-input" min="1" value="1" id="jumpToPage">
                    <span class="pagination-info">页</span>
                </div>
            </div>
        </div>
    </div>

                lastTradeDate: '2025-01-30',
                zone: 'B区',
                shelf: 'B-04',
                photo: ''
            },
            {
                id: 'PRD009',
                name: '雅安蜂蜜',
                spec: '500g/瓶',
                category: '食品',
                warehouse: 'WH002',
                inQty: 200,
                outQty: 180,
                inventory: 20,
                unit: '瓶',
                avgCost: 35.00,
                balance: 700.00,
                barcode: '6901234567898',
                remark: '天然蜂蜜',
                entryDate: '2025-01-16',
                lastTradeDate: '2025-01-29',
                zone: 'B区',
                shelf: 'B-05',
                photo: ''
            },
            {
                id: 'PRD010',
                name: '不锈钢水杯',
                spec: '500ml',
                category: '日用品',
                warehouse: 'WH001',
                inQty: 300,
                outQty: 280,
                inventory: 20,
                unit: '个',
                avgCost: 25.00,
                balance: 500.00,
                barcode: '6901234567899',
                remark: '保温杯',
                entryDate: '2025-01-22',
                lastTradeDate: '2025-01-31',
                zone: 'A区',
                shelf: 'A-03',
                photo: ''
            }
        ];

        // 当前状态
        let filteredData = [...inventoryData];
        let currentPage = 1;
        let pageSize = 20;
        let sortColumn = null;
        let sortDirection = 'asc';

        // 分类由左侧菜单子项切换（URL 参数 category=），表单内不再提供分类字段
        let urlCategory = '';
        try {
            const params = new URLSearchParams(window.location.search || '');
            const c = params.get('category');
            if (c) urlCategory = c.trim();
        } catch (e) {}

        // 初始化更多搜索内的门店下拉
        function initMoreSearchSelects() {
            const whSelect = document.getElementById('msWarehouse');
            if (whSelect) {
                warehouses.forEach(warehouse => {
                    const option = document.createElement('option');
                    option.value = warehouse.id;
                    option.textContent = warehouse.name;
                    whSelect.appendChild(option);
                });
            }
        }

        // 筛选数据（主搜索条关键词 + 更多搜索弹窗条件）
        function filterData() {
            filteredData = [...inventoryData];

            // 主搜索条：关键词（ID、名称、条码、备注）
            const quickInput = document.getElementById('quickSearchInput');
            const keyword = quickInput ? quickInput.value.trim().toLowerCase() : '';
            if (keyword) {
                filteredData = filteredData.filter(item => {
                    return (
                        item.id.toLowerCase().includes(keyword) ||
                        item.name.toLowerCase().includes(keyword) ||
                        (item.barcode && item.barcode.toLowerCase().includes(keyword)) ||
                        (item.remark && item.remark.toLowerCase().includes(keyword))
                    );
                });
            }

            // 更多搜索条件（弹窗内字段）
            const warehouseId = document.getElementById('msWarehouse') && document.getElementById('msWarehouse').value;
            if (warehouseId) {
                filteredData = filteredData.filter(item => item.warehouse === warehouseId);
            }

            if (urlCategory) {
                filteredData = filteredData.filter(item => item.category === urlCategory);
            }

            const inventoryFilter = document.getElementById('msInventoryFilter') && document.getElementById('msInventoryFilter').value;
            if (inventoryFilter === 'hasStock') {
                filteredData = filteredData.filter(item => item.inventory > 0);
            } else if (inventoryFilter === 'noStock') {
                filteredData = filteredData.filter(item => item.inventory === 0);
            } else if (inventoryFilter === 'lowStock') {
                filteredData = filteredData.filter(item => item.inventory > 0 && item.inventory < 10);
            }

            const msQtyEl = document.getElementById('msInventoryQty');
            const inventoryQty = msQtyEl && msQtyEl.value.trim();
            if (inventoryQty) {
                const qty = parseFloat(inventoryQty);
                if (!isNaN(qty)) {
                    filteredData = filteredData.filter(item => item.inventory === qty);
                }
            }

            const entryDateStart = document.getElementById('msEntryDateStart') && document.getElementById('msEntryDateStart').value;
            const entryDateEnd = document.getElementById('msEntryDateEnd') && document.getElementById('msEntryDateEnd').value;
            if (entryDateStart) {
                filteredData = filteredData.filter(item => item.entryDate >= entryDateStart);
            }
            if (entryDateEnd) {
                filteredData = filteredData.filter(item => item.entryDate <= entryDateEnd);
            }

            const tradeDateStart = document.getElementById('msTradeDateStart') && document.getElementById('msTradeDateStart').value;
            const tradeDateEnd = document.getElementById('msTradeDateEnd') && document.getElementById('msTradeDateEnd').value;
            if (tradeDateStart) {
                filteredData = filteredData.filter(item => item.lastTradeDate >= tradeDateStart);
            }
            if (tradeDateEnd) {
                filteredData = filteredData.filter(item => item.lastTradeDate <= tradeDateEnd);
            }

            // 应用排序
            if (sortColumn) {
                sortData(sortColumn, true);
            }

            updateSummary();
            renderTable();
        }

        // 排序数据
        function sortData(column, keepDirection = false) {
            if (!keepDirection) {
                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'asc';
                }
            }

            filteredData.sort((a, b) => {
                let aVal, bVal;

                if (column === 'index') {
                    // 序号排序使用数组索引
                    return sortDirection === 'asc' ? 1 : -1;
                } else if (column === 'inventory') {
                    aVal = a.inventory;
                    bVal = b.inventory;
                }

                if (aVal < bVal) {
                    return sortDirection === 'asc' ? -1 : 1;
                } else if (aVal > bVal) {
                    return sortDirection === 'asc' ? 1 : -1;
                }
                return 0;
            });

            if (!keepDirection) {
                // 更新表头排序图标
                document.querySelectorAll('th.sortable').forEach(th => {
                    th.classList.remove('asc', 'desc');
                });
                const th = document.querySelector(`th.sortable[data-sort="${column}"]`);
                if (th) {
                    th.classList.add(sortDirection);
                }
            }

            renderTable();
        }

        // 更新统计
        function updateSummary() {
            const productCount = filteredData.length;
            const inventoryQty = filteredData.reduce((sum, item) => sum + item.inventory, 0);
            const inventoryBalance = filteredData.reduce((sum, item) => sum + item.balance, 0);

            document.getElementById('productCount').textContent = productCount;
            document.getElementById('inventoryQty').textContent = inventoryQty.toFixed(6);
            document.getElementById('inventoryBalance').textContent = inventoryBalance.toFixed(2);
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="14" style="text-align: center; padding: var(--spacing-lg); color: var(--color-text-secondary);">暂无数据</td></tr>';
                document.getElementById('totalRecords').textContent = '0';
                return;
            }

            // 分页
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach((item, index) => {
                const row = document.createElement('tr');
                // 默认使用 images 文件夹下的图片作为缩略图
                const photoUrl = item.photo || '../../images/01.jpg';
                const safeName = (item.name || '').replace(/"/g, '&quot;');
                const safeUrl = (photoUrl || '').replace(/"/g, '&quot;');
                const photoHtml = '<img src="' + safeUrl + '" alt="照片" class="inventory-photo-thumb" data-url="' + safeUrl + '" data-name="' + safeName + '">';
                row.innerHTML = `
                    <td>${startIndex + index + 1}</td>
                    <td>${item.id}</td>
                    <td>
                        <a href="#" class="product-name-link" data-id="${item.id}">${item.name}</a>
                    </td>
                    <td>${item.spec}</td>
                    <td>${item.category}</td>
                    <td>${item.zone || '-'}</td>
                    <td>${item.shelf || '-'}</td>
                    <td>${photoHtml}</td>
                    <td class="text-right">${item.inQty}</td>
                    <td class="text-right">${item.outQty}</td>
                    <td class="text-right">
                        <span class="inventory-qty" data-id="${item.id}">${item.inventory}${item.unit}</span>
                    </td>
                    <td class="text-right">¥${item.avgCost.toFixed(2)}</td>
                    <td class="text-right">¥${item.balance.toFixed(2)}</td>
                    <td><a href="#" class="detail-link" data-id="${item.id}">查看详情</a></td>
                `;
                tbody.appendChild(row);
            });

            // 更新分页信息
            updatePagination();
            document.getElementById('totalRecords').textContent = filteredData.length;

            // 绑定事件
            bindTableEvents();
        }

        // 更新分页
        function updatePagination() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            const paginationPages = document.getElementById('paginationPages');
            paginationPages.innerHTML = '';

            if (totalPages === 0) {
                return;
            }

            // 上一页
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-page-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            });
            paginationPages.appendChild(prevBtn);

            // 页码按钮
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.className = 'pagination-page-btn';
                firstBtn.textContent = '1';
                firstBtn.addEventListener('click', () => {
                    currentPage = 1;
                    renderTable();
                });
                paginationPages.appendChild(firstBtn);

                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.className = 'pagination-info';
                    ellipsis.textContent = '...';
                    paginationPages.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = 'pagination-page-btn';
                if (i === currentPage) {
                    pageBtn.classList.add('active');
                }
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    renderTable();
                });
                paginationPages.appendChild(pageBtn);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.className = 'pagination-info';
                    ellipsis.textContent = '...';
                    paginationPages.appendChild(ellipsis);
                }

                const lastBtn = document.createElement('button');
                lastBtn.className = 'pagination-page-btn';
                lastBtn.textContent = totalPages;
                lastBtn.addEventListener('click', () => {
                    currentPage = totalPages;
                    renderTable();
                });
                paginationPages.appendChild(lastBtn);
            }

            // 下一页
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-page-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });
            paginationPages.appendChild(nextBtn);
        }

        // 绑定表格事件
        function bindTableEvents() {
            // 产品名称点击
            document.querySelectorAll('.product-name-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const productId = this.dataset.id;
                    openInventoryDetail(productId);
                });
            });

            // 库存数量点击
            document.querySelectorAll('.inventory-qty').forEach(qty => {
                qty.addEventListener('click', function() {
                    const productId = this.dataset.id;
                    const product = inventoryData.find(p => p.id === productId);
                    alert(`库存变动记录（示例）\n产品：${product.name}\n当前库存：${product.inventory}${product.unit}\n入库：${product.inQty}\n出库：${product.outQty}`);
                });
            });

            // 照片缩略图放大
            document.querySelectorAll('.inventory-photo-thumb').forEach(img => {
                img.addEventListener('click', function() {
                    const url = (this.dataset.url || this.src || '').trim();
                    const name = (this.dataset.name || '商品').replace(/&quot;/g, '"');
                    const content = document.getElementById('photoModalContent');
                    const overlay = document.getElementById('photoModalOverlay');
                    if (url) {
                        content.innerHTML = '<div style="margin-bottom:8px; font-weight:bold;">' + name + '</div><img src="' + url.replace(/</g, '&lt;') + '" alt="照片" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'block\';"><div class="photo-placeholder" style="display:none;">暂无照片</div>';
                    } else {
                        content.innerHTML = '<div style="margin-bottom:8px; font-weight:bold;">' + name + '</div><div class="photo-placeholder">暂无照片</div>';
                    }
                    overlay.classList.add('show');
                });
            });

            // 查看详情
            document.querySelectorAll('.detail-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const productId = this.dataset.id;
                    openInventoryDetail(productId);
                });
            });
        }

        // 照片弹窗关闭
        document.getElementById('photoModalClose').addEventListener('click', function() {
            document.getElementById('photoModalOverlay').classList.remove('show');
        });
        document.getElementById('photoModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        // 库存详情弹窗
        function openInventoryDetail(productId) {
            const product = inventoryData.find(p => p.id === productId);
            if (!product) return;
            const modal = document.getElementById('inventoryDetailModal');
            const titleEl = document.getElementById('inventoryDetailTitle');
            const contentEl = document.getElementById('inventoryDetailContent');
            if (!modal || !contentEl) return;

            if (titleEl) {
                titleEl.textContent = '库存详情 - ' + (product.name || '');
            }

            const baseInfoHtml = `
                <div class="detail-section-title">基础信息</div>
                <div class="detail-grid">
                    <div>
                        <div class="detail-item-label">产品ID</div>
                        <div class="detail-item-value">${product.id || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">产品名称</div>
                        <div class="detail-item-value">${product.name || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">规格型号</div>
                        <div class="detail-item-value">${product.spec || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">分类</div>
                        <div class="detail-item-value">${product.category || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">仓库/门店</div>
                        <div class="detail-item-value">${product.warehouse || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">货区/货架</div>
                        <div class="detail-item-value">${(product.zone || '-') + ' / ' + (product.shelf || '-')}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">条码</div>
                        <div class="detail-item-value">${product.barcode || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">备注</div>
                        <div class="detail-item-value">${product.remark || '-'}</div>
                    </div>
                </div>
            `;

            const inventoryInfoHtml = `
                <div class="detail-section-title">库存信息</div>
                <div class="detail-grid">
                    <div>
                        <div class="detail-item-label">入库数量</div>
                        <div class="detail-item-value">${product.inQty}${product.unit || ''}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">出库数量</div>
                        <div class="detail-item-value">${product.outQty}${product.unit || ''}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">当前库存</div>
                        <div class="detail-item-value">${product.inventory}${product.unit || ''}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">平均单位成本</div>
                        <div class="detail-item-value">¥${product.avgCost.toFixed(2)}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">库存余额</div>
                        <div class="detail-item-value">¥${product.balance.toFixed(2)}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">入库日期</div>
                        <div class="detail-item-value">${product.entryDate || '-'}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">最后交易日期</div>
                        <div class="detail-item-value">${product.lastTradeDate || '-'}</div>
                    </div>
                </div>
            `;

            let serialHtml = '';
            const serials = product.serialNumbers;
            if (Array.isArray(serials) && serials.length) {
                const itemsHtml = serials.map((s, idx) => `<div>${idx + 1}. ${s}</div>`).join('');
                serialHtml = `
                    <div class="detail-section-title">序列号明细（库存中商品）</div>
                    <div class="serial-list-box">
                        ${itemsHtml}
                    </div>
                    <div style="margin-top:4px; font-size: var(--font-size-xs); color: var(--color-text-secondary);">
                        注：本示例显示与当前库存数量对应的序列号列表，实际系统可根据入库/出库记录动态维护。
                    </div>
                `;
            } else {
                serialHtml = `
                    <div class="detail-section-title">序列号明细</div>
                    <div class="serial-list-box">
                        当前商品未启用序列号管理或暂无可用序列号明细。
                    </div>
                `;
            }

            contentEl.innerHTML = baseInfoHtml + inventoryInfoHtml + serialHtml;
            modal.classList.add('show');
        }

        (function () {
            const modal = document.getElementById('inventoryDetailModal');
            const closeBtn = document.getElementById('inventoryDetailCloseBtn');
            const okBtn = document.getElementById('inventoryDetailOkBtn');
            function closeDetail() {
                if (modal) modal.classList.remove('show');
            }
            if (closeBtn) closeBtn.addEventListener('click', closeDetail);
            if (okBtn) okBtn.addEventListener('click', closeDetail);
            if (modal) {
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) closeDetail();
                });
            }
        })();

        // 打印
        function printData() {
            if (filteredData.length === 0) {
                alert('没有数据可打印');
                return;
            }
            const win = window.open('', '_blank');
            const cols = ['序号','产品ID','产品名称','规格','分类','货区','货架','入库','出库','库存','平均单位成本','库存余额'];
            const startIndex = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(startIndex, startIndex + pageSize);
            let rows = pageData.map((item, i) => {
                const r = [startIndex + i + 1, item.id, item.name, item.spec, item.category, item.zone || '-', item.shelf || '-', item.inQty, item.outQty, item.inventory + (item.unit || ''), item.avgCost.toFixed(2), item.balance.toFixed(2)];
                return '<tr><td>' + r.join('</td><td>') + '</td></tr>';
            }).join('');
            win.document.write('<html><head><meta charset="utf-8"><title>库存查询-打印</title><style>body{font-family:Microsoft YaHei,sans-serif;padding:16px;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ddd;padding:6px;text-align:left;} th{background:#f5f5f5;}</style></head><body><h3>库存查询</h3><p>共 ' + filteredData.length + ' 条（本页 ' + pageData.length + ' 条）</p><table><thead><tr><th>' + cols.join('</th><th>') + '</th></tr></thead><tbody>' + rows + '</tbody></table></body></html>');
            win.document.close();
            win.print();
            win.close();
        }
        document.getElementById('printBtn').addEventListener('click', printData);

        // 导出数据
        function exportData() {
            if (filteredData.length === 0) {
                alert('没有数据可导出');
                return;
            }

            alert(`导出数据（示例）\n共 ${filteredData.length} 条记录\n正在导出Excel文件...`);
        }

        // 主搜索
        document.getElementById('quickSearchBtn').addEventListener('click', function() {
            currentPage = 1;
            filterData();
        });

        document.getElementById('quickSearchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                currentPage = 1;
                filterData();
            }
        });

        document.getElementById('exportBtn').addEventListener('click', exportData);

        // 更多搜索：页面内展开/收起
        const moreSearchExpand = document.getElementById('moreSearchExpand');
        const moreSearchBtn = document.getElementById('moreSearchBtn');
        function toggleMoreSearch() {
            if (!moreSearchExpand || !moreSearchBtn) return;
            moreSearchExpand.classList.toggle('show');
            moreSearchBtn.textContent = moreSearchExpand.classList.contains('show') ? '收起搜索' : '更多搜索';
        }
        moreSearchBtn.addEventListener('click', toggleMoreSearch);
        document.getElementById('moreSearchResetBtn').addEventListener('click', function() {
            ['msWarehouse', 'msInventoryFilter', 'msInventoryQty', 'msEntryDateStart', 'msEntryDateEnd', 'msTradeDateStart', 'msTradeDateEnd'].forEach(function(id) {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
        });
        document.getElementById('moreSearchApplyBtn').addEventListener('click', function() {
            currentPage = 1;
            filterData();
        });

        // 排序事件
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', function() {
                const column = this.dataset.sort;
                sortData(column);
            });
        });

        // 分页大小变化
        document.getElementById('pageSizeSelect').addEventListener('change', function() {
            pageSize = parseInt(this.value);
            currentPage = 1;
            renderTable();
        });

        // 跳转页面
        document.getElementById('jumpToPage').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const page = parseInt(this.value);
                const totalPages = Math.ceil(filteredData.length / pageSize);
                if (page >= 1 && page <= totalPages) {
                    currentPage = page;
                    renderTable();
                } else {
                    alert(`请输入1-${totalPages}之间的页码`);
                }
            }
        });

        // 统计卡片点击
        document.getElementById('productCountCard').addEventListener('click', function() {
            alert('产品数量详情（示例）\n点击可查看产品列表详情');
        });

        document.getElementById('inventoryQtyCard').addEventListener('click', function() {
            alert('库存数量详情（示例）\n点击可查看库存分析');
        });

        document.getElementById('inventoryBalanceCard').addEventListener('click', function() {
            alert('库存余额详情（示例）\n点击可查看库存金额分析');
        });

        // 初始化
        initMoreSearchSelects();
        filterData();
    </script>
</body>
</html>
