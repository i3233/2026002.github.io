<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套餐列表 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        /* 套餐列表页面专用样式，整体风格对齐商品列表 */
        .package-list-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }

        /* 页面头部 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-lg);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        .page-header-stacked {
            flex-direction: column;
            align-items: stretch;
            gap: 0;
        }
        .page-header-toolbar-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: var(--spacing-md);
            width: 100%;
        }
        .page-header-toolbar-row .header-actions {
            justify-self: start;
            flex-wrap: wrap;
        }
        .page-header-toolbar-row .tabs-nav.tabs-nav-inline {
            justify-self: center;
            grid-column: 2;
        }
        .header-toolbar-right {
            justify-self: end;
            grid-column: 3;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        .header-quick-search {
            width: 390px;
            max-width: 100%;
            flex-shrink: 0;
        }
        .header-quick-search input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-base) var(--ease-in-out);
            box-sizing: border-box;
        }
        .header-quick-search input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }
        .more-search-panel {
            display: none;
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-neutral-200);
        }
        .more-search-panel.is-open {
            display: block;
        }
        .more-search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--spacing-md);
            align-items: end;
        }
        .more-search-field label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }
        .more-search-field input,
        .more-search-field select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            box-sizing: border-box;
        }
        .more-search-field input:focus,
        .more-search-field select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }
        .more-search-field-span2 {
            grid-column: span 2;
        }
        .more-search-date-range {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        .more-search-date-range input[type="date"] {
            flex: 1;
            min-width: 140px;
        }
        @media (max-width: 720px) {
            .more-search-field-span2 {
                grid-column: span 1;
            }
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        /* Tab标签导航 */
        .tabs-nav {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }
        .tabs-nav-inline {
            margin-bottom: 0;
            padding: 0;
            box-shadow: none;
            background: transparent;
        }

        .tab-nav-item {
            padding: var(--spacing-sm) var(--spacing-lg);
            border: none;
            background-color: transparent;
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
            position: relative;
        }

        .tab-nav-item:hover {
            background-color: var(--color-neutral-100);
            color: var(--color-text-primary);
        }

        .tab-nav-item.active {
            color: var(--color-primary);
            background-color: rgba(44, 131, 235, 0.1);
            font-weight: var(--font-weight-medium);
        }

        .tab-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background-color: var(--color-primary);
            border-radius: var(--radius-full);
        }

        /* 商品导出按钮下拉样式（与商品列表保持一致） */
        .export-dropdown {
            position: relative;
            display: inline-block;
        }
        .export-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            min-width: 140px;
            background-color: #ffffff;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-neutral-200);
            padding: 4px 0;
            z-index: var(--z-index-dropdown);
            display: none;
        }
        .export-dropdown-menu.show {
            display: block;
        }
        .export-dropdown-item {
            width: 100%;
            padding: 6px 12px;
            border: none;
            background-color: transparent;
            text-align: left;
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            cursor: pointer;
            transition: background-color var(--transition-base) var(--ease-in-out);
        }
        .export-dropdown-item:hover {
            background-color: var(--color-neutral-100);
        }

        /* 批量操作区域 */
        .batch-actions {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            margin-bottom: var(--spacing-lg);
            align-items: center;
        }

        .selected-count {
            margin-right: var(--spacing-md);
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }

        /* 表格容器 */
        .table-container {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--color-neutral-50);
        }

        th {
            padding: var(--spacing-md);
            text-align: left;
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
            border-bottom: 2px solid var(--color-neutral-200);
            white-space: nowrap;
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: var(--spacing-xl);
        }

        th.sortable:hover {
            background-color: var(--color-neutral-100);
        }

        th.sortable::after {
            content: '↕';
            position: absolute;
            right: var(--spacing-sm);
            color: var(--color-neutral-400);
            font-size: var(--font-size-xs);
        }

        th.sortable.asc::after {
            content: '↑';
            color: var(--color-primary);
        }

        th.sortable.desc::after {
            content: '↓';
            color: var(--color-primary);
        }

        td {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
        }

        tbody tr:hover {
            background-color: var(--color-neutral-50);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* 复选框 */
        .checkbox-cell {
            width: 50px;
            text-align: center;
        }

        .checkbox-cell input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* 套餐主图和名称 */
        .package-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .package-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-200);
        }

        .package-name {
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            cursor: pointer;
        }

        .package-name:hover {
            color: var(--color-primary);
        }

        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background-color: var(--color-primary);
            color: #ffffff;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }

        .status-tag.offline {
            background-color: var(--color-secondary);
        }

        /* 价格显示 */
        .price {
            color: var(--color-error);
            font-weight: var(--font-weight-medium);
        }

        .origin-price {
            text-decoration: line-through;
            color: var(--color-text-secondary);
            margin-left: var(--spacing-xs);
        }

        .save-amount {
            color: var(--color-success);
            font-size: var(--font-size-xs);
            margin-left: var(--spacing-xs);
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: var(--spacing-xs);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-neutral-300);
            background-color: transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .btn-icon:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn-icon.delete:hover {
            border-color: var(--color-error);
            color: var(--color-error);
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-lg);
            background-color: #ffffff;
            border-top: 1px solid var(--color-neutral-200);
        }

        .pagination-info {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }

        .pagination-controls {
            display: flex;
            gap: var(--spacing-xs);
        }

        .pagination-btn {
            padding: var(--spacing-xs) var(--spacing-sm);
            border: 1px solid var(--color-neutral-300);
            background-color: #ffffff;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--font-size-sm);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
        }

        /* 弹窗遮罩与容器（沿用商品列表风格） */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: var(--z-index-modal-backdrop);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: var(--spacing-lg);
            min-width: 920px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            z-index: var(--z-index-modal);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--color-neutral-200);
        }

        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background-color: transparent;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
            color: var(--color-text-secondary);
        }

        .modal-close:hover {
            background-color: var(--color-neutral-100);
            color: var(--color-text-primary);
        }

        .modal-body {
            margin-bottom: var(--spacing-lg);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-neutral-200);
        }

        /* 新建套餐弹窗布局：左右两栏 */
        .package-edit-layout {
            display: flex;
            gap: var(--spacing-lg);
            min-height: 320px;
        }
        /* 选品打开时仅显示商品选择，隐藏右侧套餐名称/组合/价格等 */
        .package-edit-layout.picker-open .package-edit-right {
            display: none !important;
        }
        .package-edit-layout.picker-open .package-edit-left {
            flex: 1 1 100%;
            max-width: 100%;
            min-width: 0;
            border-right: none;
            padding-right: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .package-edit-layout.picker-open .package-edit-left.hidden {
            display: none !important;
        }

        .package-edit-left {
            flex: 4;
            min-width: 380px;
            border-right: 1px solid var(--color-neutral-200);
            padding-right: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .package-edit-left.hidden {
            display: none !important;
        }

        .package-edit-left .product-panel-close {
            align-self: flex-end;
            margin-bottom: -8px;
        }

        .combo-block {
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
        }

        .combo-block-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-sm);
        }

        .combo-block-title-input {
            flex: 1;
            min-width: 120px;
            padding: 6px 10px;
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
        }

        .combo-required-setting {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .combo-required-setting input[type="number"] {
            width: 40px;
            padding: 4px 6px;
            text-align: center;
        }

        .combo-required-setting.disabled-required .combo-total-input,
        .combo-required-setting.disabled-required .combo-required-input {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-add-product {
            padding: 4px 10px;
            font-size: var(--font-size-sm);
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
        }

        .btn-add-product:hover {
            background: var(--color-primary-hover);
        }

        .btn-remove-combo {
            padding: 4px 8px;
            font-size: var(--font-size-xs);
            color: var(--color-error);
            background: none;
            border: 1px solid var(--color-error);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .btn-remove-combo:hover {
            background: rgba(220, 53, 69, 0.1);
        }

        .add-combo-btn {
            padding: 8px 16px;
            font-size: var(--font-size-sm);
            color: var(--color-primary);
            background: none;
            border: 1px dashed var(--color-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-top: var(--spacing-sm);
        }

        .add-combo-btn:hover {
            background: rgba(44, 131, 235, 0.05);
        }

        .package-edit-right {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .section-title-sm {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .section-desc-sm {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .form-field-inline {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-sm);
        }

        .form-field-inline label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .form-field-inline input {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-base);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .form-field-inline input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        .package-base-info {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .package-thumb-placeholder {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-md);
            border: 1px dashed var(--color-neutral-300);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-secondary);
            font-size: 28px;
        }

        .package-selected-list {
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-200);
            padding: var(--spacing-sm);
            max-height: 260px;
            overflow-y: auto;
        }

        .package-selected-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) 0;
            border-bottom: 1px dashed var(--color-neutral-200);
        }

        .package-selected-item:last-child {
            border-bottom: none;
        }

        .package-selected-main {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .package-selected-main img {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--color-neutral-200);
        }

        .package-selected-name {
            font-size: var(--font-size-xs);
            color: var(--color-text-primary);
        }

        .package-selected-sub {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .package-selected-qty,
        .package-selected-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .combo-item-flag-wrap {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-xs);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            color: var(--color-text-primary);
        }

        .combo-item-qty-wrap {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .package-selected-qty input,
        .package-selected-actions .selected-qty-input {
            width: 56px;
            padding: 2px 4px;
            text-align: center;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
        }

        .selected-qty-input:disabled {
            opacity: 0.55;
            background: var(--color-neutral-100);
            cursor: not-allowed;
        }

        .package-selected-remove {
            cursor: pointer;
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .package-selected-remove:hover {
            color: var(--color-error);
        }

        .package-summary {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .package-summary strong {
            color: var(--color-text-primary);
        }

        .text-danger {
            color: var(--color-error);
        }

        .text-success {
            color: var(--color-success);
        }

        /* 选商品：左类型 + 右商品列表 */
        .product-picker-body {
            display: flex;
            min-height: 280px;
            max-height: 380px;
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #fff;
        }
        .picker-category-list {
            width: 136px;
            flex-shrink: 0;
            background: var(--color-neutral-50);
            border-right: 1px solid var(--color-neutral-200);
            overflow-y: auto;
            padding: var(--spacing-xs);
        }
        .picker-category-item {
            display: block;
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 2px;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            border: none;
            text-align: left;
            background: transparent;
            transition: background-color var(--transition-base) var(--ease-in-out);
        }
        .picker-category-item:hover {
            background: var(--color-neutral-100);
            color: var(--color-text-primary);
        }
        .picker-category-item.active {
            background: rgba(44, 131, 235, 0.12);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }
        .picker-product-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .picker-product-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-xs);
        }
        .picker-product-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 8px 10px;
            border-bottom: 1px solid var(--color-neutral-100);
            font-size: var(--font-size-sm);
            cursor: pointer;
            border-radius: var(--radius-sm);
            margin-bottom: 2px;
        }
        .picker-product-row:hover {
            background: var(--color-neutral-50);
        }
        .picker-product-row:last-child {
            border-bottom: none;
        }
        .picker-product-row input[type="checkbox"] {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .picker-product-row img {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--color-neutral-200);
            flex-shrink: 0;
        }
        .picker-product-meta {
            flex: 1;
            min-width: 0;
        }
        .picker-product-name {
            color: var(--color-text-primary);
            font-weight: var(--font-weight-medium);
            line-height: 1.3;
        }
        .picker-product-sub {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-top: 2px;
        }
        .picker-product-price {
            color: var(--color-text-primary);
            white-space: nowrap;
            font-weight: var(--font-weight-medium);
        }
        .picker-product-empty {
            padding: var(--spacing-lg);
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .select-filter-row {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-xs);
        }

        .select-filter-row input {
            flex: 1;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
        }

        .select-filter-row input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        .package-combo-list {
            min-height: 60px;
        }
        .select-combo-select {
            width: 100%;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
            background: #fff;
        }
        .select-combo-select:disabled {
            background: var(--color-neutral-100);
            color: var(--color-text-secondary);
        }

        @media (max-width: 900px) {
            .page-header-toolbar-row {
                grid-template-columns: 1fr;
                justify-items: stretch;
            }
            .page-header-toolbar-row .tabs-nav.tabs-nav-inline {
                grid-column: 1;
                justify-self: center;
                order: -1;
            }
            .page-header-toolbar-row .header-actions {
                justify-self: start;
                justify-content: flex-start;
            }
            .header-toolbar-right {
                grid-column: 1;
                justify-self: stretch;
                justify-content: flex-start;
            }
            .header-quick-search {
                flex: 1;
                min-width: 200px;
                max-width: 390px;
            }
        }

        @media (max-width: 1200px) {
            .package-edit-layout {
                flex-direction: column;
            }

            .package-edit-left {
                border-right: none;
                border-bottom: 1px solid var(--color-neutral-200);
                padding-right: 0;
                padding-bottom: var(--spacing-md);
            }
        }
    </style>
</head>
<body>
    <div class="package-list-page">
        <!-- 顶栏：左操作 | 中 Tab | 右搜索 + 更多搜索 -->
        <div class="page-header page-header-stacked">
            <div class="page-header-toolbar-row">
                <div class="header-actions">
                    <button class="btn btn-primary" id="createPackageBtn">新建套餐</button>
                    <button class="btn btn-outline" id="batchImportBtn">批量导入</button>
                    <div class="export-dropdown">
                        <button class="btn btn-primary" id="exportBtn">套餐导出</button>
                        <div class="export-dropdown-menu" id="exportMenu">
                            <button class="export-dropdown-item" data-export-type="all">全部导出</button>
                            <button class="export-dropdown-item" data-export-type="selected">选中导出</button>
                        </div>
                    </div>
                    <button class="btn btn-primary">更新销量</button>
                </div>
                <div class="tabs-nav tabs-nav-inline">
                    <button class="tab-nav-item active" data-tab="all">全部</button>
                    <button class="tab-nav-item" data-tab="selling">销售中</button>
                    <button class="tab-nav-item" data-tab="offline">下架中</button>
                    <button class="tab-nav-item" data-tab="soldout">售罄</button>
                </div>
                <div class="header-toolbar-right">
                    <div class="header-quick-search">
                        <input type="text" id="searchInput" placeholder="支持输入套餐ID或名称搜索" autocomplete="off">
                    </div>
                    <button type="button" class="btn btn-outline" id="toggleMoreSearchBtn" aria-expanded="false" aria-controls="moreSearchPanel">更多搜索</button>
                </div>
            </div>
            <div id="moreSearchPanel" class="more-search-panel" aria-hidden="true">
                <div class="more-search-grid">
                    <div class="more-search-field more-search-field-span2">
                        <label>添加时间</label>
                        <div class="more-search-date-range">
                            <input type="date" id="startDate" value="2025-01-01">
                            <span>至</span>
                            <input type="date" id="endDate" value="2025-12-31">
                        </div>
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchPkgId">套餐ID</label>
                        <input type="text" id="moreSearchPkgId" placeholder="支持模糊匹配" autocomplete="off">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchPkgName">套餐名称</label>
                        <input type="text" id="moreSearchPkgName" placeholder="名称关键字" autocomplete="off">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchPriceMin">套餐价格 ≥</label>
                        <input type="number" id="moreSearchPriceMin" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchPriceMax">套餐价格 ≤</label>
                        <input type="number" id="moreSearchPriceMax" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchOriginMin">原价合计 ≥</label>
                        <input type="number" id="moreSearchOriginMin" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchOriginMax">原价合计 ≤</label>
                        <input type="number" id="moreSearchOriginMax" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchSaveMin">节省金额 ≥</label>
                        <input type="number" id="moreSearchSaveMin" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchSaveMax">节省金额 ≤</label>
                        <input type="number" id="moreSearchSaveMax" placeholder="元" step="0.01" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchItemMin">商品数量 ≥</label>
                        <input type="number" id="moreSearchItemMin" placeholder="件" step="1" min="0">
                    </div>
                    <div class="more-search-field">
                        <label for="moreSearchItemMax">商品数量 ≤</label>
                        <input type="number" id="moreSearchItemMax" placeholder="件" step="1" min="0">
                    </div>
                </div>
            </div>
        </div>

        <!-- 批量操作区域（常显） -->
        <div class="batch-actions" id="batchActions">
            <span class="selected-count">已选择 <span id="selectedCount">0</span> 项</span>
            <button class="btn btn-outline" id="batchOnlineBtn">批量上架</button>
            <button class="btn btn-outline" id="batchOfflineBtn">批量下架</button>
            <button class="btn btn-outline" id="batchDeleteBtn">批量删除</button>
        </div>

        <!-- 表格容器 -->
        <div class="table-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <input type="checkbox" id="selectAll">
                            </th>
                            <th class="sortable" data-sort="id">套餐ID</th>
                            <th>套餐名称</th>
                            <th>套餐价格</th>
                            <th>原价合计</th>
                            <th>节省金额</th>
                            <th>商品数量</th>
                            <th>添加时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="packageTableBody">
                        <!-- 数据由JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
            <!-- 分页 -->
            <div class="pagination">
                <div class="pagination-info">
                    共 <span id="totalCount">0</span> 条数据，每页显示 10 条
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" disabled>上一页</button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn" disabled>下一页</button>
                </div>
            </div>
        </div>

        <!-- 新建/编辑套餐弹窗 -->
        <div class="modal-overlay" id="packageModalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="packageModalTitle">新建套餐</h3>
                    <button class="modal-close" id="packageModalClose">
                        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="package-edit-layout" id="packageEditLayout">
                        <!-- 左侧：选择商品（默认隐藏，点击「添加商品」展开，此时仅显示本区域） -->
                        <section class="package-edit-left hidden" id="packageEditLeftPanel">
                            <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                                <button type="button" class="btn btn-outline product-panel-close" id="productPanelClose">关闭</button>
                                <div class="section-title-sm">选择商品</div>
                                <div class="section-desc-sm">左侧选类型，右侧勾选商品；勾选后加入当前组合。点「关闭」返回套餐编辑。</div>
                                <div class="select-filter-row">
                                    <input type="text" id="productSearchInput" placeholder="搜索商品名称或ID" autocomplete="off">
                                </div>
                                <div class="product-picker-body">
                                    <aside class="picker-category-list" id="pickerCategoryList" role="tablist" aria-label="商品类型"></aside>
                                    <div class="picker-product-panel">
                                        <div class="picker-product-list" id="pickerProductList"></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- 右侧：套餐信息 + 套餐内组合（可增删）+ 价格设置 -->
                        <section class="package-edit-right">
                            <div>
                                <div class="section-title-sm">套餐基础信息</div>
                                <div class="package-base-info">
                                    <div class="package-thumb-placeholder" id="packageThumbPlaceholder">🧩</div>
                                    <div style="flex: 1;">
                                        <div class="form-field-inline">
                                            <label for="packageNameInput">套餐名称 <span style="color: var(--color-error);">*</span></label>
                                            <input type="text" id="packageNameInput" placeholder="请输入套餐名称">
                                        </div>
                                        <div class="section-desc-sm">暂不接入真实上传，当前示例以占位图表示套餐主图。</div>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div class="section-title-sm">套餐内组合</div>
                                <div class="section-desc-sm" style="margin-bottom: 8px;">可为每个组合设置标题、必选规则（几选几，与参数模板联动），点击「添加商品」按类型勾选商品。</div>
                                <div id="packageCombosContainer"></div>
                                <button type="button" class="add-combo-btn" id="addComboBtn">+ 添加组合</button>
                            </div>

                            <div>
                                <div class="section-title-sm">套餐价格设置</div>
                                <div class="form-field-inline">
                                    <label for="packagePriceInput">套餐售价 <span style="color: var(--color-error);">*</span></label>
                                    <input type="number" id="packagePriceInput" min="0" step="0.01" placeholder="请输入套餐售价">
                                </div>
                                <div class="package-summary" id="packageSummary">
                                    <span>原价合计：<strong id="originPriceText">¥0.00</strong></span>
                                    <span>套餐售价：<strong id="packagePriceText">¥0.00</strong></span>
                                    <span>节省金额：<strong id="saveAmountText">¥0.00</strong></span>
                                    <span id="packageValidationText" class="text-danger" style="display:none;"></span>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" id="packageModalCancel">取消</button>
                    <button class="btn btn-primary" id="packageModalConfirm">保存套餐</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 商品数据（与商超商品列表对齐，含分类供选品左侧「商品类型」）
        const products = [
            { id: 1, name: '雅安特产绿营养蛋', category: '雅安好景', image: '../../images/01.jpg', price: 20.00 },
            { id: 2, name: '土司农家散养蛋', category: '雅安好景', image: '../../images/02.jpg', price: 18.00 },
            { id: 5, name: '蒙顶山茶', category: '雅安好景', image: '../../images/05.jpg', price: 49.00 },
            { id: 7, name: '花椒油', category: '雅安好景', image: '../../images/01.jpg', price: 15.00 },
            { id: 6, name: '雅鱼鲜礼盒', category: '雅安好景', image: '../../images/06.jpg', price: 68.00 },
            { id: 13, name: '雅安蜂蜜', category: '雅安好物', image: '../../images/01.jpg', price: 38.00 },
            { id: 14, name: '雅安黑茶', category: '雅安好物', image: '../../images/02.jpg', price: 88.00 },
            { id: 15, name: '雅安菌菇干货', category: '雅安好物', image: '../../images/03.jpg', price: 45.00 },
            { id: 8, name: '熊猫周边玩偶', category: '文创产品', image: '../../images/02.jpg', price: 28.00 },
            { id: 12, name: '精品礼盒装', category: '文创产品', image: '../../images/06.jpg', price: 268.00 }
        ];

        // 套餐数据（与商超商品列表中的商品名称/ID 对应）
        const packages = [
            {
                id: 1001,
                name: '雅安好景经典礼盒套餐',
                image: '../../images/01.jpg',
                // 套餐售价 < 原价合计（20 + 49 = 69）
                price: 59.00,
                originPrice: 69.00,
                items: [
                    { productId: 1, name: '雅安特产绿营养蛋', image: '../../images/01.jpg', price: 20.00, quantity: 1 },
                    { productId: 5, name: '蒙顶山茶', image: '../../images/05.jpg', price: 49.00, quantity: 1 }
                ],
                status: 'selling',
                addTime: '2025-08-26'
            },
            {
                id: 1002,
                name: '雅安好物蜂蜜菌菇套餐',
                image: '../../images/03.jpg',
                // 套餐售价 < 原价合计（38 + 45 = 83）
                price: 69.00,
                originPrice: 83.00,
                items: [
                    { productId: 13, name: '雅安蜂蜜', image: '../../images/01.jpg', price: 38.00, quantity: 1 },
                    { productId: 15, name: '雅安菌菇干货', image: '../../images/03.jpg', price: 45.00, quantity: 1 }
                ],
                status: 'offline',
                addTime: '2025-08-20'
            }
        ];

        let filteredPackages = [...packages];
        let currentTab = 'all';
        let sortColumn = null;
        let sortDirection = 'asc';

        // 新建/编辑套餐时的临时状态
        let editingPackageId = null;
        // combos: [{ id, title, total, required, items: [{ productId, name, image, price, quantity }] }]
        let packageCombos = [];
        let comboIdCounter = 1;
        let addingToComboIndex = -1; // 当前正在为哪个组合添加商品
        let pickerSelectedCategory = '全部'; // 选品面板左侧当前类型
        const packageTableBody = document.getElementById('packageTableBody');

        // 从参数模板读取默认几选几
        function getParamTemplateDefault() {
            try {
                var s = localStorage.getItem('shangchaoParamTemplate');
                if (s) {
                    var d = JSON.parse(s);
                    return { total: d.chooseTotal || 2, required: d.chooseCount || 1 };
                }
            } catch (e) {}
            return { total: 2, required: 1 };
        }

        // 渲染套餐表格
        function renderPackageTable() {
            packageTableBody.innerHTML = '';

            filteredPackages.forEach(pkg => {
                const tr = document.createElement('tr');
                const itemCount = pkg.items ? pkg.items.reduce((sum, item) => sum + (item.quantity || 0), 0) : 0;
                const saveAmount = (pkg.originPrice - pkg.price).toFixed(2);
                tr.dataset.id = pkg.id;
                tr.innerHTML = `
                    <td class="checkbox-cell">
                        <input type="checkbox" class="row-checkbox" data-id="${pkg.id}">
                    </td>
                    <td>${pkg.id}</td>
                    <td>
                        <div class="package-info">
                            <img src="${pkg.image || '../../images/01.jpg'}" alt="${pkg.name}" class="package-image" onerror="this.src='../../images/01.jpg'">
                            <span class="package-name" data-id="${pkg.id}">${pkg.name}</span>
                        </div>
                    </td>
                    <td>
                        <span class="price">¥${pkg.price.toFixed(2)}</span>
                    </td>
                    <td>
                        <span class="origin-price">¥${pkg.originPrice.toFixed(2)}</span>
                    </td>
                    <td>
                        <span class="save-amount">省 ¥${saveAmount}</span>
                    </td>
                    <td>${itemCount}</td>
                    <td>${pkg.addTime}</td>
                    <td>
                        <span class="status-tag ${
                            pkg.status === 'offline'
                                ? 'offline'
                                : pkg.status === 'soldout'
                                ? 'soldout'
                                : ''
                        }">
                            ${
                                pkg.status === 'selling'
                                    ? '销售中'
                                    : pkg.status === 'offline'
                                    ? '下架中'
                                    : '售罄'
                            }
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-icon edit-btn" data-id="${pkg.id}" title="编辑">
                                <svg viewBox="0 0 16 16" fill="currentColor">
                                    <path d="M11.013 1.427a1.75 1.75 0 012.474 0l1.086 1.086a1.75 1.75 0 010 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 01-.927-.928l.929-3.25a1.75 1.75 0 01.445-.758l8.61-8.61zm1.414 1.06a.25.25 0 00-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 000-.354l-1.086-1.086zM11.189 6.25L9.75 4.81l-6.286 6.287a.25.25 0 00-.064.108l-.558 1.953 1.953-.558a.249.249 0 00.108-.064l6.286-6.286z"/>
                                </svg>
                            </button>
                            <button class="btn-icon copy-btn" data-id="${pkg.id}" title="复制">
                                <svg viewBox="0 0 16 16" fill="currentColor">
                                    <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/>
                                    <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/>
                                </svg>
                            </button>
                            <button class="btn-icon link-btn" data-id="${pkg.id}" title="链接">
                                <svg viewBox="0 0 16 16" fill="currentColor">
                                    <path d="M4.354 5.5H3a3 3 0 000 6h3a3 3 0 002.83-2H7.83A1.5 1.5 0 016 10.5H3a1.5 1.5 0 010-3h1.354a.75.75 0 000-1.5z"/>
                                    <path d="M13 4.5h-3a3 3 0 00-2.83 2h1.999A1.5 1.5 0 0110 6h3a1.5 1.5 0 010 3h-1.354a.75.75 0 000 1.5H13a3 3 0 000-6z"/>
                                </svg>
                            </button>
                            <button class="btn-icon delete delete-btn" data-id="${pkg.id}" title="删除">
                                <svg viewBox="0 0 16 16" fill="currentColor">

                                    <path fill-rule="evenodd" d="M14.5 3a1 1 0 01-1 1H13v9a2 2 0 01-2 2H5a2 2 0 01-2-2V4h-.5a1 1 0 01-1-1V2a1 1 0 011-1H6a1 1 0 011-1h2a1 1 0 011 1h3.5a1 1 0 011 1v1zM4.118 4L4 4.059V13a1 1 0 001 1h6a1 1 0 001-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                `;
                packageTableBody.appendChild(tr);
            });

            document.getElementById('totalCount').textContent = filteredPackages.length;
            updateSelectedCount();
        }

        // Tab切换
        document.querySelectorAll('.tab-nav-item').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.tab-nav-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                filterPackages();
            });
        });

        function getPackageItemCount(pkg) {
            return pkg.items ? pkg.items.reduce(function (sum, item) { return sum + (item.quantity || 0); }, 0) : 0;
        }

        // 筛选 + 排序
        function filterPackages() {
            const searchEl = document.getElementById('searchInput');
            const search = (searchEl && searchEl.value || '').trim().toLowerCase();

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const moreId = (document.getElementById('moreSearchPkgId').value || '').trim();
            const moreName = (document.getElementById('moreSearchPkgName').value || '').trim().toLowerCase();
            const priceMin = parseFloat(document.getElementById('moreSearchPriceMin').value);
            const priceMax = parseFloat(document.getElementById('moreSearchPriceMax').value);
            const originMin = parseFloat(document.getElementById('moreSearchOriginMin').value);
            const originMax = parseFloat(document.getElementById('moreSearchOriginMax').value);
            const saveMin = parseFloat(document.getElementById('moreSearchSaveMin').value);
            const saveMax = parseFloat(document.getElementById('moreSearchSaveMax').value);
            const itemMin = parseInt(document.getElementById('moreSearchItemMin').value, 10);
            const itemMax = parseInt(document.getElementById('moreSearchItemMax').value, 10);

            filteredPackages = packages.filter(pkg => {
                // Tab状态
                if (currentTab === 'selling' && pkg.status !== 'selling') return false;
                if (currentTab === 'offline' && pkg.status !== 'offline') return false;
                if (currentTab === 'soldout' && pkg.status !== 'soldout') return false;

                // 顶栏快捷搜索：套餐ID、名称
                if (search) {
                    if (!String(pkg.id).includes(search) && !pkg.name.toLowerCase().includes(search)) {
                        return false;
                    }
                }

                // 更多搜索：添加时间
                if (startDate && pkg.addTime < startDate) return false;
                if (endDate && pkg.addTime > endDate) return false;

                if (moreId && !String(pkg.id).includes(moreId)) return false;
                if (moreName && !pkg.name.toLowerCase().includes(moreName)) return false;

                if (!isNaN(priceMin) && pkg.price < priceMin) return false;
                if (!isNaN(priceMax) && pkg.price > priceMax) return false;
                if (!isNaN(originMin) && pkg.originPrice < originMin) return false;
                if (!isNaN(originMax) && pkg.originPrice > originMax) return false;

                var saveAmt = pkg.originPrice - pkg.price;
                if (!isNaN(saveMin) && saveAmt < saveMin) return false;
                if (!isNaN(saveMax) && saveAmt > saveMax) return false;

                var ic = getPackageItemCount(pkg);
                if (!isNaN(itemMin) && ic < itemMin) return false;
                if (!isNaN(itemMax) && ic > itemMax) return false;

                return true;
            });

            // 排序
            if (sortColumn) {
                filteredPackages.sort((a, b) => {
                    let aVal = a[sortColumn];
                    let bVal = b[sortColumn];
                    if (typeof aVal === 'string') {
                        aVal = aVal.toLowerCase();
                        bVal = bVal.toLowerCase();
                    }
                    if (sortDirection === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
            }

            renderPackageTable();
        }

        // 排序事件
        document.querySelectorAll('.sortable').forEach(th => {
            th.addEventListener('click', function () {
                const column = this.dataset.sort;
                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'asc';
                }

                document.querySelectorAll('.sortable').forEach(t => t.classList.remove('asc', 'desc'));
                this.classList.add(sortDirection);

                filterPackages();
            });
        });

        // 全选

        document.addEventListener('change', function (e) {

        // 更新选中数量（批量操作条常显，只更新数字）
        function updateSelectedCount() {

            document.getElementById('selectedCount').textContent = count;
        }

        (function () {

        document.getElementById('searchInput').addEventListener('input', filterPackages);

        // 批量操作（示例：仅修改本地状态）
        function getSelectedPackageIds() {
            const ids = [];
            document.querySelectorAll('.row-checkbox:checked').forEach(cb => {
                ids.push(parseInt(cb.dataset.id, 10));
            });
            return ids;
        }

        document.getElementById('batchOnlineBtn').addEventListener('click', function () {
            const ids = getSelectedPackageIds();

        document.getElementById('batchOfflineBtn').addEventListener('click', function () {
            const ids = getSelectedPackageIds();

            packages.forEach(p => {
                if (ids.includes(p.id)) {
                    p.status = 'offline';
                }
            });

        document.getElementById('batchDeleteBtn').addEventListener('click', function () {
            const ids = getSelectedPackageIds();
            if (!ids.length) return;
            if (!confirm('确定要删除选中的套餐吗？')) return;
            for (let i = packages.length - 1; i >= 0; i--) {

        // 新建/编辑套餐弹窗相关
        const packageModal = document.getElementById('packageModalOverlay');
        const packageModalTitle = document.getElementById('packageModalTitle');
        const packageModalClose = document.getElementById('packageModalClose');
        const packageModalCancel = document.getElementById('packageModalCancel');
        const packageModalConfirm = document.getElementById('packageModalConfirm');
        const packageNameInput = document.getElementById('packageNameInput');
        const packagePriceInput = document.getElementById('packagePriceInput');
        const productSearchInput = document.getElementById('productSearchInput');
        const pickerCategoryList = document.getElementById('pickerCategoryList');

        function setProductPickerOpen(isOpen) {
            if (packageEditLayout) packageEditLayout.classList.toggle('picker-open', !!isOpen);

        function openPackageModal(isEdit = false, pkg = null) {
            editingPackageId = isEdit && pkg ? pkg.id : null;
            addingToComboIndex = -1;
            setProductPickerOpen(false);
            if (packageEditLeftPanel) packageEditLeftPanel.classList.add('hidden');

            if (isEdit && pkg) {
                packageModalTitle.textContent = '编辑套餐';

                packageCombos = [];
                var def = getParamTemplateDefault();
                if (pkg.combo1 && pkg.combo1.items) {
                    packageCombos.push({
                        id: comboIdCounter++,
                        title: pkg.combo1.title || '组合一',
                        total: pkg.combo1.total || 2,
                        required: pkg.combo1.required != null ? pkg.combo1.required : 1,
                        requiredEnabled: pkg.combo1.requiredEnabled !== false,
                        items: pkg.combo1.items.map(i => ({ productId: i.productId, name: i.name, image: i.image, price: i.price, quantity: i.quantity || 1, required: i.required === true, limited: i.limited !== false }))
                    });
                }
                if (pkg.combo2 && pkg.combo2.items) {
                    packageCombos.push({
                        id: comboIdCounter++,
                        title: pkg.combo2.title || '组合二',
                        total: pkg.combo2.total || 8,
                        required: pkg.combo2.required != null ? pkg.combo2.required : 6,
                        requiredEnabled: pkg.combo2.requiredEnabled !== false,
                        items: pkg.combo2.items.map(i => ({ productId: i.productId, name: i.name, image: i.image, price: i.price, quantity: i.quantity || 1, required: i.required === true, limited: i.limited !== false }))
                    });
                }
                if (!packageCombos.length && pkg.items && pkg.items.length) {
                    var half = Math.ceil(pkg.items.length / 2);
                    var normIt = function (it) {
                        return {
                            productId: it.productId,
                            name: it.name,
                            image: it.image,
                            price: it.price,
                            quantity: it.quantity || 1,
                            required: !!it.required,
                            limited: it.limited !== false
                        };
                    };
                    packageCombos = [
                        { id: comboIdCounter++, title: '组合一', total: 2, required: 1, requiredEnabled: true, items: pkg.items.slice(0, half).map(normIt) },
                        { id: comboIdCounter++, title: '组合二', total: 8, required: 6, requiredEnabled: true, items: pkg.items.slice(half).map(normIt) }
                    ];
                }
            } else {
                packageModalTitle.textContent = '新建套餐';
                packageNameInput.value = '';
                packagePriceInput.value = '';
                var def = getParamTemplateDefault();
                packageCombos = [{ id: comboIdCounter++, title: '组合一', total: def.total, required: def.required, requiredEnabled: true, items: [] }];
            }
            if (productSearchInput) productSearchInput.value = '';
            renderCombosBlocks();
            updatePriceSummary();
            packageValidationText.style.display = 'none';
            packageValidationText.textContent = '';
            packageModal.classList.add('show');

        function closePackageModal() {
            addingToComboIndex = -1;

        // 套餐导出下拉菜单
        const exportBtn = document.getElementById('exportBtn');

            exportMenu.addEventListener('click', function (e) {

                const type = target.dataset.exportType;
                if (type === 'all') {
                    alert('执行“全部导出”逻辑，这里可以生成并下载包含全部套餐的文件。');
                } else if (type === 'selected') {

                        alert('请先勾选需要导出的套餐。');

            document.addEventListener('click', function () {

        // 渲染组合区块（可增删、含添加商品按钮）
        function renderCombosBlocks() {
            if (!packageCombosContainer) return;
            packageCombosContainer.innerHTML = '';
            packageCombos.forEach((combo, idx) => {
                var block = document.createElement('div');
                block.className = 'combo-block';

                    '<input type="number" class="combo-required-input" min="1" max="' + total + '" value="' + required + '" title="顾客下单时从中选几个">' +
                    '</span>' +
                    '<button type="button" class="btn-add-product" data-combo-index="' + idx + '">+ 添加商品</button>' +
                    (packageCombos.length > 1 ? '<button type="button" class="btn-remove-combo" data-combo-index="' + idx + '">删除组合</button>' : '') +
                    '</div>' +
                    '<div class="package-selected-list package-combo-list" id="comboList' + idx + '"></div>' +
                    '<div class="section-desc-sm" id="comboTips' + idx + '">' + (combo.items.length ? '' : '暂未选择商品，请点击「添加商品」从商品列表中选择。') + '</div>';
                packageCombosContainer.appendChild(block);

                var listEl = block.querySelector('.package-selected-list');
                var tipsEl = block.querySelector('.section-desc-sm');
                combo.items.forEach(function (item) {
                    var div = document.createElement('div');
                    div.className = 'package-selected-item';
                    div.dataset.productId = item.productId;
                    div.dataset.comboIndex = idx;
                    var limited = item.limited !== false;
                    div.innerHTML = '<div class="package-selected-main"><img src="' + (item.image || '../../images/01.jpg') + '" alt="" onerror="this.src=\'../../images/01.jpg\'"><div><div class="package-selected-name">' + item.name + '</div><div class="package-selected-sub">单价：¥' + (item.price ? item.price.toFixed(2) : '0.00') + '</div></div></div>' +
                        '<div class="package-selected-actions">' +
                        '<label class="combo-item-flag-wrap"><input type="checkbox" class="combo-item-required-cb" data-product-id="' + item.productId + '" data-combo-index="' + idx + '"' + (item.required ? ' checked' : '') + '> 必选</label>' +
                        '<label class="combo-item-flag-wrap"><input type="checkbox" class="combo-item-limited-cb" data-product-id="' + item.productId + '" data-combo-index="' + idx + '"' + (limited ? ' checked' : '') + '> 限量</label>' +
                        '<span class="combo-item-qty-wrap"><span>数量</span><input type="number" min="1" class="selected-qty-input" data-product-id="' + item.productId + '" data-combo-index="' + idx + '" value="' + (item.quantity || 1) + '"' + (limited ? '' : ' disabled') + '></span>' +
                        '<span class="package-selected-remove" data-product-id="' + item.productId + '" data-combo-index="' + idx + '">移除</span>' +
                        '</div>';
                    listEl.appendChild(div);
                });
                tipsEl.style.display = combo.items.length ? 'none' : 'block';

                block.querySelector('.combo-total-input').addEventListener('input', function () {
                    var v = Math.max(1, parseInt(this.value, 10) || 1);

                    var req = block.querySelector('.combo-required-input');
                    req.max = v;
                    if (parseInt(req.value, 10) > v) req.value = v;
                    combo.required = Math.min(parseInt(req.value, 10) || 1, v);
                });
                block.querySelector('.combo-required-input').addEventListener('input', function () {

            pickerCategoryList.innerHTML = '';
            getProductCategoryNames().forEach(function (cat) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'picker-category-item' + (cat === pickerSelectedCategory ? ' active' : '');

                btn.textContent = cat;

        function renderPickerProductList() {
            if (!pickerProductList) return;
            var combo = addingToComboIndex >= 0 && addingToComboIndex < packageCombos.length ? packageCombos[addingToComboIndex] : null;
            var keyword = (productSearchInput && productSearchInput.value || '').trim().toLowerCase();
            var inComboIds = combo ? combo.items.map(function (i) { return i.productId; }) : [];

            pickerProductList.innerHTML = '';
            var list = products.filter(function (p) {
                var cat = p.category || '未分类';
                if (pickerSelectedCategory !== '全部' && cat !== pickerSelectedCategory) return false;

                return true;
            });

            if (!list.length) {

                empty.className = 'picker-product-empty';

        function renderProductPicker() {
            renderPickerCategories();

        if (pickerCategoryList) {
            pickerCategoryList.addEventListener('click', function (e) {
                var item = e.target.closest('.picker-category-item');

        if (pickerProductList) {
            pickerProductList.addEventListener('change', function (e) {
                if (!e.target.classList.contains('picker-product-cb')) return;
                if (addingToComboIndex < 0 || addingToComboIndex >= packageCombos.length) return;
                var pid = parseInt(e.target.dataset.id, 10);
                var checked = e.target.checked;
                var combo = packageCombos[addingToComboIndex];
                if (!combo) return;
                if (checked) {
                    if (!combo.items.some(function (i) { return i.productId === pid; })) {
                        var p = products.find(function (x) { return x.id === pid; });
                        if (p) {
                            combo.items.push({
                                productId: p.id,
                                name: p.name,
                                image: p.image,
                                price: p.price,
                                quantity: 1,
                                required: false,
                                limited: true
                            });
                        }
                    }
                } else {
                    combo.items = combo.items.filter(function (i) { return i.productId !== pid; });
                }
                renderCombosBlocks();
                updatePriceSummary();
            });

        if (productSearchInput) {
            productSearchInput.addEventListener('input', function () {
                if (packageEditLeftPanel && !packageEditLeftPanel.classList.contains('hidden')) {

        document.addEventListener('input', function (e) {
            if (e.target.classList.contains('selected-qty-input')) {
                if (e.target.disabled) return;
                var pid = parseInt(e.target.dataset.productId, 10);
                var idx = parseInt(e.target.dataset.comboIndex, 10);
                var qty = Math.max(1, parseInt(e.target.value, 10) || 1);
                e.target.value = qty;
                var combo = packageCombos[idx];
                if (combo) {
                    var item = combo.items.find(function (i) { return i.productId === pid; });
                    if (item) { item.quantity = qty; updatePriceSummary(); }
                }
            }
        });

        document.addEventListener('change', function (e) {
            if (e.target.classList.contains('combo-item-required-cb')) {
                var pid = parseInt(e.target.dataset.productId, 10);
                var idx = parseInt(e.target.dataset.comboIndex, 10);
                var combo = packageCombos[idx];
                if (combo) {
                    var item = combo.items.find(function (i) { return i.productId === pid; });
                    if (item) item.required = e.target.checked;
                }
            }
            if (e.target.classList.contains('combo-item-limited-cb')) {
                var pid = parseInt(e.target.dataset.productId, 10);
                var idx = parseInt(e.target.dataset.comboIndex, 10);
                var combo = packageCombos[idx];
                if (combo) {
                    var item = combo.items.find(function (i) { return i.productId === pid; });
                    if (item) {
                        item.limited = e.target.checked;
                        var row = e.target.closest('.package-selected-item');
                        var qtyIn = row ? row.querySelector('.selected-qty-input') : null;
                        if (qtyIn) {
                            qtyIn.disabled = !item.limited;
                            if (!item.limited) {
                                item.quantity = 1;
                                qtyIn.value = '1';
                            }
                        }
                        updatePriceSummary();
                    }
                }
            }
        });

        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('package-selected-remove')) {
                var pid = parseInt(e.target.dataset.productId, 10);
                var idx = parseInt(e.target.dataset.comboIndex, 10);
                var combo = packageCombos[idx];
                if (combo) {
                    combo.items = combo.items.filter(function (i) { return i.productId !== pid; });
                    renderCombosBlocks();
                    updatePriceSummary();
                    if (addingToComboIndex === idx && pickerProductList && packageEditLeftPanel && !packageEditLeftPanel.classList.contains('hidden')) {
                        renderPickerProductList();
                    }
                }
            }
        });


        function calculateOriginPrice() {
            var total = 0;
            packageCombos.forEach(function (combo) {
                (combo.items || []).forEach(function (item) {
                    var q = (item.limited !== false) ? (item.quantity || 1) : 1;
                    total += (item.price || 0) * q;
                });
            });
            return total;
        }

        function updatePriceSummary() {
            const originPrice = calculateOriginPrice();
            originPriceText.textContent = '¥' + originPrice.toFixed(2);

            let packagePrice = parseFloat(packagePriceInput.value);
            if (isNaN(packagePrice)) {
                packagePrice = 0;
            }
            packagePriceText.textContent = '¥' + packagePrice.toFixed(2);

            const saveAmount = Math.max(0, originPrice - packagePrice);
            saveAmountText.textContent = '¥' + saveAmount.toFixed(2);

            if (packageValidationText) {
                packageValidationText.style.display = 'none';
                packageValidationText.textContent = '';
            }
        }

        packagePriceInput.addEventListener('input', updatePriceSummary);

        if (packageModalConfirm) {
            packageModalConfirm.addEventListener('click', function () {
                if (packageEditLayout && packageEditLayout.classList.contains('picker-open')) {
                    addingToComboIndex = -1;
                    setProductPickerOpen(false);
                    if (packageEditLeftPanel) packageEditLeftPanel.classList.add('hidden');
                    return;
                }

                var name = packageNameInput.value.trim();
                var price = parseFloat(packagePriceInput.value);
                var originPrice = calculateOriginPrice();
                var allItems = [];

                if (!name) {
                    name = '未命名套餐';
                }
                if (!packageCombos.length) {
                    packageCombos.push({ id: comboIdCounter++, title: '组合一', total: 2, required: 1, requiredEnabled: true, items: [] });
                }
                for (var i = 0; i < packageCombos.length; i++) {
                    var combo = packageCombos[i];
                    var title = (combo.title || '').trim();
                    if (!title) {
                        combo.title = '组合' + (i + 1);
                    }
                    combo.items.forEach(function (it) { allItems.push(it); });
                }
                if (isNaN(price) || price <= 0) {
                    price = originPrice;
                }
                if (isNaN(price) || price < 0) {
                    price = 0;
                }

                price = parseFloat(price.toFixed(2));
                var addTime = new Date().toISOString().slice(0, 10);
                var combosData = packageCombos.map(function (c) {
                    return { title: c.title, total: c.total, required: c.required, requiredEnabled: c.requiredEnabled !== false, items: c.items.map(function (i) {
                        return { productId: i.productId, name: i.name, image: i.image, price: i.price, quantity: i.quantity || 1, required: !!i.required, limited: i.limited !== false };
                    })};
                });

                if (editingPackageId) {
                    var pkg = packages.find(function (p) { return p.id === editingPackageId; });
                    if (pkg) {
                        pkg.name = name;
                        pkg.price = price;
                        pkg.originPrice = parseFloat(originPrice.toFixed(2));
                        pkg.combos = combosData;
                        pkg.combo1 = combosData[0] || null;
                        pkg.combo2 = combosData[1] || null;
                        pkg.items = allItems;
                    }
                } else {
                    var newId = packages.length ? Math.max.apply(null, packages.map(function (p) { return p.id; })) + 1 : 1001;
                    packages.unshift({
                        id: newId,
                        name: name,
                        image: (allItems[0] && allItems[0].image) ? allItems[0].image : '../../images/01.jpg',
                        price: price,
                        originPrice: parseFloat(originPrice.toFixed(2)),
                        combos: combosData,
                        combo1: combosData[0] || null,
                        combo2: combosData[1] || null,
                        items: allItems,
                        status: 'selling',
                        addTime: addTime
                    });
                }
                filterPackages();
                closePackageModal();
            });
        }

        // 列表上的编辑、复制、删除按钮
        document.addEventListener('click', function (e) {
            const editBtn = e.target.closest('.edit-btn');
            const copyBtn = e.target.closest('.copy-btn');
            const deleteBtn = e.target.closest('.delete-btn');
            const nameEl = e.target.closest('.package-name');

            if (editBtn) {
                const id = parseInt(editBtn.dataset.id, 10);
                const pkg = packages.find(p => p.id === id);
                if (pkg) {
                    openPackageModal(true, pkg);
                }
            }

            if (nameEl) {
                const id = parseInt(nameEl.dataset.id, 10);
                const pkg = packages.find(p => p.id === id);
                if (pkg) {
                    openPackageModal(true, pkg);
                }
            }

            if (copyBtn) {
                const id = parseInt(copyBtn.dataset.id, 10);
                const pkg = packages.find(p => p.id === id);
                if (pkg) {
                    const newId = packages.length ? Math.max(...packages.map(p => p.id)) + 1 : 1001;
                    const now = new Date();
                    const addTime = now.toISOString().slice(0, 10);
                    const copied = JSON.parse(JSON.stringify(pkg));
                    copied.id = newId;
                    copied.name = pkg.name + ' - 副本';
                    copied.addTime = addTime;
                    packages.unshift(copied);
                    filterPackages();
                }
            }

            if (deleteBtn) {
                const id = parseInt(deleteBtn.dataset.id, 10);
                if (!confirm('确定要删除该套餐吗？')) return;
                const index = packages.findIndex(p => p.id === id);
                if (index > -1) {
                    packages.splice(index, 1);
                    filterPackages();
                }
            }
        });

        // 初始化
        filterPackages();
    </script>
</body>
</html>
