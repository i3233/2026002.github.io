<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购入库 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .purchase-storage-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-lg);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        .page-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0;
        }

        .page-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-xs);
        }

        /* 采购计划列表 + 订单选择区域 */
        .order-select-section {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }
        .plan-list-table { margin-bottom: 0; }
        .plan-list-table tbody tr:hover { background-color: var(--color-neutral-50); }
        .plan-list-table tbody tr.selected { background-color: rgba(44, 131, 235, 0.1); }
        .plan-list-clickable { cursor: pointer; }
        .plan-list-actions { white-space: nowrap; }
        .plan-list-actions .btn-text { padding: 2px 8px; font-size: var(--font-size-sm); }

        .order-select-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .order-select-label {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            white-space: nowrap;
        }

        .order-select-wrapper {
            flex: 1;
            display: flex;
            gap: var(--spacing-sm);
            align-items: center;
        }

        .order-select-input {
            flex: 1;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .order-select-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        /* 订单信息卡片 */
        .order-info-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background-color: var(--color-neutral-50);
            border-radius: var(--radius-md);
            margin-top: var(--spacing-md);
        }

        .order-info-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .order-info-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .order-info-value {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        /* 商品明细表格 */
        .products-section {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .section-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--color-neutral-200);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--color-neutral-50);
        }

        th, td {
            padding: var(--spacing-md);
            text-align: left;
            font-size: var(--font-size-sm);
            border-bottom: 1px solid var(--color-neutral-200);
        }

        th {
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: var(--color-neutral-50);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .text-right {
            text-align: right;
        }

        /* 应付金额区域 */
        .payable-section {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .payable-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: var(--spacing-md);
            background-color: var(--color-neutral-50);
            border-radius: var(--radius-md);
            gap: var(--spacing-lg);
        }

        .payable-label {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            text-align: right;
        }

        .payable-value {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
        }

        .payable-change {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-xs);
            text-align: right;
        }

        /* 操作按钮区域 */
        .action-section {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        /* 提示信息 */
        .alert-info {
            padding: var(--spacing-md);
            background-color: rgba(23, 162, 184, 0.1);
            border-left: 4px solid var(--color-info);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
        }

        .alert-warning {
            padding: var(--spacing-md);
            background-color: rgba(255, 193, 7, 0.1);
            border-left: 4px solid var(--color-warning);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
        }

        /* 隐藏状态 */
        .hidden {
            display: none;
        }

        /* 入库单详情弹窗 */
        .order-detail-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .order-detail-modal-overlay.show { display: flex; }
        .order-detail-modal {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 92%;
            max-width: 720px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .order-detail-modal-head {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-detail-modal-head h3 { margin: 0; font-size: var(--font-size-lg); }
        .order-detail-modal-body {
            padding: var(--spacing-lg);
            overflow-y: auto;
            flex: 1;
        }
        .order-detail-section-title {
            margin: 0 0 var(--spacing-sm) 0;
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }
        .order-detail-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        .order-detail-info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .order-detail-info-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
        .order-detail-info-value { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
        .order-detail-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
        .order-detail-table th, .order-detail-table td { padding: var(--spacing-sm) var(--spacing-md); border-bottom: 1px solid var(--color-neutral-200); text-align: left; }
        .order-detail-table th { background: var(--color-neutral-50); font-weight: var(--font-weight-medium); }

    </style>
</head>
<body>
    <div class="purchase-storage-page">
        <!-- 入库订单列表（内容为采购计划列表） -->
        <div class="order-select-section">
            <h2 class="section-title" style="margin-top: 0;">入库订单列表</h2>
            <div class="table-container">
                <table class="plan-list-table">
                    <thead>
                        <tr>
                            <th>单号</th>
                            <th>日期</th>
                            <th>往来单位</th>
                            <th>项目</th>
                            <th class="text-right">订单金额</th>
                            <th class="text-right">应付余额</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="planListBody">
                        <!-- JS 渲染 -->
                    </tbody>
                </table>
            </div>

            <!-- 订单信息卡片（选中某条后显示） -->
            <div id="orderInfoCard" class="order-info-card hidden">
                <div class="order-info-item">
                    <span class="order-info-label">订单单号</span>
                    <span class="order-info-value" id="orderIdDisplay">-</span>
                </div>
                <div class="order-info-item">
                    <span class="order-info-label">订单日期</span>
                    <span class="order-info-value" id="orderDateDisplay">-</span>
                </div>
                <div class="order-info-item">
                    <span class="order-info-label">往来单位</span>
                    <span class="order-info-value" id="orderPartnerDisplay">-</span>
                </div>
                <div class="order-info-item">
                    <span class="order-info-label">项目</span>
                    <span class="order-info-value" id="orderProjectDisplay">-</span>
                </div>
                <div class="order-info-item">
                    <span class="order-info-label">订单金额</span>
                    <span class="order-info-value" id="orderAmountDisplay">-</span>
                </div>
                <div class="order-info-item">
                    <span class="order-info-label">应付余额</span>
                    <span class="order-info-value" id="orderPayableDisplay">-</span>
                </div>
            </div>
        </div>

        <!-- 商品明细表格 -->
        <div class="products-section" id="productsSection" style="display: none;">
            <h2 class="section-title">商品明细</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>商品名称</th>
                            <th>规格</th>
                            <th>单位</th>
                            <th>分类</th>
                            <th class="text-right">订单数量</th>
                            <th class="text-right">单价</th>
                            <th class="text-right">金额</th>
                            <th class="text-right">入库数量</th>
                            <th class="text-right">入库单价</th>
                            <th class="text-right">入库金额</th>
                            <th>条码</th>
                            <th>货区</th>
                            <th>货架</th>
                            <th>照片</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- 数据由JavaScript动态生成 -->
                    </tbody>
                    <tfoot>
                        <tr style="background-color: var(--color-neutral-50); font-weight: var(--font-weight-medium);">
                            <td colspan="5" class="text-right">合计：</td>
                            <td class="text-right" id="totalOrderQty">0.00</td>
                            <td colspan="2"></td>
                            <td class="text-right" id="totalStorageQty">0.00</td>
                            <td colspan="6"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- 应付金额区域 -->
        <div class="payable-section" id="payableSection" style="display: none;">
            <h2 class="section-title">应付金额</h2>
            <div class="payable-info">
                <div>
                    <div class="payable-label">应付金额</div>
                    <div class="payable-change" id="payableChange">入库后将增加应付金额</div>
                </div>
                <div class="payable-value" id="payableValue">¥0.00</div>
            </div>
        </div>

        <!-- 操作按钮区域 -->
        <div class="action-section" id="actionSection" style="display: none;">
            <button class="btn btn-outline" id="resetBtn">重置</button>
            <button class="btn btn-primary" id="submitAuditBtn">提交财务审核</button>
        </div>

        <!-- 申请退货弹窗（与审核配置-采购退货联动，生成待提交退货单到采购退货列表） -->
        <div class="order-detail-modal-overlay" id="applyReturnModalOverlay">
            <div class="order-detail-modal">
                <div class="order-detail-modal-head">
                    <h3>申请退货</h3>
                    <button type="button" class="btn btn-outline order-detail-modal-close" id="applyReturnModalClose">× 关闭</button>
                </div>
                <div class="order-detail-modal-body">
                    <div class="order-detail-info" id="applyReturnOrderInfo">
                        <!-- JS 填充关联入库单信息 -->
                    </div>
                    <div class="order-detail-section-title">退货商品</div>
                    <div class="table-container" style="margin-bottom: 12px;">
                        <table class="order-detail-table">
                            <thead>
                                <tr>
                                    <th style="width:50px; text-align:center;"><input type="checkbox" id="applyReturnSelectAll"></th>
                                    <th>商品名称</th>
                                    <th>规格</th>
                                    <th>单位</th>
                                    <th class="text-right">订单数量</th>
                                    <th class="text-right">单价(元)</th>
                                    <th class="text-right">退货数量</th>
                                    <th class="text-right">退货金额(元)</th>
                                </tr>
                            </thead>
                            <tbody id="applyReturnProductBody">
                                <!-- JS 填充退货商品 -->
                            </tbody>
                        </table>
                    </div>
                    <div class="order-detail-section-title">退货信息</div>
                    <div class="form-row" style="margin-bottom: 12px;">
                        <div class="form-group" style="flex: 1 1 100%;">
                            <label>退货原因 <span style="color:var(--color-error);">*</span></label>
                            <input type="text" id="applyReturnReason" placeholder="如：质量不符、过期、错发等">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex: 1 1 100%;">
                            <label>备注</label>
                            <textarea id="applyReturnRemark" placeholder="选填" style="min-height: 60px;"></textarea>
                        </div>
                    </div>
                    <div style="margin-top: 16px; display: flex; justify-content: flex-end; gap: 8px;">
                        <button type="button" class="btn btn-outline" id="applyReturnSaveDraft">存为草稿</button>
                        <button type="button" class="btn btn-outline" id="applyReturnCancel">取消</button>
                        <button type="button" class="btn btn-primary" id="applyReturnConfirm">提交审核</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 入库单详情弹窗 -->
        <div class="order-detail-modal-overlay" id="orderDetailModalOverlay">
            <div class="order-detail-modal">
                <div class="order-detail-modal-head">
                    <h3>入库单详情</h3>
                    <button type="button" class="btn btn-outline order-detail-modal-close" id="orderDetailModalClose">× 关闭</button>
                </div>
                <div class="order-detail-modal-body">
                    <div class="order-detail-info">
                        <h4 class="order-detail-section-title">订单信息</h4>
                        <div class="order-detail-info-grid" id="orderDetailInfoGrid">
                            <!-- JS 填充 -->
                        </div>
                    </div>
                    <div class="order-detail-products">
                        <h4 class="order-detail-section-title">商品明细</h4>
                        <div class="table-container">
                            <table class="order-detail-table">
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>商品名称</th>
                                        <th>规格</th>
                                        <th>单位</th>
                                        <th>分类</th>
                                        <th class="text-right">数量</th>
                                        <th class="text-right">单价</th>
                                        <th class="text-right">金额</th>
                                    </tr>
                                </thead>
                                <tbody id="orderDetailProductBody">
                                    <!-- JS 填充 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟采购订单数据（从采购订单页面获取）
        const purchaseOrders = [
            {
                id: 'JH20250826001',
                date: '2025-08-26',
                partner: '雅安本地供应商A',
                project: '雅安好物进货',
                amount: 1800.20,
                payable: 800.00,
                products: [
                    { id: 1, name: '蒙顶山茶叶', spec: '500g/盒', unit: '盒', category: '雅安好景', qty: 20, price: 45.00, barcode: '6901234567890' },
                    { id: 2, name: '雅安花椒', spec: '250g/袋', unit: '袋', category: '雅安好物', qty: 30, price: 28.00, barcode: '6901234567891' },
                    { id: 3, name: '雅安腊肉', spec: '500g/包', unit: '包', category: '雅安好物', qty: 15, price: 38.00, barcode: '' }
                ]
            },
            {
                id: 'JH20250826002',
                date: '2025-08-26',
                partner: '成都批发商B',
                project: '旅游周边补货',
                amount: 1200.00,
                payable: 560.00,
                products: [
                    { id: 4, name: '熊猫玩偶', spec: '20cm', unit: '个', category: '文创产品', qty: 50, price: 15.00, barcode: '6901234567892' },
                    { id: 5, name: '雅安明信片', spec: '一套10张', unit: '套', category: '文创产品', qty: 30, price: 12.00, barcode: '6901234567893' }
                ]
            },
            {
                id: 'JH20250827001',
                date: '2025-08-27',
                partner: '雅安本地供应商C',
                project: '节庆活动备货',
                amount: 2300.50,
                payable: 1500.00,
                products: [
                    { id: 6, name: '雅安特产礼盒', spec: '1kg装', unit: '盒', category: '雅安好景', qty: 25, price: 88.00, barcode: '6901234567894' },
                    { id: 7, name: '雅安蜂蜜', spec: '500g/瓶', unit: '瓶', category: '雅安好物', qty: 40, price: 35.00, barcode: '' }
                ]
            }
        ];

        // 当前选中的订单
        let selectedOrder = null;
        // 当前入库的商品明细（含入库单价、货区、货架、照片、备注、添加时间等）
        let storageItems = [];
        // 审核状态：none-未提交, pending-审核中, approved-已通过, rejected-已拒绝
        let auditStatus = 'none';

        // 从“采购计划”生成的采购订单中补充订单数据
        function loadPurchaseOrdersFromPlan() {
            try {
                const raw = localStorage.getItem('purchaseOrdersFromPlan');
                if (!raw) return;
                const list = JSON.parse(raw);
                if (!Array.isArray(list)) return;
                list.forEach(item => {
                    if (!item || !item.purchase || !item.purchase.id) return;
                    const p = item.purchase;
                    if (purchaseOrders.some(o => o.id === p.id)) return;
                    const products = Array.isArray(item.details) ? item.details.map((d, idx) => ({
                        id: d.id || (idx + 1),
                        name: d.name,
                        spec: d.spec || '',
                        unit: d.unit || '',
                        category: d.category || '未分类',
                        qty: Number(d.qty) || 0,
                        price: Number(d.price) || 0,
                        barcode: d.barcode || ''
                    })) : [];
                    purchaseOrders.push({
                        id: p.id,
                        date: p.date,
                        partner: p.partner,
                        project: p.project,
                        amount: Number(p.amount) || 0,
                        payable: Number(p.payable) || 0,
                        products
                    });
                });
            } catch (e) {
                console.warn('加载由采购计划生成的采购订单到入库页面失败', e);
            }
        }

        // 渲染入库订单列表（上方表格，含操作列）
        function renderPlanList() {
            const tbody = document.getElementById('planListBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            purchaseOrders.forEach(order => {
                const tr = document.createElement('tr');
                tr.dataset.orderId = order.id;
                if (selectedOrder && selectedOrder.id === order.id) tr.classList.add('selected');
                tr.innerHTML = `
                    <td class="plan-list-clickable">${order.id}</td>
                    <td class="plan-list-clickable">${order.date}</td>
                    <td class="plan-list-clickable">${order.partner}</td>
                    <td class="plan-list-clickable">${order.project || '-'}</td>
                    <td class="text-right plan-list-clickable">¥${(order.amount || 0).toFixed(2)}</td>
                    <td class="text-right plan-list-clickable">¥${(order.payable || 0).toFixed(2)}</td>
                    <td class="plan-list-actions">
                        <button type="button" class="btn btn-text plan-list-btn-view" data-order-id="${order.id}">查看</button>
                        <button type="button" class="btn btn-text plan-list-btn-return" data-order-id="${order.id}" style="color:var(--color-error);">退货</button>
                    </td>
                `;
                tr.querySelectorAll('.plan-list-clickable').forEach(function (cell) {
                    cell.addEventListener('click', function () {
                        selectOrder(order.id);
                        tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
                        tr.classList.add('selected');
                    });
                });

        // 入库单详情弹窗：查看该条入库单的详情

        // 申请退货弹窗（与审核配置-采购退货联动，写入采购退货列表 localStorage）
        const PURCHASE_RETURN_LIST_KEY = 'purchaseReturnList';
        const PURCHASE_RETURN_DETAILS_KEY = 'purchaseReturnDetails';
        const applyReturnModalOverlay = document.getElementById('applyReturnModalOverlay');
        const applyReturnOrderInfo = document.getElementById('applyReturnOrderInfo');
        const applyReturnProductBody = document.getElementById('applyReturnProductBody');
        let applyReturnCurrentOrder = null;
        let applyReturnItems = [];

        function openApplyReturnModal(order) {
            if (!order) return;
            applyReturnCurrentOrder = order;
            applyReturnOrderInfo.innerHTML = '';
            var items = [
                { label: '关联入库单号', value: order.id },
                { label: '日期', value: order.date },
                { label: '往来单位', value: order.partner },
                { label: '项目', value: order.project || '-' },
                { label: '订单金额', value: '¥' + (order.amount || 0).toFixed(2) }
            ];
            items.forEach(function (item) {
                var div = document.createElement('div');
                div.className = 'order-detail-info-item';
                div.innerHTML = '<span class="order-detail-info-label">' + item.label + '</span><span class="order-detail-info-value">' + (item.value || '-') + '</span>';
                applyReturnOrderInfo.appendChild(div);
            });
            document.getElementById('applyReturnReason').value = '';
            document.getElementById('applyReturnRemark').value = '';

            // 初始化退货商品列表（默认全选、数量为订单数量）
            applyReturnItems = (order.products || []).map(function (p, idx) {
                return {
                    id: p.id || (idx + 1),
                    name: p.name,
                    spec: p.spec || '',
                    unit: p.unit || '',
                    qty: Number(p.qty) || 0,
                    price: Number(p.price) || 0,
                    checked: true,
                    returnQty: Number(p.qty) || 0
                };
            });
            renderApplyReturnProducts();

        function closeApplyReturnModal() {
            applyReturnModalOverlay.classList.remove('show');

        document.getElementById('applyReturnModalClose').addEventListener('click', closeApplyReturnModal);

            if (e.target === applyReturnModalOverlay) closeApplyReturnModal();
        });

        function renderApplyReturnProducts() {
            if (!applyReturnProductBody) return;
            applyReturnProductBody.innerHTML = '';
            applyReturnItems.forEach(function (item, index) {
                var amount = (item.returnQty || 0) * (item.price || 0);
                var tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center;">
                        <input type="checkbox" class="apply-return-checkbox" data-index="${index}" ${item.checked ? 'checked' : ''}>
                    </td>
                    <td>${item.name || '-'}</td>
                    <td>${item.spec || '-'}</td>
                    <td>${item.unit || '-'}</td>
                    <td class="text-right">${item.qty.toFixed(2)}</td>
                    <td class="text-right">${item.price.toFixed(2)}</td>
                    <td class="text-right">
                        <input type="number" class="apply-return-qty-input" data-index="${index}" min="0" max="${item.qty}" step="0.01" value="${item.returnQty.toFixed(2)}" style="width:90px;text-align:right;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);">
                    </td>
                    <td class="text-right apply-return-amount-cell">¥${amount.toFixed(2)}</td>
                `;
                applyReturnProductBody.appendChild(tr);
            });

            // 绑定事件
            applyReturnProductBody.querySelectorAll('.apply-return-checkbox').forEach(function (cb) {
                cb.addEventListener('change', function () {
                    var idx = parseInt(this.dataset.index, 10);
                    if (Number.isNaN(idx) || !applyReturnItems[idx]) return;
                    applyReturnItems[idx].checked = this.checked;
                });
            });
            applyReturnProductBody.querySelectorAll('.apply-return-qty-input').forEach(function (input) {
                input.addEventListener('input', function () {
                    var idx = parseInt(this.dataset.index, 10);
                    if (Number.isNaN(idx) || !applyReturnItems[idx]) return;
                    var maxQty = applyReturnItems[idx].qty;
                    var v = parseFloat(this.value) || 0;
                    if (v > maxQty) {
                        v = maxQty;
                        this.value = maxQty.toFixed(2);
                    } else if (v < 0) {
                        v = 0;
                        this.value = '0.00';
                    }
                    applyReturnItems[idx].returnQty = v;
                    var row = this.closest('tr');
                    var cell = row ? row.querySelector('.apply-return-amount-cell') : null;
                    if (cell) cell.textContent = '¥' + (v * applyReturnItems[idx].price).toFixed(2);
                });
            });
        }

        // 全选/反选退货商品
        document.getElementById('applyReturnSelectAll').addEventListener('change', function () {
            var checked = this.checked;
            applyReturnItems.forEach(function (item) { item.checked = checked; });
            renderApplyReturnProducts();
        });

        document.getElementById('applyReturnConfirm').addEventListener('click', function () {
            var reason = (document.getElementById('applyReturnReason').value || '').trim();
            if (!reason) {
                alert('请填写退货原因。');
                return;
            }
            var remark = (document.getElementById('applyReturnRemark').value || '').trim();
            var order = applyReturnCurrentOrder;
            if (!order) {
                closeApplyReturnModal();
                return;
            }
            try {
                var list = JSON.parse(localStorage.getItem(PURCHASE_RETURN_LIST_KEY) || '[]');
                var detailsMap = JSON.parse(localStorage.getItem(PURCHASE_RETURN_DETAILS_KEY) || '{}');
                var today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                var sameDay = list.filter(function (r) { return r.id && r.id.indexOf('TH' + today) === 0; });
                var seq = sameDay.length + 1;
                var returnId = 'TH' + today + String(seq).padStart(3, '0');

                // 仅统计勾选且退货数量>0的商品
                var chosenItems = applyReturnItems.filter(function (i) { return i.checked && i.returnQty > 0; });
                if (!chosenItems.length) {
                    alert('请选择至少一个退货商品，并设置退货数量。');
                    return;
                }
                var totalQty = chosenItems.reduce(function (sum, p) { return sum + (Number(p.returnQty) || 0); }, 0);
                var amount = chosenItems.reduce(function (sum, p) { return sum + (Number(p.returnQty) || 0) * (Number(p.price) || 0); }, 0);
                var row = {
                    id: returnId,
                    date: order.date || new Date().toISOString().slice(0, 10),
                    partner: order.partner,
                    project: order.project || '',
                    staff: '',
                    remark: reason + (remark ? '\n' + remark : ''),
                    qty: totalQty,
                    amount: amount,
                    payable: -amount,
                    status: '待提交',
                    attachment: '',
                    recorder: '当前用户',
                    recordTime: new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                    sourceOrderId: order.id
                };
                list.push(row);
                detailsMap[returnId] = chosenItems.map(function (p) {
                    return {
                        name: p.name,
                        spec: p.spec || '',
                        unit: p.unit || '',
                        qty: Number(p.returnQty) || 0,
                        price: Number(p.price) || 0
                    };
                });
                localStorage.setItem(PURCHASE_RETURN_LIST_KEY, JSON.stringify(list));
                localStorage.setItem(PURCHASE_RETURN_DETAILS_KEY, JSON.stringify(detailsMap));
                closeApplyReturnModal();
                if (confirm('已提交审核，请到采购退货页面查看。是否立即前往采购退货？')) {
                    window.location.href = '采购退货.html';
                }
            } catch (e) {
                console.error(e);
                alert('保存退货单失败：' + (e.message || '未知错误'));
            }
        });

        document.getElementById('applyReturnSaveDraft').addEventListener('click', function () {
            var reason = (document.getElementById('applyReturnReason').value || '').trim() || '草稿（待完善）';
            var remark = (document.getElementById('applyReturnRemark').value || '').trim();
            var order = applyReturnCurrentOrder;
            if (!order) {
                closeApplyReturnModal();
                return;
            }

                var today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                var sameDay = list.filter(function (r) { return r.id && r.id.indexOf('TH' + today) === 0; });

                var returnId = 'TH' + today + String(seq).padStart(3, '0');

                var chosenItems = applyReturnItems.filter(function (i) { return i.checked && (Number(i.returnQty) || 0) > 0; });
                var totalQty = chosenItems.length ? chosenItems.reduce(function (sum, p) { return sum + (Number(p.returnQty) || 0); }, 0) : 0;
                var amount = chosenItems.length ? chosenItems.reduce(function (sum, p) { return sum + (Number(p.returnQty) || 0) * (Number(p.price) || 0); }, 0) : 0;

                    id: returnId,
                    date: order.date || new Date().toISOString().slice(0, 10),

                    project: order.project || '',
                    staff: '',
                    remark: reason + (remark ? '\n' + remark : ''),
                    qty: totalQty,
                    amount: amount,
                    payable: -amount,
                    status: '待提交',
                    attachment: '',
                    recorder: '当前用户',
                    recordTime: new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                    sourceOrderId: order.id
                };
                list.push(row);
                detailsMap[returnId] = chosenItems.length ? chosenItems.map(function (p) {
                    return { name: p.name, spec: p.spec || '', unit: p.unit || '', qty: Number(p.returnQty) || 0, price: Number(p.price) || 0 };
                }) : [];
                localStorage.setItem(PURCHASE_RETURN_LIST_KEY, JSON.stringify(list));
                localStorage.setItem(PURCHASE_RETURN_DETAILS_KEY, JSON.stringify(detailsMap));
                closeApplyReturnModal();
                alert('已存为草稿，可在采购退货页面继续编辑。');
            } catch (e) {

                alert('存为草稿失败：' + (e.message || '未知错误'));
            }

        // 选择订单
        function selectOrder(orderId) {
            selectedOrder = purchaseOrders.find(o => o.id === orderId);
            if (!selectedOrder) {
                alert('未找到该订单');
                return;
            }

            // 显示订单信息
            document.getElementById('orderIdDisplay').textContent = selectedOrder.id;
            document.getElementById('orderDateDisplay').textContent = selectedOrder.date;
            document.getElementById('orderPartnerDisplay').textContent = selectedOrder.partner;
            document.getElementById('orderProjectDisplay').textContent = selectedOrder.project;
            document.getElementById('orderAmountDisplay').textContent = `¥${selectedOrder.amount.toFixed(2)}`;
            document.getElementById('orderPayableDisplay').textContent = `¥${selectedOrder.payable.toFixed(2)}`;
            document.getElementById('orderInfoCard').classList.remove('hidden');

            // 初始化入库商品明细（含分类、入库单价、货区、货架、照片、备注、添加时间）
            const nowStr = new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            storageItems = selectedOrder.products.map(product => ({
                ...product,
                category: product.category || '未分类',
                storageQty: product.qty,
                storageUnitPrice: product.price,
                storageAmount: (product.qty * product.price),
                zone: '',
                shelf: '',
                photo: '',
                remark: '',
                addTime: nowStr
            }));

            // 显示商品明细表格
            renderProductsTable();
            document.getElementById('productsSection').style.display = 'block';
            document.getElementById('payableSection').style.display = 'block';
            document.getElementById('actionSection').style.display = 'flex';

            // 更新应付金额
            updatePayable();
        }

        // 渲染商品明细表格（含分类、入库单价、入库金额、货区、货架、照片、备注、添加时间）
        function renderProductsTable() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';

            let totalOrderQty = 0;
            let totalStorageQty = 0;

            storageItems.forEach((item, index) => {
                totalOrderQty += item.qty;
                totalStorageQty += item.storageQty || 0;
                const storageUnitPrice = item.storageUnitPrice != null ? item.storageUnitPrice : item.price;
                const storageAmt = (item.storageQty || 0) * storageUnitPrice;

                const row = document.createElement('tr');
                row.dataset.productId = item.id;
                row.dataset.index = index;

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.spec || '-'}</td>
                    <td>${item.unit || '-'}</td>
                    <td>${item.category || '未分类'}</td>
                    <td class="text-right">${item.qty.toFixed(2)}</td>
                    <td class="text-right">¥${item.price.toFixed(2)}</td>
                            <td class="text-right">¥${(item.qty * item.price).toFixed(2)}</td>
                            <td class="text-right">
                                <input type="number" class="form-input storage-qty-input" data-product-id="${item.id}" data-index="${index}" value="${item.storageQty.toFixed(2)}" min="0" max="${item.qty}" step="0.01" style="width:90px;text-align:right;padding:var(--spacing-xs) var(--spacing-sm);border:1px solid var(--color-neutral-300);border-radius:var(--radius-md);font-size:var(--font-size-sm);">
                            </td>
                            <td class="text-right">
                                <input type="number" class="storage-unit-price-input" data-index="${index}" value="${storageUnitPrice.toFixed(2)}" min="0" step="0.01" style="width:80px;text-align:right;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);">
                            </td>
                            <td class="text-right storage-amount-cell">¥${storageAmt.toFixed(2)}</td>
                            <td><input type="text" class="barcode-input" data-index="${index}" value="${item.barcode || ''}" placeholder="条码" style="width:100px;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);"></td>
                            <td><input type="text" class="zone-input" data-index="${index}" value="${item.zone || ''}" placeholder="货区" style="width:70px;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);"></td>
                            <td><input type="text" class="shelf-input" data-index="${index}" value="${item.shelf || ''}" placeholder="货架" style="width:70px;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);"></td>
                            <td><input type="text" class="photo-input" data-index="${index}" value="${item.photo || ''}" placeholder="照片" style="width:60px;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);"></td>
                            <td><input type="text" class="remark-input" data-index="${index}" value="${item.remark || ''}" placeholder="备注" style="width:80px;padding:4px 6px;border:1px solid var(--color-neutral-300);border-radius:4px;font-size:var(--font-size-sm);"></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalOrderQty').textContent = totalOrderQty.toFixed(2);
            document.getElementById('totalStorageQty').textContent = totalStorageQty.toFixed(2);

            bindStorageQtyInputs();
            bindStorageExtraInputs();
        }

        // 绑定入库单价、货区、货架、照片、备注
        function bindStorageExtraInputs() {
            const tbody = document.getElementById('productsTableBody');
            if (!tbody) return;
            tbody.querySelectorAll('.storage-unit-price-input').forEach(function (input) {
                const idx = parseInt(input.dataset.index, 10);
                input.addEventListener('input', function () {
                    const v = parseFloat(this.value) || 0;
                    storageItems[idx].storageUnitPrice = v;
                    storageItems[idx].storageAmount = (storageItems[idx].storageQty || 0) * v;
                    const row = this.closest('tr');
                    const amountCell = row.querySelector('.storage-amount-cell');
                    if (amountCell) amountCell.textContent = '¥' + storageItems[idx].storageAmount.toFixed(2);
                    updatePayable();
                });
            });
            tbody.querySelectorAll('.barcode-input').forEach(function (input) {
                const idx = parseInt(input.dataset.index, 10);
                if (storageItems[idx]) storageItems[idx].barcode = input.value;
                input.addEventListener('input', function () {
                    const i = parseInt(this.dataset.index, 10);
                    if (storageItems[i]) storageItems[i].barcode = this.value;
                });
            });
            tbody.querySelectorAll('.zone-input').forEach(function (input) {
                storageItems[parseInt(input.dataset.index, 10)].zone = input.value;
                input.addEventListener('input', function () { storageItems[parseInt(this.dataset.index, 10)].zone = this.value; });
            });
            tbody.querySelectorAll('.shelf-input').forEach(function (input) {
                storageItems[parseInt(input.dataset.index, 10)].shelf = input.value;
                input.addEventListener('input', function () { storageItems[parseInt(this.dataset.index, 10)].shelf = this.value; });
            });
            tbody.querySelectorAll('.photo-input').forEach(function (input) {
                storageItems[parseInt(input.dataset.index, 10)].photo = input.value;
                input.addEventListener('input', function () { storageItems[parseInt(this.dataset.index, 10)].photo = this.value; });
            });
            tbody.querySelectorAll('.remark-input').forEach(function (input) {
                storageItems[parseInt(input.dataset.index, 10)].remark = input.value;
                input.addEventListener('input', function () { storageItems[parseInt(this.dataset.index, 10)].remark = this.value; });
            });
        }

        // 绑定入库数量输入事件
        function bindStorageQtyInputs() {
            document.querySelectorAll('.storage-qty-input').forEach(input => {
                input.addEventListener('input', function() {
                    const index = parseInt(this.dataset.index, 10);
                    let qty = parseFloat(this.value) || 0;
                    const maxQty = storageItems[index].qty;
                    if (qty > maxQty) {
                        this.value = maxQty.toFixed(2);
                        qty = maxQty;
                    } else if (qty < 0) {
                        this.value = '0.00';
                        qty = 0;
                    }
                    storageItems[index].storageQty = qty;
                    storageItems[index].storageAmount = qty * (storageItems[index].storageUnitPrice != null ? storageItems[index].storageUnitPrice : storageItems[index].price);
                    const row = this.closest('tr');
                    const amountCell = row ? row.querySelector('.storage-amount-cell') : null;
                    if (amountCell) amountCell.textContent = '¥' + storageItems[index].storageAmount.toFixed(2);
                    updateTotals();
                    updatePayable();
                });
            });
        }

        // 更新合计
        function updateTotals() {
            let totalStorageQty = 0;
            storageItems.forEach(item => {
                totalStorageQty += item.storageQty || 0;
            });
            document.getElementById('totalStorageQty').textContent = totalStorageQty.toFixed(2);
        }

        // 更新应付金额
        function updatePayable() {
            if (!selectedOrder) return;

            let totalAmount = 0;
            storageItems.forEach(item => {
                const unitPrice = item.storageUnitPrice != null ? item.storageUnitPrice : item.price;
                totalAmount += (item.storageQty || 0) * unitPrice;
            });

            // 统一展示本次入库对应的应付金额（红字和蓝字显示相同的数字）
            const payableThisStorage = totalAmount;
            document.getElementById('payableValue').textContent = `¥${payableThisStorage.toFixed(2)}`;
            
            if (payableThisStorage > 0) {
                document.getElementById('payableChange').textContent = `入库后将增加应付金额 ¥${payableThisStorage.toFixed(2)}`;
                document.getElementById('payableChange').style.color = 'var(--color-error)';
            } else {
                document.getElementById('payableChange').textContent = '应付金额无变化';
                document.getElementById('payableChange').style.color = 'var(--color-text-secondary)';
            }
        }

        // 确认入库
        function submitAudit() {
            if (!selectedOrder) {
                alert('请先选择采购订单');
                return;
            }

            // 检查入库数量
            const hasStorageQty = storageItems.some(item => item.storageQty > 0);
            if (!hasStorageQty) {
                alert('请至少录入一个商品的入库数量');
                return;
            }

            if (!confirm('确定要确认入库吗？确认后将视为入库完成，并增加应付与库存。')) {
                return;
            }

            // 直接视为入库完成
            auditStatus = 'approved';
            updateAuditStatus();

            // 更新应付金额（视为应付增加）
            updatePayable();

            alert('入库成功，应付金额已更新。');
        }

        // 更新确认入库按钮状态（审核状态区块已移除）
        function updateAuditStatus() {
            const submitBtn = document.getElementById('submitAuditBtn');
            if (!submitBtn) return;
            if (auditStatus === 'approved') {
                submitBtn.disabled = true;
                submitBtn.textContent = '已入库完成';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = '确认入库';
            }
        }

        // 重置表单
        function resetForm() {
            if (!confirm('确定要重置吗？所有已录入的数据将丢失。')) {
                return;
            }

            selectedOrder = null;
            storageItems = [];
            auditStatus = 'none';

            document.getElementById('orderInfoCard').classList.add('hidden');
            document.getElementById('productsSection').style.display = 'none';
            document.getElementById('payableSection').style.display = 'none';
            document.getElementById('actionSection').style.display = 'none';
            renderPlanList();
            updateAuditStatus();
        }

        document.getElementById('resetBtn').addEventListener('click', resetForm);
        document.getElementById('submitAuditBtn').addEventListener('click', submitAudit);

        // 初始化：先合并来自“采购计划”的采购订单，再渲染入库订单列表
        loadPurchaseOrdersFromPlan();
        renderPlanList();
        updateAuditStatus();

        // 支持从采购订单页跳转带参自动选单：采购入库.html?orderId=JHxxxx
        (function autoSelectFromQuery() {
            try {
                const params = new URLSearchParams(window.location.search);
                const orderId = params.get('orderId');
                if (orderId) {
                    selectOrder(orderId);
                    renderPlanList();
                }
            } catch (e) {
                // ignore
            }
        })();
    </script>
</body>
</html>
