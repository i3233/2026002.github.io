<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数模板 - 商超</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .attr-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1200px;
        }
        .card-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-md) 0;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .spec-table .col-setting {
            min-width: 220px;
            white-space: nowrap;
        }
        .spec-table .col-delete {
            width: 48px;
            text-align: center;
        }
        .setting-cell {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: nowrap;
        }
        .setting-cell label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-sm);
            font-weight: normal;
            cursor: pointer;
        }
        .setting-cell input[type="checkbox"] {
            width: auto;
        }
        .setting-limit-wrap {
            display: none;
            align-items: center;
            gap: 4px;
        }
        .setting-limit-wrap.visible {
            display: inline-flex;
        }
        .setting-limit-wrap .setting-limit-input {
            width: 56px;
            padding: 4px 6px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-sm);
        }
        .spec-add-row {
            margin-top: var(--spacing-sm);
        }
        .spec-add-row .btn-link {
            color: var(--color-primary);
            background: none;
            border: none;
            cursor: pointer;
            font-size: var(--font-size-sm);
            padding: 0;
        }
        .spec-add-row .btn-link:hover {
            text-decoration: underline;
        }
        .btn-delete {
            background: none;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .btn-delete:hover {
            opacity: 0.8;
        }
        .card-foot {
            margin-top: var(--spacing-lg);
            display: flex;
            justify-content: flex-end;
        }
        .choose-setting {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) 0;
        }
        .choose-setting label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        .choose-setting .choose-input {
            width: 56px;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-base);
            text-align: center;
        }
        .choose-setting .choose-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="attr-template-page">
        <div class="card">
            <h2 class="card-title">参数</h2>
            <div class="choose-setting">
                <label>下边商品为</label>
                <input type="number" class="choose-input" id="chooseTotal" min="1" value="1" placeholder="几">
                <span>选</span>
                <input type="number" class="choose-input" id="chooseCount" min="1" value="1" placeholder="几">
                <label>（可填数字，表示几选几）</label>
            </div>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th>规格名称</th>
                        <th>加价</th>
                        <th>成本</th>
                        <th class="col-setting">设定</th>
                        <th class="col-delete">操作</th>
                    </tr>
                </thead>
                <tbody id="paramTableBody">
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td class="col-setting"><div class="setting-cell"><label><input type="checkbox" class="setting-required" checked> 必选</label><label><input type="checkbox" class="setting-limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>
                        <td class="col-delete"><button type="button" class="btn-delete" title="删除">🗑</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td class="col-setting"><div class="setting-cell"><label><input type="checkbox" class="setting-required" checked> 必选</label><label><input type="checkbox" class="setting-limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>
                        <td class="col-delete"><button type="button" class="btn-delete" title="删除">🗑</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td class="col-setting"><div class="setting-cell"><label><input type="checkbox" class="setting-required" checked> 必选</label><label><input type="checkbox" class="setting-limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>
                        <td class="col-delete"><button type="button" class="btn-delete" title="删除">🗑</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td class="col-setting"><div class="setting-cell"><label><input type="checkbox" class="setting-required" checked> 必选</label><label><input type="checkbox" class="setting-limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>
                        <td class="col-delete"><button type="button" class="btn-delete" title="删除">🗑</button></td>
                    </tr>
                </tbody>
            </table>
            <div class="spec-add-row">
                <button type="button" class="btn-link" id="paramAddRowBtn">+ 添加</button>
            </div>
            <div class="card-foot">
                <button type="button" class="btn btn-primary" id="paramConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var tbody = document.getElementById('paramTableBody');
            var rowIndex = 4;

            function getSettingCellHtml(name) {
                return '<td class="col-setting"><div class="setting-cell">' +
                    '<label><input type="checkbox" class="setting-required" checked> 必选</label>' +
                    '<label><input type="checkbox" class="setting-limited"> 限量</label>' +
                    '<span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>';
            }

            function bindSettingControls(cell) {
                var limitedCheckbox = cell.querySelector('.setting-limited');
                var limitWrap = cell.querySelector('.setting-limit-wrap');
                if (!limitedCheckbox || !limitWrap) return;
                function updateLimitVisibility() {
                    if (limitedCheckbox.checked) {
                        limitWrap.classList.add('visible');
                    } else {
                        limitWrap.classList.remove('visible');
                    }
                }
                limitedCheckbox.addEventListener('change', updateLimitVisibility);
                updateLimitVisibility();
            }

            function createRow() {
                var name = 'param_setting_' + (rowIndex++);
                var tr = document.createElement('tr');
                tr.innerHTML = '<td><input type="text" class="spec-name" placeholder="规格名称"></td>' +
                    '<td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>' +
                    '<td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>' +
                    getSettingCellHtml(name) +
                    '<td class="col-delete"><button type="button" class="btn-delete" title="删除">🗑</button></td>';
                bindSettingControls(tr.querySelector('.setting-cell'));
                tr.querySelector('.btn-delete').addEventListener('click', function () {
                    if (tbody.querySelectorAll('tr').length <= 1) return;
                    tr.remove();
                });
                return tr;
            }

            document.getElementById('paramAddRowBtn').addEventListener('click', function () {
                tbody.appendChild(createRow());
            });

            document.getElementById('paramConfirmBtn').addEventListener('click', function () {
                var chooseTotal = parseInt(document.getElementById('chooseTotal').value, 10) || 1;
                var chooseCount = parseInt(document.getElementById('chooseCount').value, 10) || 1;
                try {
                    localStorage.setItem('shangchaoParamTemplate', JSON.stringify({
                        chooseTotal: Math.max(1, chooseTotal),
                        chooseCount: Math.max(1, Math.min(chooseCount, chooseTotal))
                    }));
                } catch (e) {}
                alert('参数模板已保存，套餐列表的默认必选将与此联动。');
            });

            tbody.querySelectorAll('.btn-delete').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var row = this.closest('tr');
                    if (tbody.querySelectorAll('tr').length <= 1) return;
                    row.remove();
                });
            });

            tbody.querySelectorAll('.setting-cell').forEach(function (cell) {
                bindSettingControls(cell);
            });

            var saved = null;
            try { saved = JSON.parse(localStorage.getItem('shangchaoParamTemplate') || 'null'); } catch (e) {}
            if (saved) {
                var ct = document.getElementById('chooseTotal');
                var cc = document.getElementById('chooseCount');
                if (ct) ct.value = saved.chooseTotal || 1;
                if (cc) cc.value = saved.chooseCount || 1;
            }
        })();
    </script>
</body>
</html>
