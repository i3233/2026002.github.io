<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数模板 - 商超</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .attr-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1200px;
        }
        .card-head-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }
        .card-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin: 0;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .spec-table .col-setting {
            min-width: 220px;
            white-space: nowrap;
        }
        .setting-cell {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: nowrap;
        }
        .setting-cell label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-sm);
            font-weight: normal;
            cursor: pointer;
        }
        .setting-cell input[type="checkbox"] {
            width: auto;
        }
        .setting-limit-wrap {
            display: none;
            align-items: center;
            gap: 4px;
        }
        .setting-limit-wrap.visible {
            display: inline-flex;
        }
        .setting-limit-wrap .setting-limit-input {
            width: 56px;
            padding: 4px 6px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-sm);
        }
        .choose-setting {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) 0;
        }
        .choose-setting label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        .choose-setting .choose-input {
            width: 56px;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-base);
            text-align: center;
        }
        .choose-setting .choose-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .param-saved-list {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
        }
        .param-saved-empty {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin: var(--spacing-sm) 0 0 0;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }
        .tag-pill--primary {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
        }
        .tag-pill--danger {
            background-color: rgba(220, 53, 69, 0.08);
            color: var(--color-error);
        }
        .tag-pill--success {
            background-color: rgba(40, 167, 69, 0.08);
            color: var(--color-success);
        }
        .tag-preview-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            flex-shrink: 0;
        }
        .param-saved-setting {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            max-width: 280px;
        }
        .spec-table .col-actions {
            width: 88px;
            text-align: center;
            white-space: nowrap;
        }
        .template-list-del-btn {
            padding: 4px 10px;
            font-size: var(--font-size-xs);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            background: #fff;
            cursor: pointer;
            color: var(--color-text-secondary);
        }
        .template-list-del-btn:hover {
            border-color: var(--color-error);
            color: var(--color-error);
        }

        /* 弹窗（与规格模板一致，略宽以容纳设定列） */
        .param-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            box-sizing: border-box;
        }
        .param-modal[hidden] {
            display: none !important;
        }
        .param-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }
        .param-modal-dialog {
            position: relative;
            width: 100%;
            max-width: 1000px;
            max-height: calc(100vh - 48px);
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .param-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            flex-shrink: 0;
        }
        .param-modal-title {
            margin: 0;
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
        }
        .param-modal-close {
            border: none;
            background: transparent;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: 4px 8px;
        }
        .param-modal-close:hover {
            color: var(--color-text-primary);
        }
        .param-modal-body {
            padding: var(--spacing-lg);
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .param-modal-toolbar {
            margin-bottom: var(--spacing-md);
        }
        .param-add-row-btn {
            padding: 6px 12px;
            font-size: var(--font-size-sm);
            border: 1px dashed var(--color-primary);
            border-radius: var(--radius-md);
            background: rgba(44, 131, 235, 0.06);
            color: var(--color-primary);
            cursor: pointer;
        }
        .param-add-row-btn:hover {
            background: rgba(44, 131, 235, 0.12);
        }
        .param-modal-row-del {
            width: 36px;
            text-align: center;
            vertical-align: middle;
        }
        .param-modal-row-del button {
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .param-modal-row-del button:hover {
            color: var(--color-error);
        }
        .param-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="attr-template-page">
        <div class="card">
            <div class="card-head-row">
                <h2 class="card-title">参数模板</h2>
                <button type="button" class="btn btn-primary" id="openParamModalBtn">新增参数</button>
            </div>

            <div class="param-saved-list" id="paramSavedListSection">
                <h2 class="card-title">已设定参数模板</h2>
                <table class="spec-table">
                    <thead>
                        <tr>
                            <th>规格名称</th>
                            <th>加价</th>
                            <th>成本</th>
                            <th>设定</th>
                            <th class="col-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="paramSavedListBody"></tbody>
                </table>
                <p class="param-saved-empty" id="paramSavedEmpty" style="display: none;">暂无已保存的参数模板，点击「新增参数」在弹窗中填写并点击「确定」将追加到此处列表。</p>
            </div>
        </div>
    </div>

    <div class="param-modal" id="paramModal" hidden>
        <div class="param-modal-backdrop" id="paramModalBackdrop"></div>
        <div class="param-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="paramModalTitle">
            <div class="param-modal-header">
                <h2 class="param-modal-title" id="paramModalTitle">新增参数</h2>
                <button type="button" class="param-modal-close" id="paramModalCloseBtn" aria-label="关闭">×</button>
            </div>
            <div class="param-modal-body">
                <div class="choose-setting">
                    <label>下边商品为</label>
                    <input type="number" class="choose-input" id="modalChooseTotal" min="1" value="1" placeholder="几">
                    <span>选</span>
                    <input type="number" class="choose-input" id="modalChooseCount" min="1" value="1" placeholder="几">
                    <label>（可填数字，表示几选几）</label>
                </div>
                <div class="param-modal-toolbar">
                    <button type="button" class="param-add-row-btn" id="paramModalAddRowBtn">+ 添加一行</button>
                </div>
                <table class="spec-table">
                    <thead>
                        <tr>
                            <th>规格名称</th>
                            <th>加价</th>
                            <th>成本</th>
                            <th class="col-setting">设定</th>
                            <th class="param-modal-row-del"></th>
                        </tr>
                    </thead>
                    <tbody id="paramModalTableBody"></tbody>
                </table>
            </div>
            <div class="param-modal-footer">
                <button type="button" class="btn" id="paramModalCancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="paramModalConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var savedListBody = document.getElementById('paramSavedListBody');
            var savedEmptyEl = document.getElementById('paramSavedEmpty');
            var TEMPLATES_LIST_KEY = 'shangchaoParamTemplatesSaved';
            var GLOBAL_CHOOSE_KEY = 'shangchaoParamTemplate';
            var MODAL_INITIAL_ROWS = 4;

            var DEFAULT_PARAM_TEMPLATES = [
                { name: '新品', price: 2.00, cost: 0.80, required: true, limited: false, limitQty: 1 },
                { name: '热销', price: 5.50, cost: 1.20, required: true, limited: true, limitQty: 3 },
                { name: '自营', price: 3.00, cost: 0.60, required: false, limited: false, limitQty: 1 },
                { name: '限时抢购', price: 8.00, cost: 2.50, required: true, limited: true, limitQty: 2 },
                { name: '产地直供', price: 4.20, cost: 1.00, required: true, limited: false, limitQty: 1 },
                { name: '推荐', price: 2.80, cost: 0.50, required: true, limited: false, limitQty: 1 },
                { name: '爆款', price: 6.00, cost: 1.80, required: true, limited: true, limitQty: 5 },
                { name: '包邮', price: 0, cost: 0, required: false, limited: false, limitQty: 1 },
                { name: '会员专享', price: 10.00, cost: 3.20, required: true, limited: false, limitQty: 1 },
                { name: '限时', price: 7.50, cost: 2.00, required: true, limited: true, limitQty: 1 },
                { name: '雅安特产', price: 4.50, cost: 1.10, required: true, limited: false, limitQty: 1 },
                { name: '精选', price: 3.60, cost: 0.90, required: false, limited: true, limitQty: 4 }
            ];

            function escapeHtml(s) {
                if (s == null) return '';
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function formatSettingText(row) {
                var parts = [];
                parts.push(row.required !== false ? '必选' : '非必选');
                if (row.limited) {
                    parts.push('限量' + (parseInt(row.limitQty, 10) || 1) + '份');
                }
                return parts.join('，');
            }

            /** 统一为 { chooseTotal, chooseCount, rows: [...] }[] */
            function normalizeTemplates(arr) {
                if (!Array.isArray(arr)) return [];
                return arr.map(function (item) {
                    if (item && Array.isArray(item.rows) && item.rows.length) {
                        return {
                            chooseTotal: Math.max(1, parseInt(item.chooseTotal, 10) || 1),
                            chooseCount: Math.max(1, parseInt(item.chooseCount, 10) || 1),
                            rows: item.rows.map(function (r) {
                                return {
                                    name: String(r.name || '').trim(),
                                    price: parseFloat(r.price) || 0,
                                    cost: parseFloat(r.cost) || 0,
                                    required: r.required !== false,
                                    limited: !!r.limited,
                                    limitQty: Math.max(1, parseInt(r.limitQty, 10) || 1)
                                };
                            }).filter(function (r) { return r.name; })
                        };
                    }
                    if (item && item.name !== undefined && String(item.name).trim()) {
                        return {
                            chooseTotal: 1,
                            chooseCount: 1,
                            rows: [{
                                name: String(item.name).trim(),
                                price: parseFloat(item.price) || 0,
                                cost: parseFloat(item.cost) || 0,
                                required: item.required !== false,
                                limited: !!item.limited,
                                limitQty: Math.max(1, parseInt(item.limitQty, 10) || 1)
                            }]
                        };
                    }
                    return { chooseTotal: 1, chooseCount: 1, rows: [] };
                }).filter(function (t) { return t.rows.length > 0; });
            }

            function getSavedParamTemplatesData() {
                var raw = localStorage.getItem(TEMPLATES_LIST_KEY);
                if (raw === null || raw === '' || raw === '[]') {
                    var initial = normalizeTemplates(DEFAULT_PARAM_TEMPLATES);
                    try {
                        localStorage.setItem(TEMPLATES_LIST_KEY, JSON.stringify(initial));
                    } catch (e) {}
                    return initial;
                }
                try {
                    var parsed = JSON.parse(raw);
                    var norm = normalizeTemplates(parsed);
                    if (!norm.length) {
                        norm = normalizeTemplates(DEFAULT_PARAM_TEMPLATES);
                        try {
                            localStorage.setItem(TEMPLATES_LIST_KEY, JSON.stringify(norm));
                        } catch (e2) {}
                    }
                    return norm;
                } catch (e) {
                    var fallback = normalizeTemplates(DEFAULT_PARAM_TEMPLATES);
                    try {
                        localStorage.setItem(TEMPLATES_LIST_KEY, JSON.stringify(fallback));
                    } catch (e2) {}
                    return fallback;
                }
            }

            function persist(data) {
                try {
                    localStorage.setItem(TEMPLATES_LIST_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            function deleteParamRow(templateIndex, rowIndex) {
                var data = getSavedParamTemplatesData();
                var tpl = data[templateIndex];
                if (!tpl || !tpl.rows || !tpl.rows[rowIndex]) return;
                tpl.rows.splice(rowIndex, 1);
                if (tpl.rows.length === 0) {
                    data.splice(templateIndex, 1);
                }
                persist(data);
                renderSavedParamList();
            }

            function renderSavedParamList() {
                if (!savedListBody) return;
                var data = getSavedParamTemplatesData();
                savedListBody.innerHTML = '';
                var pillClasses = ['tag-pill tag-pill--primary', 'tag-pill tag-pill--danger', 'tag-pill tag-pill--success'];
                var globalRowIndex = 0;
                data.forEach(function (tpl, ti) {
                    (tpl.rows || []).forEach(function (row, ri) {
                        var tr = document.createElement('tr');
                        var pc = pillClasses[globalRowIndex % pillClasses.length];
                        globalRowIndex++;
                        tr.innerHTML =
                            '<td><span class="' + pc + '"><span class="tag-preview-dot"></span><span>' + escapeHtml(row.name) + '</span></span></td>' +
                            '<td>¥' + (Number(row.price) || 0).toFixed(2) + '</td>' +
                            '<td>¥' + (Number(row.cost) || 0).toFixed(2) + '</td>' +
                            '<td class="param-saved-setting">' + escapeHtml(formatSettingText(row)) + '</td>' +
                            '<td class="col-actions"><button type="button" class="template-list-del-btn" data-ti="' + ti + '" data-ri="' + ri + '">删除</button></td>';
                        savedListBody.appendChild(tr);
                    });
                });
                savedListBody.querySelectorAll('.template-list-del-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var ti = parseInt(btn.getAttribute('data-ti'), 10);
                        var ri = parseInt(btn.getAttribute('data-ri'), 10);
                        if (isNaN(ti) || isNaN(ri)) return;
                        if (!confirm('确定删除该条参数？')) return;
                        deleteParamRow(ti, ri);
                    });
                });
                if (savedEmptyEl) {
                    savedEmptyEl.style.display = globalRowIndex ? 'none' : 'block';
                }
            }

            var modal = document.getElementById('paramModal');
            var modalBody = document.getElementById('paramModalTableBody');

            function bindSettingControls(cell) {
                var limitedCheckbox = cell.querySelector('.setting-limited');
                var limitWrap = cell.querySelector('.setting-limit-wrap');
                if (!limitedCheckbox || !limitWrap) return;
                function updateLimitVisibility() {
                    if (limitedCheckbox.checked) {
                        limitWrap.classList.add('visible');
                    } else {
                        limitWrap.classList.remove('visible');
                    }
                }
                limitedCheckbox.addEventListener('change', updateLimitVisibility);
                updateLimitVisibility();
            }

            function createModalRow() {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><input type="text" class="spec-name" placeholder="规格名称"></td>' +
                    '<td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>' +
                    '<td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>' +
                    '<td class="col-setting"><div class="setting-cell"><label><input type="checkbox" class="setting-required" checked> 必选</label><label><input type="checkbox" class="setting-limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>' +
                    '<td class="param-modal-row-del"><button type="button" class="param-modal-remove-row" title="删除本行">×</button></td>';
                bindSettingControls(tr.querySelector('.setting-cell'));
                tr.querySelector('.param-modal-remove-row').addEventListener('click', function () {
                    if (modalBody.querySelectorAll('tr').length <= 1) {
                        alert('至少保留一行');
                        return;
                    }
                    tr.remove();
                });
                return tr;
            }

            function resetModalRows() {
                modalBody.innerHTML = '';
                for (var i = 0; i < MODAL_INITIAL_ROWS; i++) {
                    modalBody.appendChild(createModalRow());
                }
            }

            function loadChooseIntoModal() {
                var saved = null;
                try {
                    saved = JSON.parse(localStorage.getItem(GLOBAL_CHOOSE_KEY) || 'null');
                } catch (e) {}
                var ct = document.getElementById('modalChooseTotal');
                var cc = document.getElementById('modalChooseCount');
                if (saved && typeof saved.chooseTotal === 'number') {
                    if (ct) ct.value = saved.chooseTotal || 1;
                    if (cc) cc.value = saved.chooseCount || 1;
                } else {
                    if (ct) ct.value = 1;
                    if (cc) cc.value = 1;
                }
            }

            function openModal() {
                resetModalRows();
                loadChooseIntoModal();
                modal.hidden = false;
                document.body.style.overflow = 'hidden';
                var first = modalBody.querySelector('.spec-name');
                if (first) first.focus();
            }

            function closeModal() {
                modal.hidden = true;
                document.body.style.overflow = '';
            }

            function collectModalRows() {
                var out = [];
                modalBody.querySelectorAll('tr').forEach(function (tr) {
                    var nameEl = tr.querySelector('.spec-name');
                    var priceEl = tr.querySelector('.spec-price');
                    var costEl = tr.querySelector('.spec-cost');
                    var reqEl = tr.querySelector('.setting-required');
                    var limEl = tr.querySelector('.setting-limited');
                    var limInput = tr.querySelector('.setting-limit-input');
                    var name = nameEl ? nameEl.value.trim() : '';
                    if (!name) return;
                    out.push({
                        name: name,
                        price: parseFloat(priceEl && priceEl.value) || 0,
                        cost: parseFloat(costEl && costEl.value) || 0,
                        required: !!(reqEl && reqEl.checked),
                        limited: !!(limEl && limEl.checked),
                        limitQty: Math.max(1, parseInt(limInput && limInput.value, 10) || 1)
                    });
                });
                return out;
            }

            document.getElementById('openParamModalBtn').addEventListener('click', openModal);
            document.getElementById('paramModalBackdrop').addEventListener('click', closeModal);
            document.getElementById('paramModalCloseBtn').addEventListener('click', closeModal);
            document.getElementById('paramModalCancelBtn').addEventListener('click', closeModal);
            document.getElementById('paramModalAddRowBtn').addEventListener('click', function () {
                modalBody.appendChild(createModalRow());
            });

            document.getElementById('paramModalConfirmBtn').addEventListener('click', function () {
                var rows = collectModalRows();
                if (!rows.length) {
                    alert('请至少填写一行规格名称');
                    return;
                }
                var chooseTotal = parseInt(document.getElementById('modalChooseTotal').value, 10) || 1;
                var chooseCount = parseInt(document.getElementById('modalChooseCount').value, 10) || 1;
                chooseTotal = Math.max(1, chooseTotal);
                chooseCount = Math.max(1, Math.min(chooseCount, chooseTotal));
                try {
                    localStorage.setItem(GLOBAL_CHOOSE_KEY, JSON.stringify({
                        chooseTotal: chooseTotal,
                        chooseCount: chooseCount
                    }));
                } catch (e) {}
                var data = getSavedParamTemplatesData();
                data.push({
                    chooseTotal: chooseTotal,
                    chooseCount: chooseCount,
                    rows: rows
                });
                persist(data);
                renderSavedParamList();
                closeModal();
            });

            renderSavedParamList();
        })();
    </script>
</body>
</html>
