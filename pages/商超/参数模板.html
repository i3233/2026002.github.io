<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数模板 - 商超</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .attr-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1000px;
        }
        .card-toolbar {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table td:last-child {
            white-space: nowrap;
        }
        .action-btn {
            padding: 4px 10px;
            font-size: var(--font-size-xs);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            background: #fff;
            cursor: pointer;
            color: var(--color-text-secondary);
            margin-right: 6px;
        }
        .action-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .action-btn-danger:hover {
            border-color: var(--color-error);
            color: var(--color-error);
        }
        .table-setting-tags {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .setting-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid var(--color-neutral-300);
            background: #fff;
            color: var(--color-text-secondary);
            font-size: 12px;
            line-height: 1.4;
        }
        .setting-tag.required {
            border-color: #1677ff;
            color: #1677ff;
            background: rgba(22, 119, 255, 0.08);
        }
        .setting-tag.limited {
            border-color: #fa8c16;
            color: #fa8c16;
            background: rgba(250, 140, 22, 0.1);
        }
        .status-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 44px;
            height: 24px;
        }
        .status-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .status-slider {
            position: absolute;
            inset: 0;
            background: #d1d5db;
            border-radius: 999px;
            transition: 0.2s;
            cursor: pointer;
        }
        .status-slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .status-switch input:checked + .status-slider {
            background: #22c55e;
        }
        .status-switch input:checked + .status-slider::before {
            transform: translateX(20px);
        }
        .param-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            box-sizing: border-box;
        }
        .param-modal[hidden] {
            display: none !important;
        }
        .param-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }
        .param-modal-dialog {
            position: relative;
            width: 100%;
            max-width: 760px;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .param-modal-body {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
        }
        .param-modal-toolbar {
            margin-bottom: var(--spacing-md);
        }
        .param-modal-tip {
            margin: 0 0 var(--spacing-sm) 0;
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .param-modal-main-name {
            width: 260px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
        }
        .param-add-row-btn {
            border: 1px dashed var(--color-primary);
            background: rgba(44, 131, 235, 0.08);
            color: var(--color-primary);
            border-radius: var(--radius-md);
            padding: 6px 12px;
            cursor: pointer;
        }
        .param-add-row-btn:hover {
            background: rgba(44, 131, 235, 0.14);
        }
        .param-modal-table th,
        .param-modal-table td {
            border: 1px solid var(--color-neutral-200);
            padding: 8px 12px;
        }
        .param-modal-table input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
        }
        .param-row-settings {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            white-space: nowrap;
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
            background: #fff;
        }
        .param-row-settings label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }
        .param-limit-input {
            width: 96px !important;
        }
        .param-modal-del {
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }
        .param-modal-del:hover {
            color: var(--color-error);
        }
        .param-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div class="attr-template-page">
        <div class="card">
            <div class="card-toolbar">
                <button type="button" class="btn btn-primary" id="openParamModalBtn">新增参数</button>
            </div>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>ID</th>
                        <th>参数名称</th>
                        <th>启用/禁用</th>
                        <th>绑定商品数</th>
                        <th>设定</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="paramSavedListBody"></tbody>
            </table>
        </div>
    </div>

    <div class="param-modal" id="paramModal" hidden>
        <div class="param-modal-backdrop" id="paramModalBackdrop"></div>
        <div class="param-modal-dialog" role="dialog" aria-modal="true">
            <div class="param-modal-body">
                <div class="param-modal-toolbar">
                    <p class="param-modal-tip">
                        <label for="paramModalMainNameInput">参数名称：</label>
                        <input type="text" id="paramModalMainNameInput" class="param-modal-main-name" value="女款套裙F01">
                    </p>
                    <button type="button" class="param-add-row-btn" id="paramModalAddRowBtn">+ 添加一行</button>
                </div>
                <table class="spec-table param-modal-table">
                    <thead>
                        <tr>
                            <th>参数名称</th>
                            <th>加价</th>
                            <th>成本</th>
                            <th style="width: 280px;">设定</th>
                            <th style="width: 48px;"></th>
                        </tr>
                    </thead>
                    <tbody id="paramModalTableBody"></tbody>
                </table>
            </div>
            <div class="param-modal-footer">
                <button type="button" class="btn" id="paramModalCancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="paramModalConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var savedListBody = document.getElementById('paramSavedListBody');
            var addBtn = document.getElementById('openParamModalBtn');
            var modal = document.getElementById('paramModal');
            var modalBody = document.getElementById('paramModalTableBody');
            var modalMainNameInput = document.getElementById('paramModalMainNameInput');
            var modalAddRowBtn = document.getElementById('paramModalAddRowBtn');
            var STORAGE_KEY = 'shangchaoParamTemplateSimpleList';
            var modalMode = 'create';
            var editingParamId = null;

            var DEFAULT_PARAMS = [
                { id: 2001, name: '女款套裙F01', enabled: true, bindCount: 12 },
                { id: 2002, name: '女款套裙F02', enabled: true, bindCount: 8 },
                { id: 2003, name: '女款套裙F03', enabled: false, bindCount: 0 },
                { id: 2004, name: '女款套裙F04', enabled: true, bindCount: 5 },
                { id: 2005, name: '女款套裙F05', enabled: true, bindCount: 3 },
                { id: 2006, name: '女款套裙F06', enabled: false, bindCount: 1 }
            ];

            function getData() {
                try {
                    var raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return DEFAULT_PARAMS.slice();
                    var parsed = JSON.parse(raw);
                    return Array.isArray(parsed) && parsed.length ? parsed : DEFAULT_PARAMS.slice();
                } catch (e) {
                    return DEFAULT_PARAMS.slice();
                }
            }

            function saveData(data) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            function renderTable() {
                var data = getData();
                savedListBody.innerHTML = '';

                data.forEach(function (item, index) {
                    var rows = Array.isArray(item.paramRows) ? item.paramRows : [];
                    var requiredCount = rows.filter(function (r) { return !!r.required; }).length;
                    var limitedRows = rows.filter(function (r) { return !!r.limited; });
                    var limitedCount = limitedRows.length;
                    var limitedMax = limitedRows.length ? Math.max.apply(null, limitedRows.map(function (r) { return Number(r.limitCount) || 0; })) : 0;
                    var settingHtml = '<div class="table-setting-tags">' +
                        (requiredCount ? ('<span class="setting-tag required">必选 ' + requiredCount + ' 项</span>') : '<span class="setting-tag">必选 无</span>') +
                        (limitedCount ? ('<span class="setting-tag limited">限量 ' + limitedCount + ' 项 / 最大 ' + limitedMax + '</span>') : '<span class="setting-tag">限量 无</span>') +
                        '</div>';
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td>' + (index + 1) + '</td>' +
                        '<td>' + item.id + '</td>' +
                        '<td>' + item.name + '</td>' +
                        '<td>' +
                            '<label class="status-switch">' +
                                '<input type="checkbox" class="status-toggle" data-id="' + item.id + '"' + (item.enabled ? ' checked' : '') + '>' +
                                '<span class="status-slider"></span>' +
                            '</label>' +
                        '</td>' +
                        '<td>' + (item.bindCount || 0) + '</td>' +
                        '<td>' + settingHtml + '</td>' +
                        '<td>' +
                            '<button type="button" class="action-btn action-edit" data-id="' + item.id + '">编辑</button>' +
                            '<button type="button" class="action-btn action-btn-danger action-delete" data-id="' + item.id + '">删除</button>' +
                        '</td>';
                    savedListBody.appendChild(tr);
                });

                bindRowActions();
            }

            function bindRowActions() {
                savedListBody.querySelectorAll('.status-toggle').forEach(function (el) {
                    el.addEventListener('change', function () {
                        var id = Number(this.getAttribute('data-id'));
                        var data = getData();
                        var target = data.find(function (x) { return Number(x.id) === id; });
                        if (!target) return;
                        target.enabled = this.checked;
                        saveData(data);
                    });
                });

                savedListBody.querySelectorAll('.action-edit').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = Number(this.getAttribute('data-id'));
                        var data = getData();
                        var target = data.find(function (x) { return Number(x.id) === id; });
                        if (!target) return;
                        openEditModal(target);
                    });
                });

                savedListBody.querySelectorAll('.action-delete').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = Number(this.getAttribute('data-id'));
                        if (!confirm('确定删除该参数吗？')) return;
                        var data = getData().filter(function (x) { return Number(x.id) !== id; });
                        saveData(data);
                        renderTable();
                    });
                });
            }

            function createModalRow(defaultName) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><input type="text" class="modal-param-name" placeholder="参数名称" value="' + (defaultName || '') + '"></td>' +
                    '<td><input type="number" class="modal-param-price" value="0" min="0" step="0.01"> 元</td>' +
                    '<td><input type="number" class="modal-param-cost" value="0" min="0" step="0.01"> 元</td>' +
                    '<td>' +
                        '<div class="param-row-settings">' +
                            '<label><input type="checkbox" class="modal-param-required"> 必选</label>' +
                            '<label><input type="checkbox" class="modal-param-limited"> 限量</label>' +
                            '<input type="number" class="modal-param-limit-count param-limit-input" value="1" min="1" step="1" placeholder="限量数量">' +
                        '</div>' +
                    '</td>' +
                    '<td style="text-align:center;"><button type="button" class="param-modal-del" title="删除">×</button></td>';
                tr.querySelector('.param-modal-del').addEventListener('click', function () {
                    if (modalBody.querySelectorAll('tr').length <= 1) {
                        alert('至少保留一行');
                        return;
                    }
                    tr.remove();
                });
                return tr;
            }

            function resetModalRows() {
                modalBody.innerHTML = '';
                modalBody.appendChild(createModalRow('女款套裙F01'));
                modalBody.appendChild(createModalRow('女款套裙F02'));
                modalBody.appendChild(createModalRow('女款套裙F03'));
                modalBody.appendChild(createModalRow('女款套裙F04'));
            }

            function buildEditRows(paramItem) {
                var bindCount = Number(paramItem.bindCount) || 0;
                var savedRows = Array.isArray(paramItem.paramRows) ? paramItem.paramRows : [];
                var rows = [];
                for (var i = 0; i < bindCount; i++) {
                    var row = savedRows[i] || {};
                    rows.push({
                        name: row.name || ((paramItem.name || '参数') + (i + 1)),
                        price: Number(row.price) || 0,
                        cost: Number(row.cost) || 0
                    });
                }
                return rows;
            }

            function openModal() {
                modalMode = 'create';
                editingParamId = null;
                if (modalMainNameInput) modalMainNameInput.value = '女款套裙F01';
                if (modalAddRowBtn) modalAddRowBtn.style.display = 'inline-block';
                resetModalRows();
                modal.hidden = false;
                document.body.style.overflow = 'hidden';
            }

            function openEditModal(paramItem) {
                modalMode = 'edit';
                editingParamId = Number(paramItem.id);
                if (modalMainNameInput) modalMainNameInput.value = paramItem.name || '';
                if (modalAddRowBtn) modalAddRowBtn.style.display = 'none';
                modalBody.innerHTML = '';
                buildEditRows(paramItem).forEach(function (row) {
                    var tr = createModalRow(row.name || '');
                    var priceEl = tr.querySelector('.modal-param-price');
                    var costEl = tr.querySelector('.modal-param-cost');
                    var requiredEl = tr.querySelector('.modal-param-required');
                    var limitedEl = tr.querySelector('.modal-param-limited');
                    var limitCountEl = tr.querySelector('.modal-param-limit-count');
                    if (priceEl) priceEl.value = Number(row.price) || 0;
                    if (costEl) costEl.value = Number(row.cost) || 0;
                    if (requiredEl) requiredEl.checked = !!row.required;
                    if (limitedEl) limitedEl.checked = !!row.limited;
                    if (limitCountEl) limitCountEl.value = Number(row.limitCount) > 0 ? Number(row.limitCount) : 1;
                    modalBody.appendChild(tr);
                });
                modal.hidden = false;
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.hidden = true;
                document.body.style.overflow = '';
            }

            addBtn.addEventListener('click', openModal);
            document.getElementById('paramModalBackdrop').addEventListener('click', closeModal);
            document.getElementById('paramModalCancelBtn').addEventListener('click', closeModal);
            document.getElementById('paramModalAddRowBtn').addEventListener('click', function () {
                modalBody.appendChild(createModalRow(''));
            });
            document.getElementById('paramModalConfirmBtn').addEventListener('click', function () {
                var rows = [];
                var mainName = (modalMainNameInput && modalMainNameInput.value ? modalMainNameInput.value : '').trim();
                modalBody.querySelectorAll('tr').forEach(function (tr) {
                    var name = (tr.querySelector('.modal-param-name').value || '').trim();
                    var required = !!(tr.querySelector('.modal-param-required') && tr.querySelector('.modal-param-required').checked);
                    var limited = !!(tr.querySelector('.modal-param-limited') && tr.querySelector('.modal-param-limited').checked);
                    var limitCount = parseInt((tr.querySelector('.modal-param-limit-count') || {}).value, 10) || 1;
                    rows.push({
                        name: name,
                        price: parseFloat(tr.querySelector('.modal-param-price').value) || 0,
                        cost: parseFloat(tr.querySelector('.modal-param-cost').value) || 0,
                        required: required,
                        limited: limited,
                        limitCount: limitCount
                    });
                });
                if (!mainName) {
                    alert('请填写参数名称');
                    return;
                }
                if (modalMode === 'create') {
                    rows = rows.filter(function (row) { return (row.name || '').trim(); });
                }
                if (modalMode === 'create' && !rows.length) {
                    alert('请至少填写一条参数名称');
                    return;
                }
                var data = getData();
                if (modalMode === 'edit' && editingParamId != null) {
                    var editTarget = data.find(function (x) { return Number(x.id) === Number(editingParamId); });
                    if (!editTarget) return;
                    editTarget.name = mainName;
                    editTarget.paramRows = rows.map(function (row, idx) {
                        var safeName = (row.name || '').trim() || (mainName + (idx + 1));
                        return {
                            name: safeName,
                            price: Number(row.price) || 0,
                            cost: Number(row.cost) || 0,
                            required: !!row.required,
                            limited: !!row.limited,
                            limitCount: (Number(row.limitCount) > 0 ? Number(row.limitCount) : 1)
                        };
                    });
                    saveData(data);
                    renderTable();
                    closeModal();
                    return;
                }
                var maxId = data.length ? Math.max.apply(null, data.map(function (x) { return Number(x.id) || 0; })) : 2000;
                rows.forEach(function (row, idx) {
                    data.push({
                        id: maxId + idx + 1,
                        name: row.name,
                        enabled: true,
                        bindCount: 0
                    });
                });
                saveData(data);
                renderTable();
                closeModal();
            });

            renderTable();
        })();
    </script>
</body>
</html>
