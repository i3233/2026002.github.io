<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批发订单 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .wholesale-order-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }

        /* 顶部工具栏 */
        .toolbar-card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-md) var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }

        .toolbar-left,
        .toolbar-center,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .toolbar-left {
            flex: 1.6;
            flex-wrap: wrap;
        }

        .toolbar-center {
            flex: 1;
            justify-content: center;
        }

        .toolbar-right {
            flex: 1;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .toolbar-search-input {
            flex: 1;
            min-width: 220px;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-base);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .toolbar-search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        .btn-icon-text {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-icon-text-symbol {
            font-size: 14px;
        }

        /* 统计卡片 */
        .summary-row {
            display: flex;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .summary-card {
            flex: 1;
            min-width: 220px;
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-md) var(--spacing-lg);
        }

        .summary-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xs);
        }

        .summary-value {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            display: flex;
            align-items: baseline;
            gap: var(--spacing-xs);
        }

        .summary-value-blue {
            color: var(--color-primary);
        }

        .summary-value-green {
            color: var(--color-success);
        }

        .summary-value-red {
            color: var(--color-error);
        }

        /* 订单状态 Tab */
        .order-tabs {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-md);
        }

        .order-tab-btn {
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            border: none;
            background-color: transparent;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .order-tab-btn:hover {
            background-color: var(--color-neutral-100);
            color: var(--color-text-primary);
        }

        .order-tab-btn.active {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        /* 表格容器 */
        .table-container {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--color-neutral-50);
        }

        th, td {
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-size-sm);
            border-bottom: 1px solid var(--color-neutral-200);
            white-space: nowrap;
        }

        th {
            text-align: left;
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: var(--spacing-xl);
        }

        th.sortable::after {
            content: '↕';
            position: absolute;
            right: var(--spacing-sm);
            color: var(--color-neutral-400);
            font-size: var(--font-size-xs);
        }

        th.sortable.asc::after {
            content: '↑';
            color: var(--color-primary);
        }

        th.sortable.desc::after {
            content: '↓';
            color: var(--color-primary);
        }

        tbody tr:hover {
            background-color: var(--color-neutral-50);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .checkbox-cell {
            width: 48px;
            text-align: center;
        }

        .checkbox-cell input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .link-text {
            color: var(--color-primary);
            cursor: pointer;
        }

        .link-text:hover {
            text-decoration: underline;
        }

        .status-pill {
            font-size: var(--font-size-xs);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }

        .status-pill--success {
            background-color: rgba(40, 167, 69, 0.1);
            color: var(--color-success);
        }

        .status-pill--primary {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
        }

        .status-pill--warning {
            background-color: rgba(255, 193, 7, 0.1);
            color: var(--color-warning);
        }

        .status-pill--error {
            background-color: rgba(220, 53, 69, 0.1);
            color: var(--color-error);
        }

        /* 收款码弹窗 */
        .paycode-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .paycode-modal-overlay.show { display: flex; }
        .paycode-modal {
            background:#fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 360px;
            max-width: 90vw;
            padding: var(--spacing-lg);
            text-align: center;
        }
        .paycode-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--spacing-sm);
        }
        .paycode-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-md);
        }
        .paycode-box {
            width: 220px;
            height: 220px;
            margin: 0 auto var(--spacing-md);
            border-radius: var(--radius-md);
            background: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.08),
                rgba(0,0,0,0.08) 4px,
                rgba(0,0,0,0.02) 4px,
                rgba(0,0,0,0.02) 8px
            );
            display:flex;
            align-items:center;
            justify-content:center;
            color: var(--color-text-secondary);
            font-size: var(--font-size-xs);
            padding: 12px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
        }
        .paycode-amount {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
            margin-bottom: var(--spacing-xs);
        }
        .paycode-footer {
            display:flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }

        .btn-link {
            color: var(--color-primary);
            background-color: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: var(--font-size-sm);
            margin-right: var(--spacing-sm);
        }

        .btn-link:hover {
            text-decoration: underline;
        }

        .btn-link.danger {
            color: var(--color-error);
        }

        .text-right {
            text-align: right;
        }

        .text-secondary {
            color: var(--color-text-secondary);
        }

        /* 合计行 */
        .table-footer-row {
            background-color: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }

        /* 底部工具栏 */
        .bottom-toolbar {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            background-color: #ffffff;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            border-top: 1px solid var(--color-neutral-200);
        }

        .bottom-left,
        .bottom-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .bottom-left label {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        /* 分页控件 */
        .page-size-select {
            padding: 2px 8px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
        }

        .pagination-info {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .pagination-pages {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .pagination-page-btn {
            min-width: 24px;
            padding: 2px 6px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            background-color: #ffffff;
            font-size: var(--font-size-xs);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .pagination-page-btn.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
        }

        .pagination-page-btn:hover:not(.active) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .pagination-jump-input {
            width: 40px;
            padding: 2px 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-neutral-300);
            font-size: var(--font-size-xs);
            text-align: center;
        }

        /* 订单来源标签 */
        .order-source-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }

        .order-source-tag.online-paid {
            background-color: rgba(40, 167, 69, 0.1);
            color: var(--color-success);
        }

        .order-source-tag.online-credit {
            background-color: rgba(255, 193, 7, 0.1);
            color: var(--color-warning);
        }

        .order-source-tag.manual {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
        }

        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: var(--font-size-xl);
            color: var(--color-text-secondary);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .modal-close:hover {
            background-color: var(--color-neutral-100);
            color: var(--color-text-primary);
        }

        .modal-body {
            padding: var(--spacing-lg);
        }

        .modal-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
        }

        /* 新增订单 - 商品明细列表 */
        .detail-section-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }
        .detail-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .detail-table th,
        .detail-table td {
            padding: var(--spacing-xs) var(--spacing-sm);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .detail-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .detail-table input,
        .detail-table select {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: var(--font-size-sm);
        }
        .detail-total {
            margin-top: var(--spacing-xs);
            text-align: right;
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        @media (max-width: 1200px) {
            .toolbar-card {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-left,
            .toolbar-center,
            .toolbar-right {
                justify-content: flex-start;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-xs);
            }

            .bottom-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="wholesale-order-page">
        <!-- 顶部工具栏 -->
        <div class="toolbar-card">
            <!-- 左侧按钮组 -->
            <div class="toolbar-left">
                <button class="btn btn-primary" id="addOrderBtn">
                    <span class="btn-icon-text">
                        <span class="btn-icon-text-symbol">＋</span>
                        <span>新增订单</span>
                    </span>
                </button>
                <button class="btn btn-outline" id="batchAuditBtn">
                    <span class="btn-icon-text">
                        <span class="btn-icon-text-symbol">✓</span>
                        <span>批量审核</span>
                    </span>
                </button>
                <button class="btn btn-outline" id="batchPrintBtn">
                    <span class="btn-icon-text">
                        <span class="btn-icon-text-symbol">🖨</span>
                        <span>批量打印</span>
                    </span>
                </button>
                <button class="btn btn-outline">
                    <span class="btn-icon-text">
                        <span class="btn-icon-text-symbol">↑</span>
                        <span>导出</span>
                    </span>
                </button>
            </div>

            <!-- 中间搜索区 -->
            <div class="toolbar-center">
                <input type="text" 
                       class="toolbar-search-input" 
                       id="quickSearchInput" 
                       placeholder="快捷搜索：支持按订单号、往来单位、商家名称等关键字">
                <button class="btn btn-primary" id="quickSearchBtn">搜索</button>
            </div>

            <!-- 右侧功能 -->
            <div class="toolbar-right">
                <button class="btn btn-outline" id="moreSearchBtn">更多搜索</button>
                <button class="btn btn-outline">
                    <span class="btn-icon-text">
                        <span class="btn-icon-text-symbol">⊙</span>
                        <span>统计</span>
                    </span>
                </button>
            </div>
        </div>

        <!-- 订单状态 Tab：全部、待提交、审核中、待出库、已完成 -->
        <div class="order-tabs">
            <button class="order-tab-btn active" data-status="all">全部</button>
            <button class="order-tab-btn" data-status="pendingSubmit">待提交</button>
            <button class="order-tab-btn" data-status="pendingAudit">审核中</button>
            <button class="order-tab-btn" data-status="pendingOutbound">待出库</button>
            <button class="order-tab-btn" data-status="completed">已完成</button>
        </div>

        <!-- 统计卡片 -->
        <div class="summary-row">
            <div class="summary-card">
                <div class="summary-label">订单总额 (元)</div>
                <div class="summary-value summary-value-blue">
                    <span id="summaryTotalAmount">0.00</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-label">待审核订单</div>
                <div class="summary-value summary-value-red">
                    <span id="summaryPendingAuditCount">0</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-label">已完成订单</div>
                <div class="summary-value summary-value-green">
                    <span id="summaryCompletedCount">0</span>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <input type="checkbox" id="selectAll">
                            </th>
                            <th>⊙ 订单号</th>
                            <th class="sortable" data-sort="orderTime">下单时间</th>
                            <th>订单来源</th>
                            <th>往来单位/商家</th>
                            <th>联系人</th>
                            <th>手机号</th>
                            <th class="text-right">商品数量</th>
                            <th class="text-right">订单金额</th>
                            <th class="text-right">实付金额</th>
                            <th>支付方式</th>
                            <th>订单状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- JS 渲染 -->
                    </tbody>
                    <tfoot>
                        <tr class="table-footer-row">
                            <td colspan="7" class="text-right">合计：</td>
                            <td class="text-right" id="totalQtyCell">0</td>
                            <td class="text-right" id="totalAmountCell">0.00</td>
                            <td class="text-right" id="totalPaidCell">0.00</td>
                            <td colspan="3"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- 底部工具栏 -->
            <div class="bottom-toolbar">
                <!-- 左侧批量操作 -->
                <div class="bottom-left">
                    <label>
                        <input type="checkbox" id="bottomSelectAll">
                        <span>全选</span>
                    </label>
                    <button class="btn btn-outline" id="batchExportBtn">批量导出</button>
                    <span class="text-secondary" id="selectedInfo">已选择 0 条记录</span>
                </div>

                <!-- 右侧分页 -->
                <div class="bottom-right">
                    <select class="page-size-select" id="pageSizeSelect">
                        <option value="20" selected>20 条/页</option>
                        <option value="50">50 条/页</option>
                        <option value="100">100 条/页</option>
                    </select>
                    <span class="pagination-info">共 <span id="totalRecords">0</span> 条记录</span>
                    <div class="pagination-pages" id="paginationPages">
                        <!-- 分页按钮由JS生成 -->
                    </div>
                    <span class="pagination-info">跳转到</span>
                    <input type="number" class="pagination-jump-input" min="1" value="1" id="jumpToPage">
                    <span class="pagination-info">页</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 收款码弹窗 -->
    <div class="paycode-modal-overlay" id="paycodeModal">
        <div class="paycode-modal">
            <div class="paycode-title">批发订单收款码</div>
            <div class="paycode-desc" id="paycodeDesc">请让商家扫码付款</div>
            <div class="paycode-box">
                <div>
                    <div style="margin-bottom:8px;">此处为模拟二维码区域</div>
                    <div style="font-size:12px; line-height:1.6;">
                        可接入实际收款二维码接口，<br>
                        例如生成微信/支付宝/聚合码等。
                    </div>
                </div>
            </div>
            <div class="paycode-amount" id="paycodeAmount">¥0.00</div>
            <div class="paycode-desc" style="margin-bottom:0;" id="paycodeOrderInfo"></div>
            <div class="paycode-footer">
                <button class="btn btn-outline" type="button" id="paycodeCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 新增订单模态框 -->
    <div class="modal-overlay" id="addOrderModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">新增批发订单</h3>
                <button class="modal-close" id="closeAddOrderModal">&times;</button>
            </div>

        // 新增订单 - 商品明细行管理
        const orderProductBody = document.getElementById('orderProductBody');

        function addOrderProductRow(item) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="op-name" placeholder="商品名称" value="${item ? (item.name || '') : ''}"></td>
                <td><input type="text" class="op-spec" placeholder="规格" value="${item ? (item.spec || '') : ''}"></td>
                <td>
                    <select class="op-unit">
                        <option value="件">件</option>
                        <option value="盒">盒</option>
                        <option value="包">包</option>
                        <option value="袋">袋</option>
                        <option value="瓶">瓶</option>
                        <option value="箱">箱</option>
                    </select>
                </td>
                <td><input type="number" class="op-qty" min="0" step="1" value="${item ? (item.qty || 1) : 1}"></td>
                <td><input type="number" class="op-price" min="0" step="0.01" value="${item ? (item.price || 0) : 0}"></td>
                <td class="op-amount">0.00</td>
                <td><button type="button" class="btn-link danger op-remove">删除</button></td>
            `;
            orderProductBody.appendChild(tr);
            const unitSelect = tr.querySelector('.op-unit');
            if (item && item.unit) unitSelect.value = item.unit;
            const qtyInput = tr.querySelector('.op-qty');
            const priceInput = tr.querySelector('.op-price');
            qtyInput.addEventListener('input', updateOrderProductRowAmount);
            priceInput.addEventListener('input', updateOrderProductRowAmount);
            tr.querySelector('.op-remove').addEventListener('click', function () {
                if (orderProductBody.querySelectorAll('tr').length <= 1) {
                    // 保留至少一行
                    qtyInput.value = '1';
                    priceInput.value = '0';
                    updateOrderProductRowAmount({ target: qtyInput });
                    return;
                }
                tr.remove();
                updateOrderProductTotals();
            });
            updateOrderProductRowAmount({ target: qtyInput });
        }

        function updateOrderProductRowAmount(e) {
            const row = e.target.closest('tr');
            const qty = parseFloat(row.querySelector('.op-qty').value) || 0;
            const price = parseFloat(row.querySelector('.op-price').value) || 0;
            row.querySelector('.op-amount').textContent = (qty * price).toFixed(2);
            updateOrderProductTotals();
        }

        function updateOrderProductTotals() {
            let totalQty = 0;
            let totalAmount = 0;
            orderProductBody.querySelectorAll('tr').forEach(tr => {
                const qty = parseFloat(tr.querySelector('.op-qty').value) || 0;
                const price = parseFloat(tr.querySelector('.op-price').value) || 0;
                totalQty += qty;
                totalAmount += qty * price;
            });
            const qtySpan = document.getElementById('detailTotalQty');
            const amountSpan = document.getElementById('detailTotalAmount');
            if (qtySpan) qtySpan.textContent = totalQty.toFixed(0);
            if (amountSpan) amountSpan.textContent = '¥' + totalAmount.toFixed(2);
            // 同步到总数量/金额输入框，便于后续统计
            const totalQtyInput = document.getElementById('totalQtyInput');
            const totalAmountInput = document.getElementById('totalAmountInput');
            if (totalQtyInput) totalQtyInput.value = totalQty > 0 ? totalQty : '';
            if (totalAmountInput) totalAmountInput.value = totalAmount > 0 ? totalAmount.toFixed(2) : '';
        }

        // 从新增订单弹窗创建订单：targetStatus 为 pendingSubmit（保存草稿）或 pendingAudit（提交审核）
        function createOrderFromModal(targetStatus) {
            const partnerId = document.getElementById('partnerSelect').value;
            const payType = document.getElementById('payTypeSelect').value;
            const contactName = document.getElementById('contactNameInput').value;
            const contactMobile = document.getElementById('contactMobileInput').value;
            const orderSource = document.getElementById('orderSourceSelect').value || 'manual';
            let totalQty = parseInt(document.getElementById('totalQtyInput').value, 10) || 0;
            let totalAmount = parseFloat(document.getElementById('totalAmountInput').value) || 0;
            const paidAmount = parseFloat(document.getElementById('paidAmountInput').value) || 0;
            const remark = document.getElementById('remarkInput').value;

            if (!partnerId) {
                alert('请选择往来单位');
                return;
            }

            const partnerOption = document.getElementById('partnerSelect').options[document.getElementById('partnerSelect').selectedIndex];
            const partner = JSON.parse(partnerOption.dataset.partner);

            const products = [];
            if (orderProductBody) {
                orderProductBody.querySelectorAll('tr').forEach(tr => {
                    const name = tr.querySelector('.op-name').value.trim();
                    if (!name) return;
                    const spec = tr.querySelector('.op-spec').value.trim();
                    const unit = tr.querySelector('.op-unit').value;
                    const qty = parseFloat(tr.querySelector('.op-qty').value) || 0;
                    const price = parseFloat(tr.querySelector('.op-price').value) || 0;
                    if (qty <= 0) return;
                    products.push({ name, spec, unit, qty, price });
                });
            }
            if (products.length) {
                totalQty = products.reduce((s, p) => s + p.qty, 0);
                totalAmount = products.reduce((s, p) => s + p.qty * p.price, 0);
            }

            let sourceText = '部门代下单';
            if (orderSource === 'online-paid') sourceText = '商家自助(实付)';
            if (orderSource === 'online-credit') sourceText = '商家自助(赊账)';

            const newOrder = {
                id: 'PF' + new Date().getTime(),
                orderTime: new Date().toLocaleString('zh-CN'),
                source: orderSource,
                sourceText: sourceText,
                partner: partner.name,
                contact: contactName || partner.contact,
                mobile: contactMobile || partner.mobile,
                qty: totalQty,
                amount: totalAmount,
                paid: paidAmount,
                payType: payType === 'credit' ? '赊账' : payType === 'cash' ? '现金' : '转账',
                status: targetStatus,
                auditStatus: 'pending',
                auditTime: null,
                printTime: null,
                pickingStatus: 'pending',
                outboundStatus: 'pending',
                completedTime: null,
                remark: remark,
                products: products
            };

            wholesaleOrders.unshift(newOrder);
            filterOrders();
            closeAddOrderModal();
            if (targetStatus === 'pendingSubmit') {
                alert('已保存草稿，可在列表中继续编辑或提交审核。');
            } else {
                alert('已提交审核，请等待财务审核。');
            }
        }

            const amountSpan = document.getElementById('detailTotalAmount');
            if (qtySpan) qtySpan.textContent = '0';
            if (amountSpan) amountSpan.textContent = '¥0.00';
        }

        // 筛选订单
        function filterOrders() {
            filteredOrders = [...wholesaleOrders];

            // 按状态筛选：全部、待提交、审核中、待出库、已完成
            if (currentStatus !== 'all') {
                filteredOrders = filteredOrders.filter(order => {
                    if (currentStatus === 'pendingSubmit') return order.status === 'pendingSubmit';
                    if (currentStatus === 'pendingAudit') return order.status === 'pendingAudit';
                    if (currentStatus === 'pendingOutbound') return order.status === 'pendingOutbound';
                    if (currentStatus === 'completed') return order.status === 'completed';
                    return false;
                });
            }

            // 应用搜索
            applySearch();

            // 更新统计
            updateSummary();

            // 渲染表格
            renderTable();
        }

        // 应用搜索
        function applySearch() {
            const keyword = document.getElementById('quickSearchInput').value.trim().toLowerCase();
            if (keyword) {
                filteredOrders = filteredOrders.filter(order => {
                    return (
                        order.id.toLowerCase().includes(keyword) ||
                        order.partner.toLowerCase().includes(keyword) ||
                        order.contact.toLowerCase().includes(keyword) ||
                        order.mobile.toLowerCase().includes(keyword)
                    );
                });
            }
        }

        // 更新统计
        function updateSummary() {
            const totalAmount = filteredOrders.reduce((sum, order) => sum + order.amount, 0);
            const pendingAuditCount = filteredOrders.filter(order => order.status === 'pendingAudit').length;
            const completedCount = filteredOrders.filter(order => order.status === 'completed').length;

            document.getElementById('summaryTotalAmount').textContent = totalAmount.toFixed(2);
            document.getElementById('summaryPendingAuditCount').textContent = pendingAuditCount;
            document.getElementById('summaryCompletedCount').textContent = completedCount;
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = '';

            if (filteredOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="13" style="text-align: center; padding: var(--spacing-lg); color: var(--color-text-secondary);">暂无订单数据</td></tr>';
                updateTotals();
                return;
            }

            filteredOrders.forEach(order => {
                const statusClass = getStatusClass(order.status);
                const sourceClass = getSourceClass(order.source);

                const tr = document.createElement('tr');
                tr.dataset.id = order.id;
                tr.innerHTML = `
                    <td class="checkbox-cell">
                        <input type="checkbox" class="row-checkbox" data-id="${order.id}">
                    </td>
                    <td>
                        <span class="link-text order-link" data-id="${order.id}">${order.id}</span>
                    </td>
                    <td>${order.orderTime}</td>
                    <td>
                        <span class="order-source-tag ${sourceClass}">${order.sourceText}</span>
                    </td>
                    <td>${order.partner}</td>
                    <td>${order.contact}</td>
                    <td>${order.mobile}</td>
                    <td class="text-right">${order.qty}</td>
                    <td class="text-right">${order.amount.toFixed(2)}</td>
                    <td class="text-right">${order.paid.toFixed(2)}</td>
                    <td>${order.payType}</td>
                    <td>
                        <span class="status-pill ${statusClass}">${getStatusText(order.status)}</span>
                    </td>
                    <td>
                        <button class="btn-link view-btn" data-id="${order.id}">查看</button>
                        ${getActionButtons(order)}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updateTotals();
            updateSelectedInfo();
            bindTableEvents();
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const statusMap = {
                'pendingSubmit': 'status-pill--primary',
                'pendingAudit': 'status-pill--warning',
                'pendingPrint': 'status-pill--primary',
                'picking': 'status-pill--primary',
                'pendingOutbound': 'status-pill--warning',
                'completed': 'status-pill--success'
            };
            return statusMap[status] || 'status-pill--primary';
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'pendingSubmit': '待提交',
                'pendingAudit': '审核中',
                'pendingPrint': '待打印',
                'picking': '拣货中',
                'pendingOutbound': '待出库',
                'completed': '已完成'
            };
            return statusMap[status] || status;
        }

        // 获取来源样式类
        function getSourceClass(source) {
            const sourceMap = {
                'online-paid': 'online-paid',
                'online-credit': 'online-credit',
                'manual': 'manual'
            };
            return sourceMap[source] || 'manual';
        }

        // 获取操作按钮
        function getActionButtons(order) {
            let buttons = '';
            if (order.status === 'pendingSubmit') {
                buttons += `<button class="btn-link submit-audit-btn" data-id="${order.id}">提交审核</button>`;
            }
            if (order.status === 'pendingAudit') {
                buttons += `<button class="btn-link audit-btn" data-id="${order.id}">审核</button>`;
            }
            if (order.status === 'pendingPrint' || order.status === 'picking' || order.status === 'pendingOutbound') {
                if (!order.printTime) {
                    buttons += `<button class="btn-link print-btn" data-id="${order.id}">打印</button>`;
                }
            }
            if (order.status === 'pendingOutbound') {
                buttons += `<button class="btn-link outbound-btn" data-id="${order.id}">出库</button>`;
            }
            if (order.status === 'completed') {
                buttons += `<button class="btn-link paycode-btn" data-id="${order.id}">收款码</button>`;
            }
            return buttons;
        }

        // 更新合计
        function updateTotals() {
            const totalQty = filteredOrders.reduce((sum, order) => sum + order.qty, 0);
            const totalAmount = filteredOrders.reduce((sum, order) => sum + order.amount, 0);
            const totalPaid = filteredOrders.reduce((sum, order) => sum + order.paid, 0);

            document.getElementById('totalQtyCell').textContent = totalQty;
            document.getElementById('totalAmountCell').textContent = totalAmount.toFixed(2);
            document.getElementById('totalPaidCell').textContent = totalPaid.toFixed(2);
        }

        // 绑定表格事件
        function bindTableEvents() {
            // 查看订单
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    const order = wholesaleOrders.find(o => o.id === orderId);
                    alert(`订单详情（示例）\n订单号：${order.id}\n往来单位：${order.partner}\n金额：¥${order.amount.toFixed(2)}\n状态：${getStatusText(order.status)}`);
                });
            });

            // 待提交 -> 提交审核（改为审核中）
            document.querySelectorAll('.submit-audit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    const order = wholesaleOrders.find(o => o.id === orderId);
                    if (order && order.status === 'pendingSubmit') {
                        order.status = 'pendingAudit';
                        filterOrders();
                        alert('已提交审核，请等待财务审核。');
                    }
                });
            });

            // 审核订单
            document.querySelectorAll('.audit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    auditOrder(orderId);
                });
            });

            // 打印拣货单
            document.querySelectorAll('.print-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    printPickingList(orderId);
                });
            });

            // 出库
            document.querySelectorAll('.outbound-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    doOutbound(orderId);
                });
            });

            // 收款码
            document.querySelectorAll('.paycode-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    openPaycodeModal(orderId);
                });
            });

            // 订单号点击
            document.querySelectorAll('.order-link').forEach(link => {
                link.addEventListener('click', function() {
                    const orderId = this.dataset.id;
                    const order = wholesaleOrders.find(o => o.id === orderId);
                    alert(`订单详情（示例）\n订单号：${order.id}\n往来单位：${order.partner}\n金额：¥${order.amount.toFixed(2)}\n状态：${getStatusText(order.status)}`);
                });
            });
        }

        // 审核订单
        function auditOrder(orderId) {
            if (!confirm('确定要审核通过该订单吗？审核通过后可以打印拣货单。')) {
                return;
            }

            const order = wholesaleOrders.find(o => o.id === orderId);
            if (order) {
                order.auditStatus = 'approved';
                order.auditTime = new Date().toLocaleString('zh-CN');
                
                // 根据支付方式更新状态
                if (order.payType === '赊账') {
                    order.status = 'pendingPrint'; // 赊账需要审核后打印
                } else {
                    order.status = 'pendingPrint'; // 实付款也需要打印
                }
                
                filterOrders();
                alert('订单审核通过！可以打印拣货单了。');
            }
        }

        // 打印拣货单
        function printPickingList(orderId) {
            if (!currentPrinter) {
                alert('请先绑定打印机');
                return;
            }

            const order = wholesaleOrders.find(o => o.id === orderId);
            if (order) {
                if (order.auditStatus !== 'approved') {
                    alert('订单尚未审核通过，无法打印拣货单');
                    return;
                }

                order.printTime = new Date().toLocaleString('zh-CN');
                order.status = 'picking'; // 打印后进入拣货中状态
                order.pickingStatus = 'picking';
                
                filterOrders();
                alert(`正在打印拣货单（示例）\n订单号：${order.id}\n打印机：${currentPrinter.name}\n打印时间：${order.printTime}`);
            }
        }

        // 出库
        function doOutbound(orderId) {
            if (!confirm('确定要对该订单执行出库操作吗？出库后将自动更新库存并完成订单。')) {
                return;
            }

            const order = wholesaleOrders.find(o => o.id === orderId);
            if (order) {
                if (order.pickingStatus !== 'completed') {
                    alert('请先完成拣货后再出库');
                    return;
                }

                order.outboundStatus = 'completed';
                order.status = 'completed';
                order.completedTime = new Date().toLocaleString('zh-CN');
                
                filterOrders();
                alert(`订单出库成功！订单已完成。\n订单号：${order.id}\n完成时间：${order.completedTime}`);
            }
        }

        // 收款码弹窗
        const paycodeModal = document.getElementById('paycodeModal');
        const paycodeAmountEl = document.getElementById('paycodeAmount');
        const paycodeOrderInfoEl = document.getElementById('paycodeOrderInfo');
        const paycodeDescEl = document.getElementById('paycodeDesc');

        function openPaycodeModal(orderId) {
            const order = wholesaleOrders.find(o => o.id === orderId);
            if (!order) return;
            const remain = (Number(order.amount) || 0) - (Number(order.paid) || 0);
            const payAmount = remain > 0 ? remain : order.amount;

            paycodeAmountEl.textContent = '¥' + payAmount.toFixed(2);
            paycodeOrderInfoEl.textContent = '订单号：' + order.id + ' ｜ 往来单位：' + order.partner;
            paycodeDescEl.textContent = remain > 0
                ? '请让商家扫码支付本次应收金额（未结清部分）。'
                : '请让商家扫码完成本单支付（示意）。';

            paycodeModal.classList.add('show');
        }

        function closePaycodeModal() {
            paycodeModal.classList.remove('show');
        }

        document.getElementById('paycodeCloseBtn').addEventListener('click', closePaycodeModal);
        paycodeModal.addEventListener('click', function (e) {
            if (e.target === paycodeModal) closePaycodeModal();
        });

        // 批量审核
        function batchAudit() {
            const ids = getSelectedIds();
            if (ids.length === 0) {
                alert('请先选择要审核的订单');
                return;
            }

            const pendingAuditIds = ids.filter(id => {
                const order = wholesaleOrders.find(o => o.id === id);
                return order && order.status === 'pendingAudit';
            });

            if (pendingAuditIds.length === 0) {
                alert('所选订单中没有待审核的订单');
                return;
            }

            if (!confirm(`确定要批量审核通过 ${pendingAuditIds.length} 个订单吗？`)) {
                return;
            }

            pendingAuditIds.forEach(orderId => {
                auditOrder(orderId);
            });
        }

        // 批量打印
        function batchPrint() {
            const ids = getSelectedIds();
            if (ids.length === 0) {
                alert('请先选择要打印的订单');
                return;
            }

            if (!currentPrinter) {
                alert('请先绑定打印机');
                return;
            }

            const printableIds = ids.filter(id => {
                const order = wholesaleOrders.find(o => o.id === id);
                return order && (order.status === 'pendingPrint' || order.status === 'picking' || order.status === 'pendingOutbound') && order.auditStatus === 'approved';
            });

            if (printableIds.length === 0) {
                alert('所选订单中没有可以打印的订单（需要已审核通过）');
                return;
            }

            if (!confirm(`确定要批量打印 ${printableIds.length} 个订单的拣货单吗？`)) {
                return;
            }

            printableIds.forEach(orderId => {
                printPickingList(orderId);
            });
        }

        // 全选/反选
        function getSelectedIds() {
            const ids = [];
            document.querySelectorAll('.row-checkbox:checked').forEach(cb => {
                ids.push(cb.dataset.id);
            });
            return ids;
        }

        function updateSelectedInfo() {
            const ids = getSelectedIds();
            document.getElementById('selectedInfo').textContent = `已选择 ${ids.length} 条记录`;
        }

        function syncSelectAll() {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const checkedCount = document.querySelectorAll('.row-checkbox:checked').length;
            const allChecked = checkedCount > 0 && checkedCount === checkboxes.length;
            document.getElementById('selectAll').checked = allChecked;
            document.getElementById('bottomSelectAll').checked = allChecked;
            updateSelectedInfo();
        }

        // 事件绑定（打印机配置区块已移除，打印机按钮不存在时不绑定）
        const bindPrinterBtn = document.getElementById('bindPrinterBtn');
        const unbindPrinterBtn = document.getElementById('unbindPrinterBtn');
        const testPrintBtn = document.getElementById('testPrintBtn');
        if (bindPrinterBtn) bindPrinterBtn.addEventListener('click', bindPrinter);
        if (unbindPrinterBtn) unbindPrinterBtn.addEventListener('click', unbindPrinter);
        if (testPrintBtn) testPrintBtn.addEventListener('click', testPrint);
        document.getElementById('addOrderBtn').addEventListener('click', addOrder);
        document.getElementById('saveDraftBtn').addEventListener('click', function () { createOrderFromModal('pendingSubmit'); });
        document.getElementById('submitAuditBtn').addEventListener('click', function () { createOrderFromModal('pendingAudit'); });
        document.getElementById('cancelAddOrderBtn').addEventListener('click', closeAddOrderModal);
        document.getElementById('closeAddOrderModal').addEventListener('click', closeAddOrderModal);
        document.getElementById('batchAuditBtn').addEventListener('click', batchAudit);
        document.getElementById('batchPrintBtn').addEventListener('click', batchPrint);
        document.getElementById('quickSearchBtn').addEventListener('click', filterOrders);
        document.getElementById('quickSearchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterOrders();
            }
        });

        // Tab切换
        document.querySelectorAll('.order-tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.order-tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentStatus = this.dataset.status || 'all';
                filterOrders();
            });
        });

        // 全选
        document.getElementById('selectAll').addEventListener('change', function() {
            const checked = this.checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
            document.getElementById('bottomSelectAll').checked = checked;
            updateSelectedInfo();
        });

        document.getElementById('bottomSelectAll').addEventListener('change', function() {
            const checked = this.checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
            document.getElementById('selectAll').checked = checked;
            updateSelectedInfo();
        });

        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('row-checkbox')) {
                syncSelectAll();
            }
        });

        // 更多搜索
        document.getElementById('moreSearchBtn').addEventListener('click', function() {
            alert('更多搜索（示例）：这里可以展开高级筛选条件，如下单时间、订单状态、支付方式等。');
        });

        // 往来单位选择变化时自动填充联系人信息
        document.getElementById('partnerSelect').addEventListener('change', function() {
            const option = this.options[this.selectedIndex];
            if (option.value && option.dataset.partner) {
                const partner = JSON.parse(option.dataset.partner);
                document.getElementById('contactNameInput').value = partner.contact;
                document.getElementById('contactMobileInput').value = partner.mobile;
            }
        });

        // 商品明细与选择列表事件
        document.getElementById('addOrderProductRowBtn').addEventListener('click', function () {
            addOrderProductRow();
        });
        document.getElementById('openProductSelectModalBtn').addEventListener('click', function () {
            openProductSelectModal();
        });
        document.getElementById('closeProductSelectModal').addEventListener('click', function () {
            closeProductSelectModal();
        });
        document.getElementById('productSelectCancel').addEventListener('click', function () {
            closeProductSelectModal();
        });
        document.getElementById('productSelectConfirm').addEventListener('click', function () {
            addSelectedProductsToOrder();
        });
        document.getElementById('productSelectAll').addEventListener('change', function () {
            const checked = this.checked;
            productSelectBody.querySelectorAll('.product-select-checkbox').forEach(cb => cb.checked = checked);
        });

        // 初始化
        initPrinterSelect();
        initPartnerSelect();
        filterOrders();
    </script>
</body>
</html>
