<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增加库存 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .stock-page { padding: var(--spacing-lg); background-color: var(--color-neutral-50); }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); padding: var(--spacing-lg); background-color: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
        .page-title { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--color-text-primary); margin: 0; }
        .page-subtitle { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-top: var(--spacing-xs); }
        .toolbar-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: var(--spacing-md) var(--spacing-lg); margin-bottom: var(--spacing-lg); display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-md); }
        .toolbar-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm); }
        .toolbar-search-input { flex: 1; min-width: 220px; max-width: 400px; padding: var(--spacing-sm) var(--spacing-md); border: 1px solid var(--color-neutral-300); border-radius: var(--radius-md); font-size: var(--font-size-base); }
        .toolbar-right { display: flex; align-items: center; gap: var(--spacing-sm); }
        .summary-row { display: flex; gap: var(--spacing-lg); margin-bottom: var(--spacing-lg); flex-wrap: wrap; }
        .summary-card { flex: 1; min-width: 200px; background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: var(--spacing-md) var(--spacing-lg); }
        .summary-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-xs); }
        .summary-value { font-size: var(--font-size-2xl); font-weight: bold; }
        .summary-value-blue { color: var(--color-primary); }
        .summary-value-green { color: var(--color-success); }
        .table-container { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; }
        .table-wrapper { overflow-x: auto; }
        .table-container table { width: 100%; border-collapse: collapse; }
        .table-container thead { background: var(--color-neutral-50); }
        .table-container th, .table-container td { padding: var(--spacing-sm) var(--spacing-md); font-size: var(--font-size-sm); border-bottom: 1px solid var(--color-neutral-200); }
        .table-container th { text-align: left; font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
        .text-right { text-align: right; }
        .more-search-expand { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: var(--spacing-lg); margin-bottom: var(--spacing-lg); border: 1px solid var(--color-neutral-200); display: none; }
        .more-search-expand.show { display: block; }
        .form-row { display: flex; gap: var(--spacing-md); flex-wrap: wrap; margin-bottom: var(--spacing-md); }
        .form-group { flex: 1; min-width: 140px; }
        .form-group label { display: block; margin-bottom: var(--spacing-xs); font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); }
        .form-group input, .form-group select { width: 100%; padding: var(--spacing-sm) var(--spacing-md); border: 1px solid var(--color-neutral-300); border-radius: var(--radius-md); font-size: var(--font-size-base); }
        .more-search-actions { display: flex; justify-content: flex-end; gap: var(--spacing-sm); margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid var(--color-neutral-200); }

        .inventory-photo-thumb {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            background-color: var(--color-neutral-100);
        }

        .photo-modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .photo-modal-overlay.show { display: flex; }
        .photo-modal-box { background: #fff; border-radius: var(--radius-lg); padding: var(--spacing-lg); max-width: 90vw; max-height: 90vh; overflow: auto; text-align: center; }
        .photo-modal-box img { max-width: 100%; max-height: 70vh; }
        .photo-modal-box .photo-placeholder { padding: 48px; color: var(--color-text-secondary); }

        /* 详情弹窗 */
        .detail-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .detail-modal-overlay.show { display: flex; }
        .detail-modal {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 720px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .detail-modal-header {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .detail-modal-title {
            margin: 0;
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
        }
        .detail-modal-body {
            padding: var(--spacing-lg);
            overflow-y: auto;
            flex: 1;
        }
        .detail-modal-footer {
            padding: var(--spacing-md) var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-sm);
        }
        .detail-section-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--spacing-sm);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--spacing-xs) var(--spacing-lg);
            margin-bottom: var(--spacing-md);
        }
        .detail-item-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }
        .detail-item-value {
            font-size: var(--font-size-sm);
        }
        .serial-list-box {
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm) var(--spacing-md);
            max-height: 200px;
            overflow-y: auto;
            font-size: var(--font-size-xs);
        }
    </style>
</head>
<body>
    <div class="stock-page">
        <div class="page-header">
            <div>
                <h1 class="page-title">增加库存</h1>
                <div class="page-subtitle">凭空增加的库存记录，如盘盈、手工补录、赠送入库等</div>
            </div>
        </div>

        <div class="toolbar-card">
            <div class="toolbar-center">
                <input type="text" class="toolbar-search-input" id="quickSearchInput" placeholder="快捷搜索：单号、商品名称、原因、操作人">
                <button class="btn btn-primary" id="quickSearchBtn">搜索</button>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-outline" id="moreSearchBtn">更多搜索</button>
                <button class="btn btn-primary" id="addBtn">+ 新增增加单</button>
                <button class="btn btn-outline" id="exportBtn">导出</button>
                <button class="btn btn-outline" id="printBtn">打印</button>
            </div>
        </div>

        <div class="more-search-expand" id="moreSearchExpand">
            <div class="form-row">
                <div class="form-group">
                    <label>门店</label>
                    <select id="msWarehouse">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>日期起</label>
                    <input type="date" id="msDateStart">
                </div>
                <div class="form-group">
                    <label>日期止</label>
                    <input type="date" id="msDateEnd">
                </div>
            </div>
            <div class="more-search-actions">
                <button type="button" class="btn btn-outline" id="moreSearchResetBtn">重置</button>
                <button type="button" class="btn btn-primary" id="moreSearchApplyBtn">应用筛选</button>
            </div>
        </div>

        <div class="summary-row">
            <div class="summary-card">
                <div class="summary-label">本期增加笔数</div>
                <div class="summary-value summary-value-blue" id="summaryCount">0</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">增加总数量</div>
                <div class="summary-value summary-value-green" id="summaryQty">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>单号</th>
                            <th>日期</th>
                            <th>门店</th>
                            <th>商品名称</th>
                            <th>规格</th>
                            <th>货区</th>
                            <th>货架</th>
                            <th>照片</th>
                            <th class="text-right">增加数量</th>
                            <th>单位</th>
                            <th>原因/备注</th>
                            <th>操作人</th>
                            <th>录入时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="photo-modal-overlay" id="photoModalOverlay">
        <div class="photo-modal-box">
            <div id="photoModalContent"></div>
            <button type="button" class="btn btn-outline" id="photoModalClose" style="margin-top:12px;">关闭</button>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="detail-modal-overlay" id="increaseDetailModal">
        <div class="detail-modal">
            <div class="detail-modal-header">
                <h3 class="detail-modal-title" id="increaseDetailTitle">增加库存详情</h3>
                <button type="button" class="btn btn-outline" id="increaseDetailCloseBtn">关闭</button>
            </div>
            <div class="detail-modal-body" id="increaseDetailContent"></div>
            <div class="detail-modal-footer">
                <button type="button" class="btn btn-primary" id="increaseDetailOkBtn">我知道了</button>
            </div>
        </div>
    </div>
    <script>
        const warehouses = [{ id: 'WH001', name: '总店' }, { id: 'WH002', name: '分店A' }, { id: 'WH003', name: '分店B' }];
        let list = [
            { id: 'ZJ20250115001', date: '2025-01-15', warehouseId: 'WH001', warehouseName: '总店', productName: '隔热垫', spec: '30cm×30cm', zone: 'A区', shelf: 'A-01', photo: '../../images/01.jpg', qty: 20, unit: '个', reason: '盘盈补录', operator: '张三', recordTime: '2025-01-15 10:20:00' },
            { id: 'ZJ20250118001', date: '2025-01-18', warehouseId: 'WH001', warehouseName: '总店', productName: '熊猫玩偶', spec: '20cm', zone: 'C区', shelf: 'C-01', photo: '../../images/02.jpg', qty: 15, unit: '个', reason: '赠送入库', operator: '李四', recordTime: '2025-01-18 14:30:00', serialNumbers: ['BJ-0001','BJ-0002','BJ-0003','BJ-0004','BJ-0005','BJ-0006','BJ-0007','BJ-0008','BJ-0009','BJ-0010','BJ-0011','BJ-0012','BJ-0013','BJ-0014','BJ-0015'] },
            { id: 'ZJ20250120001', date: '2025-01-20', warehouseId: 'WH002', warehouseName: '分店A', productName: '雅安花椒', spec: '250g/袋', zone: 'B区', shelf: 'B-02', photo: '../../images/03.jpg', qty: 30, unit: '袋', reason: '手工补录', operator: '王五', recordTime: '2025-01-20 09:15:00' }
        ];
        let filtered = [...list];

        function render() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            filtered.forEach(item => {
                const tr = document.createElement('tr');
                const photoUrl = item.photo || '../../images/01.jpg';
                const safeUrl = (photoUrl || '').replace(/"/g, '&quot;');
                const safeName = (item.productName || '').replace(/"/g, '&quot;');
                const photoHtml = '<img src="' + safeUrl + '" alt="照片" class="inventory-photo-thumb" data-url="' + safeUrl + '" data-name="' + safeName + '">';
                tr.innerHTML = `
                    <td>${item.id}</td>
                    <td>${item.date}</td>
                    <td>${item.warehouseName}</td>
                    <td>${item.productName}</td>
                    <td>${item.spec}</td>
                    <td>${item.zone || '-'}</td>
                    <td>${item.shelf || '-'}</td>
                    <td>${photoHtml}</td>
                    <td class="text-right">${item.qty}</td>
                    <td>${item.unit}</td>
                    <td>${item.reason || '-'}</td>
                    <td>${item.operator}</td>
                    <td>${item.recordTime}</td>
                    <td><a href="#" class="detail-link" data-id="${item.id}">查看详情</a></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('summaryCount').textContent = filtered.length;
            document.getElementById('summaryQty').textContent = filtered.reduce((s, i) => s + (i.qty || 0), 0);
        }

        function filterData() {
            const kw = (document.getElementById('quickSearchInput').value || '').trim().toLowerCase();
            const wh = (document.getElementById('msWarehouse') && document.getElementById('msWarehouse').value) || '';
            const dateStart = (document.getElementById('msDateStart') && document.getElementById('msDateStart').value) || '';
            const dateEnd = (document.getElementById('msDateEnd') && document.getElementById('msDateEnd').value) || '';
            filtered = list.filter(item => {
                if (kw && !(item.id + ' ' + item.productName + ' ' + (item.reason || '') + ' ' + item.operator).toLowerCase().includes(kw)) return false;
                if (wh && item.warehouseId !== wh) return false;
                if (dateStart && item.date < dateStart) return false;
                if (dateEnd && item.date > dateEnd) return false;
                return true;
            });
            render();
        }

        document.getElementById('msWarehouse').innerHTML = '<option value="">全部</option>' + warehouses.map(w => '<option value="' + w.id + '">' + w.name + '</option>').join('');
        document.getElementById('quickSearchBtn').addEventListener('click', filterData);
        document.getElementById('quickSearchInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') filterData(); });
        document.getElementById('moreSearchBtn').addEventListener('click', function() {
            document.getElementById('moreSearchExpand').classList.toggle('show');
            this.textContent = document.getElementById('moreSearchExpand').classList.contains('show') ? '收起搜索' : '更多搜索';
        });
        document.getElementById('moreSearchResetBtn').addEventListener('click', function() {
            document.getElementById('msWarehouse').value = '';
            if (document.getElementById('msDateStart')) document.getElementById('msDateStart').value = '';
            if (document.getElementById('msDateEnd')) document.getElementById('msDateEnd').value = '';
        });
        document.getElementById('moreSearchApplyBtn').addEventListener('click', filterData);
        document.getElementById('addBtn').addEventListener('click', function() { alert('新增增加单（示例）：可在此接入新增凭空增加库存的单据流程。'); });
        document.getElementById('exportBtn').addEventListener('click', function() { alert('导出（示例）\n共 ' + filtered.length + ' 条记录'); });
        document.getElementById('printBtn').addEventListener('click', function() {
            if (filtered.length === 0) { alert('没有数据可打印'); return; }
            var win = window.open('', '_blank');
            var cols = ['单号','日期','门店','商品名称','规格','货区','货架','增加数量','单位','原因/备注','操作人','录入时间'];
            var rows = filtered.map(function(item) {
                return [item.id, item.date, item.warehouseName, item.productName, item.spec, item.zone || '-', item.shelf || '-', item.qty, item.unit, item.reason || '-', item.operator, item.recordTime];
            }).map(function(r) { return '<tr><td>' + r.join('</td><td>') + '</td></tr>'; }).join('');
            win.document.write('<html><head><meta charset="utf-8"><title>增加库存-打印</title><style>body{font-family:Microsoft YaHei,sans-serif;padding:16px;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ddd;padding:6px;}</style></head><body><h3>增加库存</h3><p>共 ' + filtered.length + ' 条</p><table><thead><tr><th>' + cols.join('</th><th>') + '</th></tr></thead><tbody>' + rows + '</tbody></table></body></html>');
            win.document.close();
            win.print();
            win.close();
        });
        document.getElementById('photoModalClose').addEventListener('click', function() { document.getElementById('photoModalOverlay').classList.remove('show'); });
        document.getElementById('photoModalOverlay').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
        document.body.addEventListener('click', function(e) {
            const img = e.target.closest('.inventory-photo-thumb');
            if (img) {
                const url = (img.dataset.url || img.src || '').trim();
                const name = (img.dataset.name || '').replace(/&quot;/g, '"');
                const content = document.getElementById('photoModalContent');
                if (url) {
                    content.innerHTML = '<div style="margin-bottom:8px;font-weight:bold;">' + name + '</div><img src="' + url.replace(/</g, '&lt;') + '" alt="照片">';
                } else {
                    content.innerHTML = '<div style="margin-bottom:8px;font-weight:bold;">' + name + '</div><div class="photo-placeholder">暂无照片</div>';
                }
                document.getElementById('photoModalOverlay').classList.add('show');
                return;
            }
            const detailLink = e.target.closest('.detail-link');
            if (detailLink) {
                e.preventDefault();
                openIncreaseDetail(detailLink.dataset.id);
            }
        });

        function openIncreaseDetail(id) {
            const item = list.find(x => x.id === id);
            if (!item) return;
            const modal = document.getElementById('increaseDetailModal');
            const titleEl = document.getElementById('increaseDetailTitle');
            const contentEl = document.getElementById('increaseDetailContent');
            if (!modal || !contentEl) return;

            if (titleEl) titleEl.textContent = '增加库存详情 - ' + (item.productName || '');

            const baseHtml = `
                <div class="detail-section-title">基础信息</div>
                <div class="detail-grid">
                    <div>
                        <div class="detail-item-label">单号</div>
                        <div class="detail-item-value">${item.id}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">日期</div>
                        <div class="detail-item-value">${item.date}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">门店</div>
                        <div class="detail-item-value">${item.warehouseName}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">操作人</div>
                        <div class="detail-item-value">${item.operator}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">录入时间</div>
                        <div class="detail-item-value">${item.recordTime}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">原因/备注</div>
                        <div class="detail-item-value">${item.reason || '-'}</div>
                    </div>
                </div>
            `;

            const productHtml = `
                <div class="detail-section-title">商品信息</div>
                <div class="detail-grid">
                    <div>
                        <div class="detail-item-label">商品名称</div>
                        <div class="detail-item-value">${item.productName}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">规格</div>
                        <div class="detail-item-value">${item.spec}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">货区/货架</div>
                        <div class="detail-item-value">${(item.zone || '-') + ' / ' + (item.shelf || '-')}</div>
                    </div>
                    <div>
                        <div class="detail-item-label">增加数量</div>
                        <div class="detail-item-value">${item.qty} ${item.unit}</div>
                    </div>
                </div>
            `;

            const serials = item.serialNumbers;
            let serialHtml = '';
            if (Array.isArray(serials) && serials.length) {
                const rows = serials.map((s, idx) => `<div>${idx + 1}. ${s}</div>`).join('');
                serialHtml = `
                    <div class="detail-section-title">序列号明细（与本次增加数量对应）</div>
                    <div class="serial-list-box">${rows}</div>
                    <div style="margin-top:4px;font-size:var(--font-size-xs);color:var(--color-text-secondary);">
                        注：示例数据，实际系统可按批次自动生成并与入库单绑定。
                    </div>
                `;
            } else {
                serialHtml = `
                    <div class="detail-section-title">序列号明细</div>
                    <div class="serial-list-box">当前记录未维护序列号信息。</div>
                `;
            }

            contentEl.innerHTML = baseHtml + productHtml + serialHtml;
            modal.classList.add('show');
        }

        (function () {
            const modal = document.getElementById('increaseDetailModal');
            const closeBtn = document.getElementById('increaseDetailCloseBtn');
            const okBtn = document.getElementById('increaseDetailOkBtn');
            function closeDetail() {
                if (modal) modal.classList.remove('show');
            }
            if (closeBtn) closeBtn.addEventListener('click', closeDetail);
            if (okBtn) okBtn.addEventListener('click', closeDetail);
            if (modal) {
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) closeDetail();
                });
            }
        })();
        filterData();
    </script>
</body>
</html>
