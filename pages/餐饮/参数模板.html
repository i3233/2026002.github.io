<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数模板 - 餐饮</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .attr-template-page {
            padding: var(--spacing-lg);
            background-color: var(--color-neutral-50);
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-lg);
            width: 1200px;
        }
        .card-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-md) 0;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-sm);
        }
        .spec-table th,
        .spec-table td {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-200);
            text-align: left;
        }
        .spec-table th {
            background: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
        }
        .spec-table input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .spec-table .col-setting {
            min-width: 220px;
            white-space: nowrap;
        }
        .setting-cell {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-wrap: nowrap;
        }
        .setting-cell label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--font-size-sm);
            font-weight: normal;
            cursor: pointer;
        }
        .setting-cell input[type="radio"] {
            width: auto;
        }
        .setting-limit-wrap {
            display: none;
            align-items: center;
            gap: 4px;
        }
        .setting-limit-wrap.visible {
            display: inline-flex;
        }
        .setting-limit-wrap .setting-limit-input {
            width: 56px;
            padding: 4px 6px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-sm);
        }
        .card-foot {
            margin-top: var(--spacing-lg);
            display: flex;
            justify-content: flex-end;
        }
        .choose-setting {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) 0;
        }
        .choose-setting label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        .choose-setting .choose-input {
            width: 56px;
            padding: 6px 8px;
            border: 1px solid var(--color-neutral-300);
            border-radius: 4px;
            font-size: var(--font-size-base);
            text-align: center;
        }
        .choose-setting .choose-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .param-saved-list {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-neutral-200);
        }
        .param-saved-empty {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin: var(--spacing-sm) 0 0 0;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }
        .tag-pill--primary {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
        }
        .tag-pill--danger {
            background-color: rgba(220, 53, 69, 0.08);
            color: var(--color-error);
        }
        .tag-pill--success {
            background-color: rgba(40, 167, 69, 0.08);
            color: var(--color-success);
        }
        .tag-preview-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            flex-shrink: 0;
        }
        .param-saved-setting {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            max-width: 280px;
        }
    </style>
</head>
<body>
    <div class="attr-template-page">
        <div class="card">
            <h2 class="card-title">参数</h2>
            <div class="choose-setting">
                <label>下边商品为</label>
                <input type="number" class="choose-input" id="chooseTotal" min="1" value="1" placeholder="几">
                <span>选</span>
                <input type="number" class="choose-input" id="chooseCount" min="1" value="1" placeholder="几">
                <label>（可填数字，表示几选几）</label>
            </div>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th>规格名称</th>
                        <th>加价</th>
                        <th>成本</th>
                        <th class="col-setting">设定</th>
                    </tr>
                </thead>
                <tbody id="paramTableBody">
                    <tr>
                        <td><input type="text" class="spec-name" placeholder="规格名称"></td>
                        <td><input type="number" class="spec-price" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td><input type="number" class="spec-cost" placeholder="0" value="0" step="0.01" min="0"> 元</td>
                        <td class="col-setting"><div class="setting-cell"><label><input type="radio" name="param_setting_row" value="required" checked> 必选</label><label><input type="radio" name="param_setting_row" value="limited"> 限量</label><span class="setting-limit-wrap"><input type="number" class="setting-limit-input" min="1" value="1"> 份</span></div></td>
                    </tr>
                </tbody>
            </table>
            <div class="card-foot">
                <button type="button" class="btn btn-primary" id="paramConfirmBtn">确定</button>
            </div>

            <div class="param-saved-list" id="paramSavedListSection">
                <h2 class="card-title">已设定参数模板</h2>
                <table class="spec-table">
                    <thead>
                        <tr>
                            <th>规格名称</th>
                            <th>加价</th>
                            <th>成本</th>
                            <th>设定</th>
                        </tr>
                    </thead>
                    <tbody id="paramSavedListBody"></tbody>
                </table>
                <p class="param-saved-empty" id="paramSavedEmpty" style="display: none;">暂无已保存的参数模板，在上方填写一行后点击「确定」将追加到此处列表。</p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var tbody = document.getElementById('paramTableBody');
            var savedListBody = document.getElementById('paramSavedListBody');
            var savedEmptyEl = document.getElementById('paramSavedEmpty');
            var TEMPLATES_LIST_KEY = 'cateringParamTemplatesSaved';
            var CHOOSE_KEY = 'cateringParamTemplate';

            function escapeHtml(s) {
                if (s == null) return '';
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function formatSettingText(row) {
                var parts = [];
                parts.push(row.required !== false ? '必选' : '非必选');
                if (row.limited) {
                    parts.push('限量' + (parseInt(row.limitQty, 10) || 1) + '份');
                }
                return parts.join('，');
            }

            function getSavedParamTemplatesData() {
                var raw = localStorage.getItem(TEMPLATES_LIST_KEY);
                if (raw === null || raw === '' || raw === '[]') {
                    return [];
                }
                try {
                    var parsed = JSON.parse(raw);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    return [];
                }
            }

            function renderSavedParamList() {
                if (!savedListBody) return;
                var data = getSavedParamTemplatesData();
                if (!Array.isArray(data)) data = [];
                savedListBody.innerHTML = '';
                var pillClasses = ['tag-pill tag-pill--primary', 'tag-pill tag-pill--danger', 'tag-pill tag-pill--success'];
                data.forEach(function (row, i) {
                    var tr = document.createElement('tr');
                    var pc = pillClasses[i % pillClasses.length];
                    tr.innerHTML =
                        '<td><span class="' + pc + '"><span class="tag-preview-dot"></span><span>' + escapeHtml(row.name) + '</span></span></td>' +
                        '<td>¥' + (Number(row.price) || 0).toFixed(2) + '</td>' +
                        '<td>¥' + (Number(row.cost) || 0).toFixed(2) + '</td>' +
                        '<td class="param-saved-setting">' + escapeHtml(formatSettingText(row)) + '</td>';
                    savedListBody.appendChild(tr);
                });
                if (savedEmptyEl) {
                    savedEmptyEl.style.display = data.length ? 'none' : 'block';
                }
            }

            function bindSettingRadios(cell) {
                var radios = cell.querySelectorAll('input[type="radio"]');
                var limitWrap = cell.querySelector('.setting-limit-wrap');
                radios.forEach(function (radio) {
                    radio.addEventListener('change', function () {
                        if (this.value === 'limited') {
                            limitWrap.classList.add('visible');
                        } else {
                            limitWrap.classList.remove('visible');
                        }
                    });
                });
            }

            function collectOneRowFromForm() {
                var tr = tbody.querySelector('tr');
                if (!tr) return null;
                var nameEl = tr.querySelector('.spec-name');
                var priceEl = tr.querySelector('.spec-price');
                var costEl = tr.querySelector('.spec-cost');
                var limInput = tr.querySelector('.setting-limit-input');
                var name = nameEl ? nameEl.value.trim() : '';
                if (!name) return null;
                var limRadio = tr.querySelector('input[value="limited"]');
                var reqRadio = tr.querySelector('input[value="required"]');
                var limited = !!(limRadio && limRadio.checked);
                var required = !!(reqRadio && reqRadio.checked);
                return {
                    name: name,
                    price: parseFloat(priceEl && priceEl.value) || 0,
                    cost: parseFloat(costEl && costEl.value) || 0,
                    required: required,
                    limited: limited,
                    limitQty: Math.max(1, parseInt(limInput && limInput.value, 10) || 1)
                };
            }

            function clearFormRow() {
                var tr = tbody.querySelector('tr');
                if (!tr) return;
                var nameEl = tr.querySelector('.spec-name');
                var priceEl = tr.querySelector('.spec-price');
                var costEl = tr.querySelector('.spec-cost');
                var reqRadio = tr.querySelector('input[value="required"]');
                var limRadio = tr.querySelector('input[value="limited"]');
                var limInput = tr.querySelector('.setting-limit-input');
                var limitWrap = tr.querySelector('.setting-limit-wrap');
                if (nameEl) nameEl.value = '';
                if (priceEl) priceEl.value = '0';
                if (costEl) costEl.value = '0';
                if (reqRadio) reqRadio.checked = true;
                if (limRadio) limRadio.checked = false;
                if (limInput) limInput.value = '1';
                if (limitWrap) limitWrap.classList.remove('visible');
            }

            document.getElementById('paramConfirmBtn').addEventListener('click', function () {
                var chooseTotal = parseInt(document.getElementById('chooseTotal').value, 10) || 1;
                var chooseCount = parseInt(document.getElementById('chooseCount').value, 10) || 1;
                try {
                    localStorage.setItem(CHOOSE_KEY, JSON.stringify({
                        chooseTotal: Math.max(1, chooseTotal),
                        chooseCount: Math.max(1, Math.min(chooseCount, chooseTotal))
                    }));
                } catch (e) {}
                var row = collectOneRowFromForm();
                if (!row) {
                    alert('请填写规格名称');
                    return;
                }
                var data = getSavedParamTemplatesData();
                if (!Array.isArray(data)) data = [];
                data.push(row);
                try {
                    localStorage.setItem(TEMPLATES_LIST_KEY, JSON.stringify(data));
                } catch (e) {}
                renderSavedParamList();
                clearFormRow();
            });

            tbody.querySelectorAll('.setting-cell').forEach(function (cell) {
                bindSettingRadios(cell);
            });

            var saved = null;
            try { saved = JSON.parse(localStorage.getItem(CHOOSE_KEY) || 'null'); } catch (e) {}
            if (saved) {
                var ct = document.getElementById('chooseTotal');
                var cc = document.getElementById('chooseCount');
                if (ct) ct.value = saved.chooseTotal || 1;
                if (cc) cc.value = saved.chooseCount || 1;
            }

            renderSavedParamList();
        })();
    </script>
</body>
</html>
