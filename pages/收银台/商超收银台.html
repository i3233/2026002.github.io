<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商超收银台 - 雅安好物</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <link rel="stylesheet" href="商超收银台.css">
</head>
<body class="mall-cashier-body">
    <div class="mall-cashier-layout">
        <!-- 顶部 -->
        <header class="mall-cashier-header">
            <div class="mall-cashier-tabs">
                <button type="button" class="mall-cashier-tab active" data-tab="product">商品</button>
                <button type="button" class="mall-cashier-tab" data-tab="member">会员</button>
                <button type="button" class="mall-cashier-tab" data-tab="order">订单</button>
            </div>
            <div class="mall-cashier-cart-link">
                <span>结账清单</span>
                <span id="cartCount">(0件)</span>
            </div>
        </header>

        <!-- 订单列表视图（点击订单 Tab 时显示） -->
        <div class="mall-order-panel hidden" id="orderPanel">
            <header class="mall-order-header">
                <button type="button" class="mall-order-back" id="orderPanelBack">← 返回</button>
                <h1 class="mall-order-title">订单</h1>
            </header>
            <div class="mall-order-search-wrap">
                <input type="text" class="mall-order-search" id="orderSearchInput" placeholder="请输入订单号搜索">
                <button type="button" class="mall-order-search-btn" id="orderSearchBtn">🔍</button>
            </div>
            <div class="mall-order-list" id="orderList"></div>
        </div>

        <!-- 主内容 -->
        <main class="mall-cashier-main" id="productMain">
            <!-- 左侧：搜索 + 分类 + 商品 -->
            <div class="mall-cashier-left">
                <div class="mall-cashier-search-wrap">
                    <input type="text" class="mall-cashier-search" id="productSearch" placeholder="请输入商品名称/条码">
                </div>
                <div class="mall-cashier-content">
                    <nav class="mall-cashier-categories">
                        <button type="button" class="mall-cashier-cat-item active" data-category="all">全部</button>
                        <button type="button" class="mall-cashier-cat-item" data-category="雅安好景">雅安好景</button>
                        <button type="button" class="mall-cashier-cat-item" data-category="雅安好物">雅安好物</button>
                        <button type="button" class="mall-cashier-cat-item" data-category="文创产品">文创产品</button>
                    </nav>
                    <div class="mall-cashier-products" id="productGrid"></div>
                </div>
            </div>

            <!-- 右侧：结算清单 -->
            <aside class="mall-cashier-right">
                <div class="mall-cashier-cart-title">结算清单 <span id="cartCountRight">(0件)</span></div>
                <div class="mall-cashier-cart-body" id="cartBody">
                    <div class="mall-cashier-cart-empty-icon">📋</div>
                    <div class="mall-cashier-cart-empty-text">此次暂无选中商品</div>
                </div>
                <div class="mall-cashier-cart-summary" id="cartSummary" style="display:none;">
                    <div class="mall-cashier-cart-summary-row">本次优惠：<span id="summaryDiscount">¥0.00</span></div>
                    <div class="mall-cashier-cart-summary-row total">应收金额：<span id="summaryTotal">¥0.00</span></div>
                </div>
                <div class="mall-cashier-cart-actions">
                    <button type="button" class="btn mall-cashier-btn-cancel" id="btnCancelOrder">整单取消</button>
                    <button type="button" class="btn mall-cashier-btn-pay" id="btnPay">收款</button>
                </div>
            </aside>
        </main>

        <!-- 底部操作栏 -->
        <footer class="mall-cashier-bottom" id="cashierBottom">
            <button type="button" class="mall-cashier-bottom-btn">整单</button>
            <button type="button" class="mall-cashier-bottom-btn">取单</button>
            <button type="button" class="mall-cashier-bottom-btn">加钟</button>
            <button type="button" class="mall-cashier-bottom-btn">改价</button>
            <button type="button" class="mall-cashier-bottom-btn">会员充值</button>
        </footer>
    </div>

    <!-- 会员查询弹窗 -->
    <div class="mall-member-modal hidden" id="memberModal">
        <div class="mall-member-modal-backdrop" id="memberModalClose"></div>
        <div class="mall-member-modal-content">
            <div class="mall-member-modal-icon">📱✓</div>
            <p class="mall-member-modal-tip">请扫描付款码或者输入会员手机号以便查询会员</p>
            <input type="text" class="mall-member-modal-input" id="memberQueryInput" placeholder="请扫描付款码或会员手机号" readonly>
            <div class="mall-member-keypad-wrap">
                <div class="mall-member-keypad" id="memberKeypad">
                    <button type="button" class="mall-member-key" data-n="1">1</button>
                    <button type="button" class="mall-member-key" data-n="2">2</button>
                    <button type="button" class="mall-member-key" data-n="3">3</button>
                    <button type="button" class="mall-member-key mall-member-key-del" data-n="del">X</button>
                    <button type="button" class="mall-member-key" data-n="4">4</button>
                    <button type="button" class="mall-member-key" data-n="5">5</button>
                    <button type="button" class="mall-member-key" data-n="6">6</button>
                    <button type="button" class="mall-member-key mall-member-key-confirm" id="memberConfirmBtn" data-n="confirm">确认</button>
                    <button type="button" class="mall-member-key" data-n="7">7</button>
                    <button type="button" class="mall-member-key" data-n="8">8</button>
                    <button type="button" class="mall-member-key" data-n="9">9</button>
                    <button type="button" class="mall-member-key mall-member-key-zero" data-n="0">0</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var products = [
                { id: 1, name: '雅安特产绿营养蛋', category: '雅安好景', image: '../../images/01.jpg', price: 20.00, stock: 6977 },
                { id: 2, name: '土司农家散养蛋', category: '雅安好景', image: '../../images/02.jpg', price: 18.00, stock: 1306 },
                { id: 3, name: '有机山茶油', category: '雅安好景', image: '../../images/03.jpg', price: 36.00, stock: 2623 },
                { id: 4, name: '腊味礼盒', category: '雅安好景', image: '../../images/04.jpg', price: 15.00, stock: 856 },
                { id: 5, name: '蒙顶山茶', category: '雅安好景', image: '../../images/05.jpg', price: 49.00, stock: 420 },
                { id: 6, name: '雅鱼鲜礼盒', category: '雅安好景', image: '../../images/06.jpg', price: 68.00, stock: 318 },
                { id: 7, name: '花椒油', category: '雅安好景', image: '../../images/01.jpg', price: 15.00, stock: 2100 },
                { id: 13, name: '雅安蜂蜜', category: '雅安好物', image: '../../images/01.jpg', price: 38.00, stock: 520 },
                { id: 14, name: '雅安黑茶', category: '雅安好物', image: '../../images/02.jpg', price: 88.00, stock: 260 },
                { id: 15, name: '雅安菌菇干货', category: '雅安好物', image: '../../images/03.jpg', price: 45.00, stock: 380 },
                { id: 8, name: '熊猫周边玩偶', category: '文创产品', image: '../../images/02.jpg', price: 28.00, stock: 560 },
                { id: 9, name: '雅安风景明信片', category: '文创产品', image: '../../images/03.jpg', price: 58.00, stock: 890 },
                { id: 10, name: '茶具套装', category: '文创产品', image: '../../images/04.jpg', price: 52.00, stock: 234 },
                { id: 11, name: '手工茶饼', category: '文创产品', image: '../../images/05.jpg', price: 58.00, stock: 445 },
                { id: 12, name: '精品礼盒装', category: '文创产品', image: '../../images/06.jpg', price: 268.00, stock: 120 }
            ];
            var cart = [];
            var currentCategory = 'all';
            var searchKeyword = '';

            function getFilteredProducts() {
                var list = products;
                if (currentCategory !== 'all') list = list.filter(function (p) { return p.category === currentCategory; });
                if (searchKeyword) {
                    var k = searchKeyword.toLowerCase();
                    list = list.filter(function (p) { return (p.name || '').toLowerCase().indexOf(k) >= 0 || String(p.id).indexOf(k) >= 0; });
                }
                return list;
            }

            function renderProducts() {
                var list = getFilteredProducts();
                var html = list.map(function (p) {
                    return '<div class="mall-cashier-product-card" data-id="' + p.id + '">' +
                        '<img class="mall-cashier-product-img" src="' + (p.image || '') + '" alt="" onerror="this.src=\'../../images/01.jpg\'">' +
                        '<div class="mall-cashier-product-info">' +
                        '<div class="mall-cashier-product-name">' + (p.name || '') + '</div>' +
                        '<div class="mall-cashier-product-price">¥' + (p.price != null ? Number(p.price).toFixed(2) : '0.00') + '</div>' +
                        '<div class="mall-cashier-product-stock">库存' + (p.stock != null ? p.stock : 0) + '</div>' +
                        '<button type="button" class="mall-cashier-product-add" data-id="' + p.id + '" title="加入">+</button>' +
                        '</div></div>';
                }).join('');
                document.getElementById('productGrid').innerHTML = html || '<p style="padding:24px;color:#999;">暂无商品</p>';

                document.querySelectorAll('.mall-cashier-product-add').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = this.dataset.id;
                        var p = products.find(function (x) { return String(x.id) === String(id); });
                        if (p) {
                            var item = cart.find(function (x) { return String(x.id) === String(id); });
                            if (item) item.qty++; else cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
                            updateCartUI();
                        }
                    });
                });
            }

            function updateCartUI() {
                var count = cart.reduce(function (sum, x) { return sum + (x.qty || 0); }, 0);
                document.getElementById('cartCount').textContent = '(' + count + '件)';
                document.getElementById('cartCountRight').textContent = '(' + count + '件)';
                var body = document.getElementById('cartBody');
                var summary = document.getElementById('cartSummary');
                if (count === 0) {
                    body.innerHTML = '<div class="mall-cashier-cart-empty-icon">📋</div><div class="mall-cashier-cart-empty-text">此次暂无选中商品</div>';
                    body.style.display = 'flex';
                    if (summary) summary.style.display = 'none';
                } else {
                    var total = cart.reduce(function (sum, x) { return sum + (x.price || 0) * (x.qty || 0); }, 0);
                    body.innerHTML = '<div style="width:100%;font-size:13px;color:#666;">' + cart.map(function (x) {
                        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;">' +
                            '<span>' + (x.name || '') + ' x' + (x.qty || 0) + '</span>' +
                            '<span>¥' + ((x.price || 0) * (x.qty || 0)).toFixed(2) + '</span></div>';
                    }).join('') + '</div>';
                    body.style.display = 'block';
                    if (summary) {
                        summary.style.display = 'block';
                        var el = document.getElementById('summaryTotal');
                        if (el) el.textContent = '¥' + total.toFixed(2);
                    }
                }
            }

            document.getElementById('productSearch').addEventListener('input', function () {
                searchKeyword = this.value.trim();
                renderProducts();
            });
            document.querySelectorAll('.mall-cashier-cat-item').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.mall-cashier-cat-item').forEach(function (b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    currentCategory = this.dataset.category || 'all';
                    renderProducts();
                });
            });
            document.getElementById('btnCancelOrder').addEventListener('click', function () {
                if (cart.length === 0) return;
                if (confirm('确定整单取消？')) { cart = []; updateCartUI(); }
            });
            document.getElementById('btnPay').addEventListener('click', function () {
                if (cart.length === 0) { alert('请先添加商品'); return; }
                alert('收款功能演示：应收 ' + cart.reduce(function (s, x) { return s + (x.price || 0) * (x.qty || 0); }, 0).toFixed(2) + ' 元');
            });

            // 会员 tab：打开会员查询弹窗
            document.querySelectorAll('.mall-cashier-tab[data-tab="member"]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.getElementById('memberModal').classList.remove('hidden');
                    document.getElementById('memberQueryInput').value = '';
                });
            });
            document.querySelectorAll('.mall-cashier-tab[data-tab="product"]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.mall-cashier-tab').forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                });
            });
            document.querySelectorAll('.mall-cashier-tab[data-tab="order"]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.mall-cashier-tab').forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    document.getElementById('productMain').classList.add('hidden');
                    document.getElementById('cashierBottom').classList.add('hidden');
                    document.getElementById('orderPanel').classList.remove('hidden');
                    renderOrderList();
                });
            });
            document.getElementById('orderPanelBack').addEventListener('click', function () {
                document.getElementById('orderPanel').classList.add('hidden');
                document.getElementById('productMain').classList.remove('hidden');
                document.getElementById('cashierBottom').classList.remove('hidden');
                document.querySelectorAll('.mall-cashier-tab').forEach(function (b) { b.classList.remove('active'); });
                document.querySelector('.mall-cashier-tab[data-tab="product"]').classList.add('active');
            });
            document.getElementById('orderSearchBtn').addEventListener('click', function () { renderOrderList(); });
            document.getElementById('orderSearchInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') renderOrderList(); });

            function renderOrderList() {
                var keyword = (document.getElementById('orderSearchInput').value || '').trim();
                var list = getDemoOrders();
                if (keyword) list = list.filter(function (o) { return (o.orderNo || '').indexOf(keyword) >= 0; });
                var html = list.map(function (o) {
                    var productsHtml = (o.products || []).map(function (p) {
                        return '<div class="mall-order-card-product">' +
                            '<img src="' + (p.image || '../../images/01.jpg') + '" alt="" onerror="this.src=\'../../images/01.jpg\'">' +
                            '<div class="mall-order-card-product-name">' + (p.name || '') + '</div>' +
                            '<div class="mall-order-card-product-qty">x' + (p.qty || 0) + '</div>' +
                            '<div class="mall-order-card-product-price">¥' + (p.price != null ? (Number(p.price) * (p.qty || 0)).toFixed(2) : '0.00') + '</div>' +
                            '</div>';
                    }).join('');
                    var guideLine = o.guideId ? '<div>导购员：<span>' + o.guideId + '</span></div>' : '';
                    return '<div class="mall-order-card" data-id="' + (o.orderNo || '') + '">' +
                        '<div class="mall-order-card-head">' +
                        '<div>订单号：<span>' + (o.orderNo || '') + '</span></div>' + guideLine +
                        '<div>收银员：<span>' + (o.cashierId || '') + '</span></div>' +
                        '</div>' +
                        '<div class="mall-order-card-products">' + productsHtml + '</div>' +
                        '<div class="mall-order-card-footer">' +
                        '<span class="mall-order-card-total">订单总价：¥' + (o.total != null ? Number(o.total).toFixed(2) : '0.00') + '</span>' +
                        '<span class="mall-order-card-count">等' + (o.itemCount != null ? o.itemCount : (o.products || []).length) + '件商品</span>' +
                        '</div>' +
                        '<div class="mall-order-card-actions">' +
                        '<button type="button" class="mall-order-card-btn">打印小票</button>' +
                        '<button type="button" class="mall-order-card-btn">添加备注</button>' +
                        '<button type="button" class="mall-order-card-btn mall-order-card-btn-primary">详情</button>' +
                        '</div></div>';
                }).join('');
                document.getElementById('orderList').innerHTML = html || '<p class="mall-order-empty">暂无订单</p>';
            }
            function getDemoOrders() {
                // 默认不预置任何订单数据，订单列表为空
                return [];
            }
            document.getElementById('memberModalClose').addEventListener('click', function () {
                document.getElementById('memberModal').classList.add('hidden');
            });
            var memberInput = document.getElementById('memberQueryInput');
            document.getElementById('memberKeypad').addEventListener('click', function (e) {
                var btn = e.target.closest('.mall-member-key');
                if (!btn) return;
                var n = btn.dataset.n;
                if (n === 'del') {
                    memberInput.value = memberInput.value.slice(0, -1);
                } else if (n === 'confirm') {
                    return;
                } else {
                    memberInput.value += n;
                }
            });
            document.getElementById('memberConfirmBtn').addEventListener('click', function () {
                var val = (memberInput.value || '').trim();
                if (!val) { alert('请扫描付款码或输入会员手机号'); return; }
                alert('查询会员：' + val + '\n（演示：可在此对接会员信息查询）');
                document.getElementById('memberModal').classList.add('hidden');
            });

            renderProducts();
            updateCartUI();
        })();
    </script>
</body>
</html>
