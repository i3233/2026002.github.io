<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小程序配置 - 2026新项目二</title>
    <link rel="stylesheet" href="../../css/Main.css">
    <style>
        .miniprogram-config-page {
            display: flex;
            height: calc(100vh - 60px);
            background-color: var(--color-neutral-50);
            overflow: hidden;
        }

        /* 左侧配置菜单 */
        .config-sidebar {
            width: 240px;
            background-color: #ffffff;
            border-right: 1px solid var(--color-neutral-200);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 10;
        }

        .sidebar-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-xs) 0;
        }

        .sidebar-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .config-menu {
            padding: var(--spacing-md);
        }

        .menu-item {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .menu-item:hover {
            background-color: var(--color-neutral-50);
        }

        .menu-item.active {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        .menu-item-icon {
            font-size: var(--font-size-lg);
        }

        .menu-item-text {
            flex: 1;
            font-size: var(--font-size-sm);
        }

        /* 配置内容区 */
        .config-content {
            width: 500px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--spacing-lg);
            flex-shrink: 0;
        }

        .config-section {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-card);
        }

        .config-section-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--color-neutral-200);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .form-label .required {
            color: var(--color-error);
            margin-left: 2px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-input-focus);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-hint {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-xs);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
        }

        /* 图片上传 */
        .image-upload {
            border: 2px dashed var(--color-neutral-300);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
        }

        .image-upload:hover {
            border-color: var(--color-primary);
            background-color: rgba(44, 131, 235, 0.05);
        }

        .image-upload-icon {
            font-size: 32px;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .image-preview {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-top: var(--spacing-md);
        }

        .image-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--color-neutral-200);
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* 开关控件 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-neutral-300);
            transition: var(--transition-base);
            border-radius: var(--radius-full);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #ffffff;
            transition: var(--transition-base);
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--color-primary);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .switch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--color-neutral-100);
        }

        .switch-item:last-child {
            border-bottom: none;
        }

        .switch-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
        }

        .switch-desc {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-xs);
        }

        /* 复选框组 */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            cursor: pointer;
        }

        /* 时间段选择 */
        .time-range {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .time-range input {
            flex: 1;
        }

        /* 表格容器 */
        .table-wrapper-config {
            overflow-x: auto;
            overflow-y: visible;
            margin-top: var(--spacing-md);
            -webkit-overflow-scrolling: touch;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            min-width: 600px;
            border-collapse: collapse;
            table-layout: auto;
        }

        .data-table th,
        .data-table td {
            padding: var(--spacing-xs) var(--spacing-sm);
            text-align: left;
            border-bottom: 1px solid var(--color-neutral-200);
            font-size: var(--font-size-xs);
        }

        /* 默认单元格样式 */
        .data-table td:not(.allow-wrap),
        .data-table th:not(.allow-wrap) {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .data-table th {
            background-color: var(--color-neutral-50);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table tbody tr:hover {
            background-color: var(--color-neutral-50);
        }

        /* 特定列允许换行 */
        .data-table td.allow-wrap,
        .data-table th.allow-wrap {
            white-space: normal;
            word-break: break-word;
            max-width: 150px;
        }

        /* 操作列固定宽度 */
        .data-table td.actions-cell,
        .data-table th.actions-cell {
            width: 100px;
            min-width: 100px;
            max-width: 100px;
        }

        /* 图片列固定宽度 */
        .data-table td.image-cell,
        .data-table th.image-cell {
            width: 60px;
            min-width: 60px;
            max-width: 60px;
        }

        .table-actions {
            display: flex;
            gap: var(--spacing-xs);
        }

        .btn-sm {
            padding: var(--spacing-xs) var(--spacing-sm);
            font-size: var(--font-size-xs);
        }

        /* 右侧预览区域 */
        .preview-area {
            flex: 1;
            min-width: 500px;
            background-color: var(--color-neutral-100);
            padding: var(--spacing-lg);
            overflow-y: auto;
            border-left: 1px solid var(--color-neutral-200);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-md);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        .preview-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0;
        }

        .preview-tabs {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-md);
        }

        .preview-tab {
            padding: var(--spacing-xs) var(--spacing-sm);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-sm);
            background-color: #ffffff;
            font-size: var(--font-size-xs);
            cursor: pointer;
        }

        .preview-tab.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
        }

        /* 手机预览框 */
        .phone-preview {
            width: 375px;
            margin: 0 auto;
            background-color: #000000;
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .phone-screen {
            width: 100%;
            height: 667px;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .phone-status-bar {
            height: 20px;
            background-color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 var(--spacing-sm);
            font-size: 10px;
            color: #ffffff;
        }

        .phone-content {
            height: calc(100% - 20px);
            overflow-y: auto;
            position: relative;
        }

        /* 小程序页面样式 */
        .mp-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: var(--spacing-lg);
            color: #ffffff;
        }

        .mp-shop-name {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-xs);
        }

        .mp-shop-logo {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            background-color: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-sm);
        }

        .mp-navbar {
            display: flex;
            background-color: #ffffff;
            border-bottom: 1px solid var(--color-neutral-200);
            padding: var(--spacing-sm);
        }

        .mp-nav-item {
            flex: 1;
            text-align: center;
            padding: var(--spacing-sm);
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
        }

        .mp-nav-item.active {
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        .mp-product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            padding: var(--spacing-sm);
        }

        .mp-product-item {
            background-color: #ffffff;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .mp-product-image {
            width: 100%;
            height: 120px;
            background-color: var(--color-neutral-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-secondary);
        }

        .mp-product-info {
            padding: var(--spacing-sm);
        }

        .mp-product-name {
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .mp-product-price {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            color: var(--color-error);
        }

        .mp-order-item {
            background-color: #ffffff;
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            box-shadow: var(--shadow-sm);
        }

        .mp-order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--color-neutral-100);
        }

        .mp-order-status {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            background-color: rgba(40, 167, 69, 0.1);
            color: var(--color-success);
        }

        .mp-progress-bar {
            height: 4px;
            background-color: var(--color-neutral-200);
            border-radius: 2px;
            margin: var(--spacing-sm) 0;
            overflow: hidden;
        }

        .mp-progress-fill {
            height: 100%;
            background-color: var(--color-primary);
            transition: width 0.3s ease;
        }

        .mp-timeline {
            padding: var(--spacing-md);
        }

        .mp-timeline-item {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            position: relative;
        }

        .mp-timeline-item::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 24px;
            bottom: -12px;
            width: 2px;
            background-color: var(--color-neutral-200);
        }

        .mp-timeline-item:last-child::before {
            display: none;
        }

        .mp-timeline-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--color-neutral-300);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .mp-timeline-item.active .mp-timeline-dot {
            background-color: var(--color-primary);
        }

        .mp-timeline-content {
            flex: 1;
        }

        .mp-timeline-title {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .mp-timeline-time {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .mp-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
        }

        .mp-stat-card {
            background-color: #ffffff;
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .mp-stat-value {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary);
            margin-bottom: var(--spacing-xs);
        }

        .mp-stat-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
        }

        .mp-photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-xs);
            margin-top: var(--spacing-sm);
        }

        .mp-photo-item {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            background-color: var(--color-neutral-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-secondary);
            font-size: var(--font-size-xs);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--color-neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: var(--font-size-2xl);
            color: var(--color-text-secondary);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: var(--spacing-lg);
        }

        .category-tree {
            max-height: 400px;
            overflow-y: auto;
        }

        .category-item {
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--color-neutral-100);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .category-item:hover {
            background-color: var(--color-neutral-50);
        }

        .category-children {
            padding-left: var(--spacing-xl);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }

        @media (max-width: 1400px) {
            .config-sidebar {
                width: 200px;
            }

            .config-content {
                width: 400px;
            }

            .preview-area {
                min-width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="miniprogram-config-page">
        <!-- 左侧配置菜单 -->
        <div class="config-sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">小程序配置</h2>
                <div class="sidebar-subtitle">可视化配置小程序页面</div>
            </div>

            <div class="config-menu">
                <div class="menu-item active" data-menu="basic">
                    <span class="menu-item-icon">⚙</span>
                    <span class="menu-item-text">基础配置</span>
                </div>
                <div class="menu-item" data-menu="product">
                    <span class="menu-item-icon">📦</span>
                    <span class="menu-item-text">商品添加</span>
                </div>
                <div class="menu-item" data-menu="delivery">
                    <span class="menu-item-icon">🚚</span>
                    <span class="menu-item-text">配送员管理</span>
                </div>
                <div class="menu-item" data-menu="order">
                    <span class="menu-item-icon">📋</span>
                    <span class="menu-item-text">用户订单查看</span>
                </div>
                <div class="menu-item" data-menu="orderManage">
                    <span class="menu-item-icon">📊</span>
                    <span class="menu-item-text">订单管理</span>
                </div>
            </div>
        </div>

        <!-- 中间配置内容区 -->
        <div class="config-content" id="configContent">
            <!-- JS 动态渲染配置内容 -->
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-area">
            <div class="preview-header">
                <h3 class="preview-title">小程序预览</h3>
                <div>
                    <button class="btn btn-primary btn-sm" id="saveBtn">保存</button>
                </div>
            </div>

            <div class="preview-tabs" id="previewTabs">
                <!-- JS 动态生成预览标签 -->
            </div>

            <div class="phone-preview">
                <div class="phone-screen">
                    <div class="phone-status-bar">
                        <span>9:41</span>
                        <span>📶 📶 🔋</span>
                    </div>
                    <div class="phone-content" id="phoneContent">
                        <!-- JS 动态渲染预览内容 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分类管理模态框 -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">分类管理</h3>
                <button class="modal-close" onclick="closeCategoryModal()">×</button>
            </div>
            <div class="modal-body" id="categoryModalBody">
                <!-- JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- 配送照片预览模态框 -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">配送照片</h3>
                <button class="modal-close" onclick="closePhotoModal()">×</button>
            </div>
            <div class="modal-body" id="photoModalBody">
                <!-- JS 渲染 -->
            </div>
        </div>
    </div>

    <script>
        // 配置数据
        const configData = {
            basic: {

            let tabs = [];
            switch (currentMenu) {
                case 'basic':
                    tabs = [{ id: 'home', name: '首页' }];
                    break;
                case 'product':
                    tabs = [{ id: 'productList', name: '商品列表' }, { id: 'productDetail', name: '商品详情' }];
                    break;
                case 'delivery':
                    tabs = [{ id: 'deliveryStaff', name: '配送员端' }];
                    break;
                case 'order':
                    tabs = [{ id: 'userOrder', name: '我的订单' }];
                    break;
                case 'orderManage':
                    tabs = [{ id: 'orderManage', name: '订单管理' }];
                    break;
            }

            previewTabs.innerHTML = tabs.map(tab => `
                <div class="preview-tab ${tab.id === currentPreviewTab ? 'active' : ''}" 
                     onclick="switchPreviewTab('${tab.id}')">${tab.name}</div>
            `).join('');

            // 渲染预览内容
            switch (currentMenu) {
                case 'basic':
                    phoneContent.innerHTML = renderHomePreview();
                    break;
                case 'product':
                    if (currentPreviewTab === 'productList') {
                        phoneContent.innerHTML = renderProductListPreview();
                    } else {
                        phoneContent.innerHTML = renderProductDetailPreview();
                    }
                    break;
                case 'delivery':
                    phoneContent.innerHTML = renderDeliveryStaffPreview();
                    break;
                case 'order':
                    phoneContent.innerHTML = renderUserOrderPreview();
                    break;
                case 'orderManage':
                    phoneContent.innerHTML = renderOrderManagePreview();
                    break;
            }
        }

        function bindEvents() {
            // 菜单切换
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                    this.classList.add('active');
                    currentMenu = this.dataset.menu;
                    currentPreviewTab = currentMenu === 'product' ? 'productList' : 'home';
                    renderConfigContent();
                    renderPreview();
                });
            });

            // 保存按钮
            document.getElementById('saveBtn').addEventListener('click', function() {
                const data = {
                    config: configData,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('miniprogramConfig', JSON.stringify(data));
                alert('配置已保存！');
            });
        }

        function switchPreviewTab(tabId) {
            currentPreviewTab = tabId;
            document.querySelectorAll('.preview-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === (tabId === 'productList' ? '商品列表' : tabId === 'productDetail' ? '商品详情' : '首页')) {
                    tab.classList.add('active');
                }

            renderPreview();

        function openCategoryModal() {
            const modal = document.getElementById('categoryModal');
            const body = document.getElementById('categoryModalBody');
            body.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-md);">
                    <button class="btn btn-primary btn-sm" onclick="addCategory()">新增分类</button>

                    ${renderCategoryTree()}
                </div>
            `;
            modal.classList.add('show');
        }

        function renderCategoryTree(parentId = 0, level = 0) {
            const children = configData.categories.filter(c => c.parentId === parentId);
            if (children.length === 0) return '';
            
            return children.map(cat => {
                const subTree = renderCategoryTree(cat.id, level + 1);
                return `
                    <div class="category-item" style="padding-left: ${level * 20 + 16}px;">
                        <input type="checkbox" ${cat.enabled ? 'checked' : ''} onchange="toggleCategory(${cat.id}, this.checked)">
                        <span style="flex: 1;">${cat.name}</span>
                        <input type="number" value="${cat.order}" style="width: 60px; padding: 2px 4px; border: 1px solid var(--color-neutral-300); border-radius: var(--radius-sm);" 
                               onchange="updateCategoryOrder(${cat.id}, this.value)">
                        <button class="btn btn-outline btn-sm" onclick="editCategory(${cat.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})">删除</button>
                    </div>
                    ${subTree}
                `;
            }).join('');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('show');

        function toggleCategory(id, enabled) {
            const cat = configData.categories.find(c => c.id === id);
            if (cat) {
                cat.enabled = enabled;
            }
        }

        function updateCategoryOrder(id, order) {
            const cat = configData.categories.find(c => c.id === id);
            if (cat) {
                cat.order = parseInt(order);
            }
        }

        function addCategory() {
            const name = prompt('请输入分类名称：');
            if (name) {
                const newId = Math.max(...configData.categories.map(c => c.id)) + 1;
                configData.categories.push({
                    id: newId,
                    name: name,
                    parentId: 0,
                    order: 0,
                    enabled: true
                });
                openCategoryModal();
            }
        }

        function editCategory(id) {
            const cat = configData.categories.find(c => c.id === id);
            if (cat) {
                const newName = prompt('请输入新分类名称：', cat.name);
                if (newName) {
                    cat.name = newName;
                    openCategoryModal();
                }
            }
        }

        function deleteCategory(id) {
            if (confirm('确定要删除这个分类吗？')) {
                configData.categories = configData.categories.filter(c => c.id !== id);
                openCategoryModal();
            }
        }

        function updateDeliveryRule(key, value) {
            configData.deliveryRules[key] = value;
            renderPreview();
        }

        function updatePhotoNodes() {
            const nodes = [];
            if (document.getElementById('photoNodeArrival').checked) nodes.push('arrival');
            if (document.getElementById('photoNodeComplete').checked) nodes.push('complete');
            configData.deliveryRules.photoNodes = nodes;
            renderPreview();
        }

        function viewDeliveryDetail(id) {
            alert('查看配送员详情');
        }

        function disableStaff(id) {
            if (confirm('确定要禁用这个配送员吗？')) {
                alert('禁用配送员功能');
            }
        }

        function viewDeliveryPhotos(orderId) {
            const modal = document.getElementById('photoModal');
            const body = document.getElementById('photoModalBody');
            body.innerHTML = `
                <div style="font-size: var(--font-size-sm); margin-bottom: var(--spacing-md);">订单号：${orderId}</div>
                <div class="mp-photo-grid">
                    ${Array(6).fill(0).map((_, i) => `
                        <div class="mp-photo-item">照片${i + 1}</div>
                    `).join('')}
                </div>
            `;
            modal.classList.add('show');
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('show');
        }

        function viewOrderDetail(orderId) {
            const order = mockOrders.find(o => o.id === orderId);
            if (order) {
                document.getElementById('orderDetailPanel').style.display = 'block';
                document.getElementById('orderDetailContent').innerHTML = `
                    <div style="padding: var(--spacing-md); background-color: var(--color-neutral-50); border-radius: var(--radius-md); margin-bottom: var(--spacing-md);">
                        <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--spacing-sm);">用户信息</div>
                        <div style="font-size: var(--font-size-sm);">${order.userName}</div>
                        <div style="font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 2px;">${order.mobile}</div>
                    </div>
                    <div style="margin-bottom: var(--spacing-md);">
                        <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--spacing-sm);">商品清单</div>
                        ${order.products.map(p => `
                            <div style="display: flex; justify-content: space-between; padding: var(--spacing-sm); background-color: var(--color-neutral-50); border-radius: var(--radius-sm); margin-bottom: var(--spacing-xs);">
                                <span>${p.name} x${p.qty}</span>
                                <span>¥${(p.price * p.qty).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-bottom: var(--spacing-md);">
                        <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--spacing-sm);">订单金额明细</div>
                        <div style="display: flex; justify-content: space-between; padding: var(--spacing-sm);">
                            <span>商品总额</span>
                            <span>¥${order.amount.toFixed(2)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: var(--spacing-sm); border-top: 1px solid var(--color-neutral-200);">
                            <span style="font-weight: var(--font-weight-medium);">合计</span>
                            <span style="font-weight: var(--font-weight-bold); color: var(--color-error);">¥${order.amount.toFixed(2)}</span>
                        </div>
                    </div>
                    <div style="margin-bottom: var(--spacing-md);">
                        <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--spacing-sm);">配送信息</div>
                        <div style="font-size: var(--font-size-sm);">配送方式：${order.deliveryMethod}</div>
                        ${order.status === 'completed' ? `
                            <div style="margin-top: var(--spacing-sm);">
                                <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--spacing-xs);">📷 配送到点照片</div>
                                <div class="mp-photo-grid">
                                    ${Array(3).fill(0).map((_, i) => `
                                        <div class="mp-photo-item">照片${i + 1}</div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                renderPreview();
            }
        }

        function viewOrderProgress(orderId) {
            const order = mockOrders.find(o => o.id === orderId);
            if (order) {
                document.getElementById('orderProgressPanel').style.display = 'block';
                const steps = [
                    { name: '下单', time: order.orderTime, active: true },
                    { name: '支付成功', time: order.orderTime, active: order.status !== 'pending' },
                    { name: '商家接单', time: order.orderTime, active: order.status !== 'pending' },
                    { name: '配送中', time: order.orderTime, active: order.status === 'delivering' || order.status === 'completed' },
                    { name: '已完成', time: order.orderTime, active: order.status === 'completed' }
                ];
                document.getElementById('orderProgressContent').innerHTML = `
                    <div class="mp-timeline">
                        ${steps.map((step, index) => `
                            <div class="mp-timeline-item ${step.active ? 'active' : ''}">
                                <div class="mp-timeline-dot"></div>
                                <div class="mp-timeline-content">
                                    <div class="mp-timeline-title">${step.name}</div>
                                    <div class="mp-timeline-time">${step.time}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                renderPreview();
            }
        }

        function loadSavedConfig() {
            const saved = localStorage.getItem('miniprogramConfig');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.config) {
                        Object.assign(configData, data.config);
                        renderConfigContent();
                        renderPreview();
                    }
                } catch (e) {
                    console.error('加载配置失败', e);
                }
            }
        }

        // 全局函数
        window.switchPreviewTab = switchPreviewTab;
        window.updateBasicConfig = updateBasicConfig;
        window.updateBusinessHours = updateBusinessHours;
        window.updatePaymentMethod = updatePaymentMethod;
        window.handleLogoUpload = handleLogoUpload;
        window.removeLogo = removeLogo;
        window.handleProductImagesUpload = handleProductImagesUpload;
        window.openProductModal = openProductModal;
        window.cancelProductEdit = cancelProductEdit;
        window.saveProduct = saveProduct;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.openCategoryModal = openCategoryModal;
        window.closeCategoryModal = closeCategoryModal;
        window.toggleCategory = toggleCategory;
        window.updateCategoryOrder = updateCategoryOrder;
        window.addCategory = addCategory;
        window.editCategory = editCategory;
        window.deleteCategory = deleteCategory;
        window.updateDeliveryRule = updateDeliveryRule;
        window.updatePhotoNodes = updatePhotoNodes;
        window.viewDeliveryDetail = viewDeliveryDetail;
        window.disableStaff = disableStaff;
        window.viewDeliveryPhotos = viewDeliveryPhotos;
        window.closePhotoModal = closePhotoModal;
        window.viewOrderDetail = viewOrderDetail;
        window.viewOrderProgress = viewOrderProgress;

        init();
    </script>
</body>
</html>
