<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026新项目二 - SaaS后台管理系统</title>
    <link rel="stylesheet" href="css/Main.css">
    <style>
        /* 返回卡片按钮样式 */
        .back-to-cards-btn {
            display: inline-flex;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--color-primary);
            color: #ffffff;
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-base) var(--ease-in-out);
            cursor: pointer;
            border: none;
        }

        .back-to-cards-btn:hover {
            background-color: var(--color-primary-hover);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .back-to-cards-btn:active {
            background-color: var(--color-primary-active);
            transform: translateY(0);
        }

        /* 侧边栏标题链接样式 */
        .sidebar-title-link {
            display: block;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity var(--transition-base) var(--ease-in-out);
        }

        .sidebar-title-link:hover {
            opacity: 0.8;
        }

        .sidebar-title-link .sidebar-title {
            margin: 0;
            color: #ffffff;
        }

        /* 商超模块布局样式（参考商品分类页面） */
        .module-layout-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--color-neutral-50);
            padding: var(--spacing-lg);
            gap: var(--spacing-lg);
        }

        /* 一级菜单横向显示 */
        .level1-menu {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            flex-wrap: wrap;
        }

        .level1-menu-item {
            padding: var(--spacing-sm) var(--spacing-lg);
            border: 1px solid var(--color-neutral-300);
            background-color: #ffffff;
            color: var(--color-text-primary);
            font-size: var(--font-size-base);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
            white-space: nowrap;
        }

        .level1-menu-item:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .level1-menu-item.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
        }

        /* 主内容区 */
        .module-main-content-area {
            flex: 1;
            display: flex;
            gap: var(--spacing-lg);
            overflow: hidden;
            min-height: 0;
        }

        /* 左侧二级菜单 */
        .level2-sidebar {
            width: 200px;
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-md);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .level2-sidebar-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--color-neutral-200);
        }

        .level2-sidebar-item {
            padding: var(--spacing-sm) var(--spacing-md);
            color: var(--color-text-primary);
            font-size: var(--font-size-base);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
            margin-bottom: var(--spacing-xs);
            display: block;
            text-decoration: none;
        }

        .level2-sidebar-item:hover {
            background-color: var(--color-neutral-50);
            color: var(--color-primary);
        }

        .level2-sidebar-item.active {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        /* 二级菜单可展开项（商品列表 + 分类子菜单） */
        .level2-sidebar-item-parent {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) var(--spacing-md);
            color: var(--color-text-primary);
            font-size: var(--font-size-base);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-base) var(--ease-in-out);
            margin-bottom: var(--spacing-xs);
            user-select: none;
            text-decoration: none;
        }
        .level2-sidebar-item-parent:hover {
            background-color: var(--color-neutral-50);
            color: var(--color-primary);
        }
        .level2-sidebar-item-parent .level2-sidebar-item-parent-text {
            flex: 1;
        }
        .level2-sidebar-item-parent .level2-sidebar-arrow {
            width: 14px;
            height: 14px;
            transition: transform var(--transition-base);
            flex-shrink: 0;
        }
        .level2-sidebar-item-parent.expanded .level2-sidebar-arrow {
            transform: rotate(-90deg);
        }
        .level2-sidebar-submenu {
            list-style: none;
            margin: 0 0 var(--spacing-sm) 0;
            padding: 0 0 0 var(--spacing-md);
            border-left: 1px solid var(--color-neutral-200);
            display: none;
        }
        .level2-sidebar-item-parent.expanded + .level2-sidebar-submenu {
            display: block;
        }
        .level2-sidebar-subitem {
            margin-bottom: 2px;
        }
        .level2-sidebar-subitem a {
            display: block;
            padding: 6px 10px;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: all var(--transition-base) var(--ease-in-out);
        }
        .level2-sidebar-subitem a:hover {
            background-color: var(--color-neutral-50);
            color: var(--color-primary);
        }
        .level2-sidebar-subitem a.active {
            background-color: rgba(44, 131, 235, 0.1);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        /* 右侧内容区 */
        .module-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            min-width: 0;
        }

        .module-content-iframe {
            flex: 1;
            width: 100%;
            border: none;
            min-height: 0;
        }
        /* 覆盖首页左侧“应用”标题背景为白色，无蓝底 */
        .sidebar-header {
            background-color: #ffffff;
            color: var(--color-text-primary);
        }
        /* 应用大厅 / 模块模式布局开关 */
        .content-title-container {
            display: none;
        }
        .app-module-mode .content-title-container {
            display: block;
        }
        .app-module-mode .sidebar {
            display: none;
        }
        .app-module-mode .main-content {
            width: 100%;
        }
        /* 模块模式下微调标题与返回按钮位置 */
        .app-module-mode .content-header {
            padding-left: 0;
            padding-right: 0;
        }
        .app-module-mode .breadcrumb-container {
            padding-left: 50px;
        }
        .app-module-mode .content-title-container {
            padding-left: 50px;
            padding-right: 100px; /* 让“返回应用”相对页面右侧再往左移 50px */
        }
        /* 模块入口卡片样式 */
        .module-entry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            padding: var(--spacing-xl);
        }

        .module-entry-card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-xl);
            cursor: pointer;
            transition: all var(--transition-base) var(--ease-in-out);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 200px;
            justify-content: center;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .module-entry-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-4px);
        }

        .module-entry-card-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            display: block;
        }

        .module-entry-card-title {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-xs) 0;
        }

        .module-entry-card-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin: 0;
            line-height: var(--line-height-relaxed);
        }

        .module-entry-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            padding: var(--spacing-lg) var(--spacing-xl);
        }

        .module-entry-title {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0 0 var(--spacing-sm) 0;
        }

        .module-entry-subtitle {
            font-size: var(--font-size-lg);
            color: var(--color-text-secondary);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧菜单 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">应用</h1>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
                <!-- 菜单内容由JS动态生成 -->
            </nav>
        </aside>

        <!-- 右侧内容区 -->
        <main class="main-content">
            <header class="content-header">
                <div class="breadcrumb-container">
                    <nav class="breadcrumb" id="breadcrumbNav" aria-label="面包屑导航">
                        <!-- 面包屑内容由JS动态生成 -->
                    </nav>
                </div>
                <div class="tabs-container">
                    <div class="tabs-wrapper" id="tabsWrapper">
                        <!-- 标签页内容由JS动态生成 -->
                    </div>
                </div>
                <div class="content-title-container">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <h2 class="content-title" id="contentTitle"></h2>
                        <a href="#" id="backToCardsBtn" class="back-to-cards-btn" onclick="goBackToCards(event)" style="display: none;">
                            <span style="margin-right: 4px;">←</span>
                            返回应用
                        </a>
                    </div>
                </div>
            </header>
            <div class="content-body" id="contentBody">
                <!-- 模块入口卡片标题区域已去掉文字，保留容器以便后续需要时扩展 -->
                <div class="module-entry-header"></div>
                <div class="module-entry-grid" id="moduleEntryGrid">
                    <!-- 卡片将由JS动态生成 -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/index.js"></script>
    <script>
        // 模块图标映射
        const moduleIcons = {
            '商超': '🏪',
            '财务管理': '💰',
            '餐饮': '🍽️',
            '物流配送': '🚚'
        };

        // 渲染模块卡片
        function renderModuleCards() {
            const grid = document.getElementById('moduleEntryGrid');
            if (!grid) {
                console.error('找不到moduleEntryGrid元素');
                return;
            }
            
            grid.innerHTML = '';

            // 获取所有模块数据
            if (typeof menuData === 'undefined' || !menuData || menuData.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: var(--spacing-xl); color: var(--color-text-secondary);">暂无模块数据</div>';
                return;
            }

            menuData.forEach(module => {
                const card = document.createElement('div');
                card.className = 'module-entry-card';
                card.dataset.moduleName = module.module;
                
                const icon = moduleIcons[module.module] || '📋';
                const itemCount = module.items ? module.items.length : 0;
                const desc = itemCount > 0 ? `${itemCount} 个功能分类` : '点击进入';
                
                card.innerHTML = `
                    <span class="module-entry-card-icon">${icon}</span>
                    <h3 class="module-entry-card-title">${module.module}</h3>
                    <p class="module-entry-card-desc">${desc}</p>
                `;
                
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('点击了卡片(新窗口):', module.module);
                    const url = 'index.html?module=' + encodeURIComponent(module.module);
                    window.open(url, '_blank');
                });
                
                grid.appendChild(card);
            });
        }

        // 进入模块菜单页面
        function enterModuleMenu(module) {
            console.log('进入模块菜单:', module.module);
            
            const contentBody = document.getElementById('contentBody');
            const grid = document.getElementById('moduleEntryGrid');
            const header = document.querySelector('.module-entry-header');
            
            // 隐藏卡片和标题
            if (grid) grid.style.display = 'none';
            if (header) header.style.display = 'none';
            
            // 隐藏占位符
            const placeholder = document.getElementById('contentPlaceholder');
            if (placeholder) {
                placeholder.style.display = 'none';
            }
            
            // 所有模块都使用新布局（一级菜单横向，左侧二级菜单，右侧内容）
            renderSupermarketLayout(module);
            
            // 更新左侧菜单提示
            const menuContainer = document.getElementById('sidebarMenu');
            if (menuContainer) {
                menuContainer.innerHTML = `<div style="padding: var(--spacing-md); color: var(--color-text-secondary); text-align: center;">${module.module}功能模块</div>`;
            }
            
            // 更新标题
            const contentTitle = document.getElementById('contentTitle');
            if (contentTitle) {
                contentTitle.textContent = module.module;
            }
        }

        // 渲染模块的新布局（一级菜单横向，左侧二级菜单，右侧内容）
        function renderSupermarketLayout(module) {
            const contentBody = document.getElementById('contentBody');
            
            // 检查是否已经存在布局容器
            let layoutContainer = document.getElementById('moduleLayoutContainer');
            if (!layoutContainer) {
                layoutContainer = document.createElement('div');
                layoutContainer.id = 'moduleLayoutContainer';
                layoutContainer.className = 'module-layout-container';
                contentBody.appendChild(layoutContainer);
            }
            
            layoutContainer.innerHTML = '';
            
            // 创建一级菜单
            const level1Menu = document.createElement('div');
            level1Menu.className = 'level1-menu';
            level1Menu.id = 'level1Menu';
            
            module.items.forEach((item, index) => {
                const menuItem = document.createElement('button');
                menuItem.className = 'level1-menu-item' + (index === 0 ? ' active' : '');
                menuItem.textContent = item.title;
                menuItem.dataset.itemIndex = index;
                menuItem.dataset.itemTitle = item.title;
                
                menuItem.addEventListener('click', function() {
                    // 切换一级菜单激活状态
                    document.querySelectorAll('.level1-menu-item').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // 更新二级菜单和内容
                    updateLevel2Menu(module, index);
                });
                
                level1Menu.appendChild(menuItem);
            });
            
            layoutContainer.appendChild(level1Menu);
            
            // 创建主内容区
            const mainContentArea = document.createElement('div');
            mainContentArea.className = 'module-main-content-area';
            
            // 创建左侧二级菜单
            const level2Sidebar = document.createElement('div');
            level2Sidebar.className = 'level2-sidebar';
            level2Sidebar.id = 'level2Sidebar';
            
            // 创建右侧内容区
            const contentArea = document.createElement('div');
            contentArea.className = 'module-content-area';
            contentArea.id = 'moduleContentArea';
            
            mainContentArea.appendChild(level2Sidebar);
            mainContentArea.appendChild(contentArea);
            layoutContainer.appendChild(mainContentArea);
            
            // 初始化显示第一个一级菜单的二级菜单
            if (module.items.length > 0) {
                updateLevel2Menu(module, 0);
            }
        }

        // 商超-商品列表下的分类子菜单（与商品列表页内分类一致）
        var productListCategory = '全部';

        // 更新二级菜单和内容
        function updateLevel2Menu(module, itemIndex) {
            const item = module.items[itemIndex];
            const level2Sidebar = document.getElementById('level2Sidebar');
            const contentArea = document.getElementById('moduleContentArea');
            
            if (!item || !level2Sidebar || !contentArea) return;
            
            // 更新二级菜单标题
            level2Sidebar.innerHTML = '';
            const sidebarTitle = document.createElement('div');
            sidebarTitle.className = 'level2-sidebar-title';
            sidebarTitle.textContent = item.title;
            level2Sidebar.appendChild(sidebarTitle);
            
            // 如果有子菜单，显示二级菜单项
            if (item.children && item.children.length > 0) {
                var isShangchaoProduct = (module.module === '商超' && item.title === '商品');
                var isShangchaoInventory = (module.module === '商超' && item.title === '库存');
                var productListPath = isShangchaoProduct && item.children[0] ? item.children[0].path : null;
                var categoryNames = ['全部', '雅安好物', '雅安好景', '文创产品'];
                var inventoryCategoryNames = ['全部', '厨房用品', '日用品', '食品', '饮料', '其他'];
                var inventoryQueryCategory = '全部';
                var inventoryQueryPath = isShangchaoInventory && item.children[0] ? item.children[0].path : null;

                item.children.forEach((child, childIndex) => {
                    // 商超-库存：第一个子项「库存查询」改为可展开，子菜单为分类，默认收起
                    if (isShangchaoInventory && childIndex === 0 && child.title === '库存查询') {
                        var invParentWrap = document.createElement('div');
                        var invParentBtn = document.createElement('div');
                        invParentBtn.className = 'level2-sidebar-item-parent';
                        invParentBtn.innerHTML = '<span class="level2-sidebar-item-parent-text">库存查询</span><svg class="level2-sidebar-arrow" viewBox="0 0 16 16" fill="currentColor"><path d="M6 12l4-4-4-4"/></svg>';
                        invParentBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            this.classList.toggle('expanded');
                        });
                        invParentWrap.appendChild(invParentBtn);
                        var invSubmenu = document.createElement('ul');
                        invSubmenu.className = 'level2-sidebar-submenu';
                        inventoryCategoryNames.forEach(function(cat) {
                            var li = document.createElement('li');
                            li.className = 'level2-sidebar-subitem';
                            var a = document.createElement('a');
                            a.href = '#';
                            a.textContent = cat;
                            if (cat === inventoryQueryCategory) a.classList.add('active');
                            a.addEventListener('click', function(e) {
                                e.preventDefault();
                                inventoryQueryCategory = cat;
                                level2Sidebar.querySelectorAll('.level2-sidebar-subitem a').forEach(function(link) {
                                    link.classList.remove('active');
                                });
                                this.classList.add('active');
                                var url = inventoryQueryPath + (cat === '全部' ? '' : '?category=' + encodeURIComponent(cat));
                                loadModulePage(url, '库存查询');
                            });
                            li.appendChild(a);
                            invSubmenu.appendChild(li);
                        });
                        invParentWrap.appendChild(invSubmenu);
                        level2Sidebar.appendChild(invParentWrap);
                        var initialInvUrl = inventoryQueryPath + (inventoryQueryCategory === '全部' ? '' : '?category=' + encodeURIComponent(inventoryQueryCategory));
                        loadModulePage(initialInvUrl, '库存查询');
                    } else if (isShangchaoInventory && childIndex > 0) {
                        // 库存下的其他项：增加库存、减少库存、库存盘点
                        const sidebarItem = document.createElement('a');
                        sidebarItem.href = '#';
                        sidebarItem.className = 'level2-sidebar-item';
                        sidebarItem.textContent = child.title;
                        sidebarItem.dataset.path = child.path;
                        sidebarItem.dataset.title = child.title;
                        sidebarItem.addEventListener('click', function(e) {
                            e.preventDefault();
                            document.querySelectorAll('.level2-sidebar-item').forEach(link => link.classList.remove('active'));
                            document.querySelectorAll('.level2-sidebar-subitem a').forEach(link => link.classList.remove('active'));
                            this.classList.add('active');
                            loadModulePage(child.path, child.title);
                        });
                        level2Sidebar.appendChild(sidebarItem);
                    } else if (isShangchaoProduct && childIndex === 0 && child.title === '商品列表') {
                        var parentWrap = document.createElement('div');
                        var parentBtn = document.createElement('div');
                        parentBtn.className = 'level2-sidebar-item-parent expanded';
                        parentBtn.innerHTML = '<span class="level2-sidebar-item-parent-text">商品列表</span><svg class="level2-sidebar-arrow" viewBox="0 0 16 16" fill="currentColor"><path d="M6 12l4-4-4-4"/></svg>';
                        parentBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            this.classList.toggle('expanded');
                        });
                        parentWrap.appendChild(parentBtn);

                        var submenu = document.createElement('ul');
                        submenu.className = 'level2-sidebar-submenu';
                        categoryNames.forEach(function(cat) {
                            var li = document.createElement('li');
                            li.className = 'level2-sidebar-subitem';
                            var a = document.createElement('a');
                            a.href = '#';
                            a.textContent = cat;
                            if (cat === productListCategory) a.classList.add('active');
                            a.addEventListener('click', function(e) {
                                e.preventDefault();
                                productListCategory = cat;
                                document.querySelectorAll('.level2-sidebar-subitem a').forEach(function(link) {
                                    link.classList.remove('active');
                                });
                                this.classList.add('active');
                                var url = productListPath + (cat === '全部' ? '' : '?category=' + encodeURIComponent(cat));
                                loadModulePage(url, '商品列表');
                            });
                            li.appendChild(a);
                            submenu.appendChild(li);
                        });
                        parentWrap.appendChild(submenu);
                        level2Sidebar.appendChild(parentWrap);

                        // 默认加载商品列表（当前选中的分类）
                        var initialUrl = productListPath + (productListCategory === '全部' ? '' : '?category=' + encodeURIComponent(productListCategory));
                        loadModulePage(initialUrl, '商品列表');
                    } else {
                        // 普通二级菜单项（含 商超-商品 下的 套餐列表、商品分类 等）
                        const sidebarItem = document.createElement('a');
                        sidebarItem.href = '#';
                        sidebarItem.className = 'level2-sidebar-item' + (childIndex === 0 && !isShangchaoProduct ? ' active' : '');
                        sidebarItem.textContent = child.title;
                        sidebarItem.dataset.path = child.path;
                        sidebarItem.dataset.title = child.title;
                        sidebarItem.addEventListener('click', function(e) {
                            e.preventDefault();
                            document.querySelectorAll('.level2-sidebar-item').forEach(link => link.classList.remove('active'));
                            document.querySelectorAll('.level2-sidebar-subitem a').forEach(link => link.classList.remove('active'));
                            this.classList.add('active');
                            loadModulePage(child.path, child.title);
                        });
                        level2Sidebar.appendChild(sidebarItem);
                    }
                });
                
                // 非商超-商品、非商超-库存时，默认加载第一个子菜单（商品/库存的首次加载在各自展开项内已处理）
                if (!isShangchaoProduct && !isShangchaoInventory && item.children.length > 0) {
                    loadModulePage(item.children[0].path, item.children[0].title);
                }
            } else if (item.path) {
                const sidebarItem = document.createElement('div');
                sidebarItem.className = 'level2-sidebar-item active';
                sidebarItem.textContent = item.title;
                sidebarItem.style.cursor = 'default';
                sidebarItem.style.pointerEvents = 'none';
                level2Sidebar.appendChild(sidebarItem);
                loadModulePage(item.path, item.title);
            }
        }

        // 加载模块页面到右侧内容区
        function loadModulePage(path, title) {
            const contentArea = document.getElementById('moduleContentArea');
            if (!contentArea) return;
            
            // 移除旧的iframe
            const oldIframe = contentArea.querySelector('.module-content-iframe');
            if (oldIframe) {
                oldIframe.remove();
            }
            
            // 创建新的iframe
            const iframe = document.createElement('iframe');
            iframe.className = 'module-content-iframe';
            iframe.src = path;
            iframe.id = 'moduleContentIframe';
            contentArea.appendChild(iframe);
        }


        // 返回功能模块入口（卡片页面）
        window.goBackToCards = function(event) {
            if (event) {
                event.preventDefault();
            }
            // 返回到应用入口页（五个入口）
            window.location.href = 'index.html';
        };
        
        // 页面加载完成后渲染卡片（仅在无module参数时）
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search || '');
            const moduleName = params.get('module');
            if (!moduleName) {
                setTimeout(function() {
                    renderModuleCards();
                }, 100);
            }
        });
        
        // window.onload时也执行一次（仅在无module参数时）
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search || '');
            const moduleName = params.get('module');
            if (!moduleName) {
                setTimeout(function() {
                    renderModuleCards();
                }, 100);
            }
        });
    </script>
</body>
</html>
